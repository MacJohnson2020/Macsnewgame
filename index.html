<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Void Raiders</title>
<style>
html { --accent: #0ff; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#0a0a1a; color:#d0d0d0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; font-size:14px; overflow-x:hidden; -webkit-font-smoothing:antialiased; }
#app { max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }
/* Top Bar - SimpleMMO style compact */
#top-bar { background:#0d0d1f; padding:8px 12px; border-bottom:1px solid #1a1a3a; position:sticky; top:0; z-index:10; }
#top-bar .row { display:flex; justify-content:space-between; align-items:center; gap:6px; }
.hud-stat { text-align:center; min-width:48px; }
.stat-label { color:#556; font-size:9px; text-transform:uppercase; letter-spacing:0.5px; display:block; }
.stat-val { color:var(--accent); font-size:15px; font-weight:700; font-family:'Courier New',monospace; }
.gold-val { color:#ffd700; font-family:'Courier New',monospace; font-weight:700; font-size:15px; }
.energy-val { color:#0f0; font-family:'Courier New',monospace; font-weight:700; }
/* Main Content - big readable area */
#content { flex:1; overflow-y:auto; padding:10px 14px; padding-bottom:62px; scroll-behavior:smooth; }
/* Bottom Nav - SimpleMMO style big clear buttons */
#nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; display:flex; background:#0d0d1f; border-top:1px solid #1a1a3a; z-index:10; padding:4px 4px; padding-bottom:max(4px, env(safe-area-inset-bottom)); gap:2px; }
#nav button { flex:1; padding:8px 2px 6px; background:#111125; border:1px solid #1a1a3a; border-radius:8px; color:#445; font-family:inherit; font-size:10px; font-weight:600; cursor:pointer; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; gap:2px; }
#nav button .nav-icon { font-size:18px; line-height:1; }
#nav button.active { color:var(--accent); background:#151535; border-color:var(--accent); box-shadow:0 0 8px rgba(0,255,255,0.1); }
#nav button:active { transform:scale(0.95); opacity:0.8; }
/* Buttons - big, clear, easy to tap */
.btn { display:inline-block; padding:12px 18px; margin:4px; background:#151530; border:1px solid #2a2a4a; border-radius:10px; color:#ccc; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; min-height:48px; min-width:48px; transition:all 0.15s; user-select:none; text-align:center; }
.btn:active { background:#252550; transform:scale(0.97); }
.btn:disabled { opacity:0.3; pointer-events:none; }
.btn-full { display:block; width:100%; margin:6px 0; }
.btn-cyan { border-color:#0aa; color:#0ff; background:rgba(0,255,255,0.06); }
.btn-purple { border-color:#8020cc; color:#b026ff; background:rgba(176,38,255,0.06); }
.btn-gold { border-color:#aa8800; color:#ffd700; background:rgba(255,215,0,0.06); }
.btn-green { border-color:#0a0; color:#0f0; background:rgba(0,255,0,0.06); }
.btn-red { border-color:#b33; color:#f44; background:rgba(255,68,68,0.06); }
.btn:active { opacity:0.8; }
/* Rarity Colors */
.common { color:#999; } .uncommon { color:#0f0; } .rare { color:#5588ff; }
.epic { color:#b026ff; } .legendary { color:#ffd700; text-shadow:0 0 4px rgba(255,215,0,0.3); } .mythic { color:#ff2060; text-shadow:0 0 8px rgba(255,32,96,0.4); font-weight:700; }
/* Progress Bar */
.pbar { background:#0e0e20; border:1px solid #222; height:20px; margin:4px 0; position:relative; border-radius:10px; overflow:hidden; }
.pbar-sm { height:14px; }
.pbar-fill { height:100%; transition:width 0.4s ease-out; border-radius:10px; }
.pbar-text { position:absolute; top:0; left:0; right:0; font-size:11px; line-height:20px; color:#fff; text-align:center; font-weight:600; text-shadow:0 1px 2px rgba(0,0,0,0.8); font-family:'Courier New',monospace; }
.pbar-sm .pbar-text { font-size:9px; line-height:14px; }
.pbar-cyan .pbar-fill { background:linear-gradient(90deg,#044,#0cc); }
.pbar-green .pbar-fill { background:linear-gradient(90deg,#040,#0a0); }
.pbar-purple .pbar-fill { background:linear-gradient(90deg,#306,#a0f); }
.pbar-gold .pbar-fill { background:linear-gradient(90deg,#640,#da0); }
.pbar-red .pbar-fill { background:linear-gradient(90deg,#400,#c44); }
/* Sections */
h2 { color:var(--accent); font-size:18px; margin:14px 0 10px; font-weight:700; }
h3 { color:#889; font-size:13px; margin:12px 0 6px; font-weight:600; text-transform:uppercase; letter-spacing:1px; }
.card { background:#111125; border:1px solid #1e1e3a; border-radius:10px; padding:14px; margin:8px 0; }
.card-row { display:flex; align-items:center; gap:12px; }
.card-icon { font-size:28px; flex-shrink:0; width:40px; text-align:center; }
.card-body { flex:1; min-width:0; }
.card-title { font-weight:700; font-size:15px; }
.card-desc { font-size:12px; color:#667; margin-top:2px; }
.card-action { flex-shrink:0; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
.text-center { text-align:center; }
.text-sm { font-size:12px; }
.text-dim { color:#556; }
.mt { margin-top:10px; }
.mb { margin-bottom:10px; }
/* Sub-nav - horizontal scrolling pills */
.sub-nav { display:flex; gap:6px; overflow-x:auto; padding:6px 0; -webkit-overflow-scrolling:touch; scrollbar-width:none; margin-bottom:8px; }
.sub-nav::-webkit-scrollbar { display:none; }
.sub-nav button { flex-shrink:0; padding:8px 16px; border-radius:20px; border:1px solid #2a2a4a; background:#111125; color:#667; font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.sub-nav button.active { background:rgba(0,255,255,0.1); border-color:var(--accent); color:var(--accent); }
.sub-nav button:active { transform:scale(0.95); }
/* Collapsible Sections */
.collapse-header { cursor:pointer; user-select:none; padding:8px 0; display:flex; justify-content:space-between; align-items:center; }
.collapse-header:after { content:'▼'; color:#556; font-size:10px; }
.collapse-header.collapsed:after { content:'▶'; }
.collapse-body { overflow:hidden; }
.collapse-body.hidden { display:none; }
/* Toast */
#toast-container { position:fixed; top:50px; left:50%; transform:translateX(-50%); z-index:100; width:90%; max-width:420px; pointer-events:none; }
.toast { background:#151535; border:1px solid var(--accent); border-radius:10px; padding:10px 14px; margin:6px 0; text-align:center; animation:toastIn 0.3s ease-out; font-size:13px; box-shadow:0 4px 20px rgba(0,0,0,0.5); }
@keyframes toastIn { from{opacity:0;transform:translateY(-15px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }
/* Modal */
.modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:50; display:flex; align-items:center; justify-content:center; animation:fadeIn 0.2s; }
.modal { background:#111125; border:1px solid var(--accent); border-radius:14px; padding:20px; max-width:92%; max-height:85vh; overflow-y:auto; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
/* Combat Log */
.log { max-height:220px; overflow-y:auto; background:#060612; border:1px solid #1a1a2a; border-radius:8px; padding:8px; font-size:12px; font-family:'Courier New',monospace; line-height:1.5; }
.log-line { margin:1px 0; padding:2px 6px; border-radius:3px; }
.dmg-player { color:#f55; background:rgba(255,68,68,0.05); }
.dmg-enemy { color:#0ff; background:rgba(0,255,255,0.05); }
.heal { color:#0f0; background:rgba(0,255,0,0.05); }
/* Followers */
.follower-card { background:#0e0e22; border:1px solid #1e1e3a; border-radius:8px; padding:10px 12px; margin:6px 0; }
.follower-card .name { font-weight:700; }
/* Input */
input[type="text"] { background:#0e0e22; border:1px solid #2a2a4a; border-radius:8px; color:#ddd; padding:12px 14px; font-family:inherit; font-size:15px; width:100%; }
input[type="text"]:focus { border-color:var(--accent); outline:none; }
select { background:#0e0e22; border:1px solid #2a2a4a; border-radius:8px; color:#ddd; padding:12px 14px; font-family:inherit; font-size:15px; }
/* Number display */
.num { font-family:'Courier New',monospace; font-weight:700; }
/* Scrollbar */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#2a2a4a; border-radius:2px; }
/* Hint */
.hint { background:rgba(0,255,255,0.04); border-left:3px solid var(--accent); padding:10px 14px; margin:8px 0; border-radius:0 8px 8px 0; font-size:13px; color:#8aa; }
.tutorial-hint { background:rgba(0,255,255,0.08); border:1px solid var(--accent); border-radius:10px; padding:12px 16px; margin:8px 0; font-size:14px; color:#add; text-align:center; animation:tutPulse 2s infinite; }
@keyframes tutPulse { 0%,100%{box-shadow:0 0 5px rgba(0,255,255,0.1)} 50%{box-shadow:0 0 15px rgba(0,255,255,0.2)} }
/* Badge */
.badge { display:inline-block; background:#f44; color:#fff; font-size:9px; font-weight:700; padding:1px 5px; border-radius:8px; min-width:16px; text-align:center; }
/* Rarity borders */
.rarity-border-epic { border-color:#b026ff !important; }
.rarity-border-legendary { border-color:#ffd700 !important; box-shadow:0 0 8px rgba(255,215,0,0.1); }
.rarity-border-mythic { border-color:#ff2060 !important; box-shadow:0 0 12px rgba(255,32,96,0.15); animation:mythicPulse 2s infinite; }
@keyframes mythicPulse { 0%,100%{box-shadow:0 0 8px rgba(255,32,96,0.1)} 50%{box-shadow:0 0 16px rgba(255,32,96,0.25)} }
/* Stat row */
.stat-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid #151530; }
.stat-row:last-child { border-bottom:none; }
/* Divider */
.divider { border:none; border-top:1px solid #1a1a3a; margin:12px 0; }
/* Pull animations */
.pull-result { animation:pullReveal 0.4s ease-out; }
.pull-epic { animation:pullReveal 0.4s; border-color:#b026ff; box-shadow:0 0 20px rgba(176,38,255,0.2); }
.pull-legendary { animation:pullReveal 0.5s; border-color:#ffd700; box-shadow:0 0 25px rgba(255,215,0,0.25); }
.pull-mythic { animation:pullReveal 0.6s; border-color:#ff2060; box-shadow:0 0 30px rgba(255,32,96,0.3); }
@keyframes pullReveal { from{opacity:0;transform:scale(0.8) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }
/* Splash */
#splash { position:fixed; top:0; left:0; width:100%; height:100%; background:#0a0a1a; z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; }
#splash .logo { font-size:48px; margin-bottom:10px; animation:splashPulse 2s infinite; }
@keyframes splashPulse { 0%,100%{opacity:0.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.05)} }
#splash .title { font-size:28px; font-weight:900; color:var(--accent); text-shadow:0 0 30px rgba(0,255,255,0.4); letter-spacing:4px; margin-bottom:6px; }
#splash .subtitle { font-size:11px; color:#445; margin-bottom:30px; letter-spacing:3px; }
#splash .loading-bar { width:220px; height:3px; background:#1a1a2e; border-radius:2px; overflow:hidden; }
#splash .loading-fill { height:100%; background:linear-gradient(90deg,#066,#0ff,#066); background-size:200%; width:0%; animation:loadFill 1.5s ease-out forwards; }
@keyframes loadFill { to { width:100% } }
/* Character creation */
.class-card { background:#111128; border:2px solid #1e1e3a; border-radius:12px; padding:14px; margin:8px 0; cursor:pointer; transition:all 0.2s; }
.class-card.selected { border-color:var(--accent); background:#151535; }
.class-card .class-name { font-size:16px; font-weight:700; }
.class-card .class-desc { font-size:12px; color:#889; margin-top:2px; }
.class-card .class-passive { font-size:11px; margin-top:4px; }
.class-card .class-stats { font-size:10px; color:#556; margin-top:4px; font-family:'Courier New',monospace; }
.element-btn { padding:10px 18px; margin:3px; border-radius:20px; border:2px solid #333; background:none; color:#ccc; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; }
.element-btn.selected { border-color:var(--accent); color:var(--accent); background:rgba(0,255,255,0.08); }
/* Ticker */
#ticker-text { animation:tickerFade 5s infinite; }
@keyframes tickerFade { 0%,85%{opacity:1} 92%,100%{opacity:0} }
</style>
</head>

}

function save(){
  if(!G) return;
  G.lastSave = Date.now();
  G.lastOnline = Date.now();
  localStorage.setItem('voidraiders_save', JSON.stringify(G));
}

function load(){
  try {
    const d = localStorage.getItem('voidraiders_save');
    if(d){ G = JSON.parse(d); return true; }
  } catch(e){}
  return false;
}

function toast(msg, color, duration){
  const c = document.getElementById('toast-container');
  const d = document.createElement('div');
  d.className = 'toast';
  if(color) d.style.borderColor = color;
  d.textContent = msg;
  c.appendChild(d);
  setTimeout(()=>{ d.style.opacity='0'; d.style.transition='opacity 0.3s'; setTimeout(()=>d.remove(),300); }, duration||2500);
}

function showLevelUp(level){
  const LEVEL_GATES = {5:'Arena',10:'Roaming Enemies',15:'Wanted Board',20:'Dungeons',30:'World Boss',40:'Tournament',50:'Seasonal Boss'};
  const unlocked = LEVEL_GATES[level] || '';
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,20,40,0.9);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn 0.3s;cursor:pointer';
  let inner = '<div style="font-size:64px;color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #0ff;font-weight:900">' + level + '</div>';
  inner += '<div style="font-size:32px;color:#ffd700;text-shadow:0 0 12px rgba(255,215,0,0.5);margin:12px 0;font-weight:700">LEVEL UP!</div>';
  inner += '<div style="font-size:18px;color:#0f0;margin:8px 0">+3 Stat Points</div>';
  if(unlocked) inner += '<div style="font-size:20px;color:#ff2060;margin:12px 0;text-shadow:0 0 10px rgba(255,32,96,0.5)">NEW UNLOCK: ' + unlocked + '!</div>';
  inner += '<div style="font-size:12px;color:#888;margin-top:20px">Tap to dismiss</div>';
  overlay.innerHTML = inner;
  document.body.appendChild(overlay);
  const dismiss = () => { overlay.style.opacity='0'; overlay.style.transition='opacity 0.3s'; setTimeout(()=>overlay.remove(),300); };
  overlay.addEventListener('click', dismiss);
  setTimeout(dismiss, 2500);
}

function checkFirstTime(type){
  if(!G.firsts) G.firsts = {};
  if(G.firsts[type]) return false;
  G.firsts[type] = true;
  return true;
}

// Format large numbers: 1200 -> "1.2K", 1500000 -> "1.5M"
function fmtNum(n){
  if(n === undefined || n === null) return '0';
  if(n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if(n >= 10000) return (n/1000).toFixed(1) + 'K';
  if(n >= 1000) return (n/1000).toFixed(1) + 'K';
  return String(n);
}

  if(header) header.classList.toggle('collapsed');
}

  const open = startOpen !== false;
  return '<div id="ch-'+id+'" class="collapse-header'+(open?'':' collapsed')+'" onclick="toggleCollapse(\''+id+'\')"><b>'+title+'</b></div>' +
    '<div id="collapse-'+id+'" class="collapse-body'+(open?'':' hidden')+'">'+content+'</div>';
}

const WEATHER_TYPES = [
  { id:'clear', name:'Clear Skies', desc:'No effect', color:'#aaa' },
  { id:'storm', name:'Ion Storm', desc:'-10% speed', color:'#4af' },
  { id:'void_surge', name:'Void Surge', desc:'+10% corruption dmg', color:'#b026ff' },

  { id:'harsh_winds', name:'Harsh Winds', desc:'+5% dodge', color:'#8f8' }
];

function updateWeather(){
  if(!G) return;
  if(Date.now() > (G.weatherChangeTime || 0)){
    const types = WEATHER_TYPES.map(w => w.id);
    let newW = types[Math.floor(Math.random() * types.length)];
    if(newW !== G.weather){
      G.weather = newW;
      const wInfo = WEATHER_TYPES.find(w => w.id === newW);
      toast('Weather changed: ' + wInfo.name + ' (' + wInfo.desc + ')', wInfo.color);
    }
    G.weatherChangeTime = Date.now() + 600000; // 10 minutes
  }
}

function getWeatherInfo(){
  return WEATHER_TYPES.find(w => w.id === (G.weather || 'clear')) || WEATHER_TYPES[0];
}

// ==================== FOLLOWER DISPLAY NAME ====================
function getFollowerDisplayName(f){
  if(!f) return '???';
  let prefix = '';
  if(f.level >= 50) prefix = 'Legendary ';
  else if(f.level >= 25){
    const titles = ['Veteran','Scarred','Honored','Hardened','Exalted','Seasoned','Proven'];
    // Deterministic title based on follower id
    const idx = Math.abs(Math.floor(f.id * 7)) % titles.length;
    prefix = titles[idx] + ' ';
  }
  return prefix + (f.customName || f.name);
}

// ==================== MYSTERY BOX ====================
function awardMysteryBox(){
  const roll = Math.random();
  let reward = '';
  if(roll < 0.35){
    const gold = 100 + Math.floor(Math.random() * 901);
    G.gold += gold; G.total_gold_earned += gold;
    reward = '+' + gold + ' gold';
  } else if(roll < 0.55){
    const gems = 1 + Math.floor(Math.random() * 5);
    G.gems += gems;

  } else if(roll < 0.72){
    G.tickets1x = (G.tickets1x||0) + 1;
    reward = '+1 Summon Ticket';
  } else if(roll < 0.87){
    const keyTypes = ['basic','advanced','nightmare'];
    const kt = keyTypes[Math.floor(Math.random()*keyTypes.length)];
    G.dungeonKeys[kt] = (G.dungeonKeys[kt]||0) + 1;
    reward = '+1 ' + kt + ' dungeon key';
  } else {
    // Random resource bundle
    const res = ['ore','scrap','data','bio'];
    const r = res[Math.floor(Math.random()*res.length)];
    const amt = 5 + Math.floor(Math.random()*16);
    G.resources[r] = (G.resources[r]||0) + amt;
    reward = '+' + amt + ' ' + r;
  }
  toast('MYSTERY BOX opened! ' + reward, '#ff2060');

// ==================== CORE MECHANICS ====================
function getMaxEnergy(){
  let base = 100;
  const vaultLv = getAllBuildingLevel('vault');
  base += vaultLv * 5;
  if(hasSynergy('energy')) base += 10;
  base += getResearchBonus('maxEnergy');
  base += getRelicBonus('maxEnergy');
  // Talent bonus (#14)
  if(G.talents) base += getTalentLevel('energy') * 5;
  // Feature 8: Luxury Energy Boost
  if(G.luxuryPurchases) base += (G.luxuryPurchases.energyBoost||0) * 20;
  return base;
}

function getEnergyRegenRate(){
  let base = 30;
  const genLv = getAllBuildingLevel('generator');
  base = Math.max(5, base - genLv * 2);
  return base;
}

function getXpBoost(){
  let boost = 1 + (G.prestige_bonus / 100);
  const labLv = getAllBuildingLevel('lab');
  boost += labLv * 0.05;
  G.cities.forEach(c => {
    if(c.specialty === 'research') boost += SPECIALTIES.research.bonus.xp;
  });
  boost += getResearchBonus('combatXp') + getClanBonus('xp');
  boost += getEventBonus('xp');
  boost += getFactionBonus('xp');
  const loreBonuses = getLoreBonuses();
  boost += loreBonuses.xp || 0;
  // Talent bonus (#14)
  if(G.talents) boost += getTalentBonus('xp');
  // Feature 8: XP Tome
  if(G.luxuryPurchases) boost += (G.luxuryPurchases.xpTome||0) * 0.03;
  // Feature 25: Prestige Shop permanent XP
  if(G.prestigeShopPurchases && G.prestigeShopPurchases.permDropRate) boost += 0; // xp handled separately
  return boost;
}

// Best combat skill determines primary style
function getPrimaryCombatSkill(){
  let best = 0, bestLv = G.skillLevels[0];
  for(let i = 1; i <= 3; i++){
    if(G.skillLevels[i] > bestLv){ best = i; bestLv = G.skillLevels[i]; }
  }
  return best; // 0=Melee,1=Ranged,2=Corruption,3=Stealth
}

function getCombatPower(){
  let p = G.stats.power;
  const bLv = getAllBuildingLevel('barracks');
  p += bLv * 3;
  // Military specialty bonus
  G.cities.forEach(c => {
    if(c.specialty === 'military') p += Math.floor(p * SPECIALTIES.military.bonus.combat);
  });
  for(const slot of GEAR_SLOTS){
    if(G.gear[slot]) p += G.gear[slot].power || 0;
  }
  const cls = CLASSES[G.class];
  p += cls.power * G.level;
  // Set bonus, research, clan, world tier
  p = Math.floor(p * getSetPowerMult());
  p = Math.floor(p * (1 + getResearchBonus('combatPower') + getClanBonus('power') + getRelicBonus('power')));
  // Follower gear power for combat followers
  const activeFollowerGear = G.followers.filter(f => f.assigned === 'combat').reduce((s,f) => s + (f._gearPower||0), 0);
  p += activeFollowerGear;
  // Combat skill bonuses
  p += Math.floor(G.skillLevels[0] * 1.5); // Melee: raw power
  p += Math.floor(G.skillLevels[1] * 1.0); // Ranged: steady power
  p += Math.floor(G.skillLevels[2] * 2.0); // Corruption: high burst
  // Stealth gives crit not power
  // Leadership boosts follower contribution
  let leadershipMult = 1 + G.skillLevels[13] * 0.015;
  if(G.skillLevels[13] >= 99) leadershipMult += 0.5; // COMMANDER: +50% follower power
  const activeFollowers = G.followers.filter(f => f.assigned === 'combat');
  activeFollowers.forEach(f => { p += Math.floor(f.level * f.power * 0.5 * leadershipMult); });
  // Skill Total Level Milestones (#13)
  const totalSkillLv = G.skillLevels.reduce((sum, lv) => sum + lv, 0);
  if(totalSkillLv >= 1000) p = Math.floor(p * 1.20);
  else if(totalSkillLv >= 500) p = Math.floor(p * 1.15);
  else if(totalSkillLv >= 250) p = Math.floor(p * 1.10);
  else if(totalSkillLv >= 100) p = Math.floor(p * 1.05);
  // Talent bonus (#14)
  if(G.talents) p = Math.floor(p * (1 + getTalentBonus('power')));
  // Legacy bonus from awakened (#17)
  if(G.awakenedDmgBonus) p = Math.floor(p * (1 + G.awakenedDmgBonus * 0.01));
  // Feature 25: Prestige Shop follower power bonus
  if(G.prestigeShopPurchases && G.prestigeShopPurchases.permFollowerPower){
    const fpBonus = G.prestigeShopPurchases.permFollowerPower * 0.10;
    const followerContrib = activeFollowers.reduce((s,f) => s + Math.floor(f.level * f.power * 0.5), 0);
    p += Math.floor(followerContrib * fpBonus);
  }
  return Math.floor(p);
}

function getCombatDefense(){
  let d = G.stats.defense;
  for(const slot of GEAR_SLOTS){
    if(G.gear[slot]) d += G.gear[slot].defense || 0;
  }
  const cls = CLASSES[G.class];
  d += cls.defense * G.level;
  // Survival skill: +2 def per level
  d += Math.floor(G.skillLevels[14] * 2);
  // Talent bonus (#14)
  if(G.talents) d = Math.floor(d * (1 + getTalentBonus('defense')));
  return Math.floor(d);
}

function getCombatSpeed(){
  let s = G.stats.speed;
  const cls = CLASSES[G.class];
  s += cls.speed * Math.floor(G.level/2);
  // Stealth adds speed
  s += Math.floor(G.skillLevels[3] * 0.8);
  // Talent bonus (#14)
  if(G.talents) s = Math.floor(s * (1 + getTalentBonus('speed')));
  return Math.floor(s);
}

function getLuck(){
  let l = G.stats.luck;
  const cls = CLASSES[G.class];
  l += cls.luck * Math.floor(G.level/3);
  const shrineLv = getAllBuildingLevel('shrine');
  l += shrineLv * 2;
  // Scavenging boosts luck
  l += Math.floor(G.skillLevels[5] * 0.5);
  // Stealth boosts crit/luck
  l += Math.floor(G.skillLevels[3] * 0.5);
  l += getRelicBonus('luck') + getClanBonus('luck');
  l += getRelicBonus('speed'); // speed relic adds to luck calc too
  // Talent bonus (#14)
  if(G.talents) l = Math.floor(l * (1 + getTalentBonus('luck')));
  // Feature 8: Luck Charm
  if(G.luxuryPurchases) l += (G.luxuryPurchases.luckCharm||0) * 5;
  return Math.floor(l);
}

function getGoldPerMin(){
  const fLv = getAllBuildingLevel('foundry');
  let base = fLv * 2;
  // Foundry workers across all cities
  const workers = G.followers.filter(f => f.assigned === 'foundry' && f.happiness > 20);
  workers.forEach(f => { base += Math.floor(f.level * 0.5) + 1; });
  // Mining specialty bonus
  G.cities.forEach(c => {
    if(c.specialty === 'mining') base = Math.floor(base * (1 + SPECIALTIES.mining.bonus.gold));
  });
  // Master Miner 99: passive gold income
  if(G.skillLevels[4] >= 99) base += 5;
  // Scavenger Lord 99: passive gold income
  if(G.skillLevels[5] >= 99) base += 8;
  // Trade routes
  base += getTradeRouteIncome();
  // Research & prestige bonuses
  base += getResearchBonus('goldPerMin');
  base += Math.floor(getPrestigeBonus('goldMin'));
  // Relic & clan bonuses
  base += getRelicBonus('goldMin');
  base += getClanBonus('gold');

  if(G.talents) base += getTalentLevel('goldmin') * 3;
  // Feature 10: Inflation Protection
  if(G.gold > 100000) base = Math.floor(base * 0.75);
  else if(G.gold > 50000) base = Math.floor(base * 0.90);

function addXp(amount){
  amount = Math.floor(amount * getXpBoost());
  G.xp += amount;
  let needed = xpForLevel(G.level);
  while(G.xp >= needed && G.level < 100){
    G.xp -= needed;
    G.level++;
    G.statPoints += 3;
    showLevelUp(G.level);
    updateChallengeProgress('levels', 1);
    // Level milestone gems (front-loaded)
    if(G.level <= 10) G.gems += 3; // 3 gems per level early
    else if(G.level <= 25) G.gems += 2;
    else if(G.level <= 50) G.gems += 1;
    // Ticket milestones
    if(G.level === 15 || G.level === 30 || G.level === 50){ G.tickets1x = (G.tickets1x||0) + 1; toast('+1 Summon Ticket!','#0ff'); }
    if(G.level === 75 || G.level === 100){ G.tickets10x = (G.tickets10x||0) + 1; toast('+1 10x Summon Ticket!!','#ffd700'); }
    // Talent points (#14): 1 per 5 levels
    if(G.level % 5 === 0){
      if(!G.talentPoints) G.talentPoints = 0;
      G.talentPoints++;
      toast('+1 Talent Point! (Level ' + G.level + ')', '#b026ff');
    }
    checkAchievements();
    needed = xpForLevel(G.level);
  }
  if(G.level >= 100) G.xp = Math.min(G.xp, needed);
}

function addSkillXp(skillIdx, amount){
  amount = Math.floor(amount * getXpBoost());
  G.skills[skillIdx] += amount;

function generateGear(missionLevel, isBoss, zoneHint){
  const luck = getLuck();
  let rarityRoll = Math.random() * 10000;
  let luckBonus = luck * 3; // luck shifts the roll
  rarityRoll = Math.max(0, rarityRoll - luckBonus);
  let rarity = 0;
  if(rarityRoll < 0.1) rarity = 5;         // 0.001% Mythic
  else if(rarityRoll < 10) rarity = 4;     // 0.1% Legendary
  else if(rarityRoll < 400) rarity = 3;    // 4% Epic
  else if(rarityRoll < 1500) rarity = 2;   // 11% Rare
  else if(rarityRoll < 4000) rarity = 1;   // 25% Uncommon
  // else ~60% Common
  if(isBoss && rarity < 2) rarity = 2; // boss guarantees rare+

  // Zone-weighted loot (#7)
  let slot;
  if(zoneHint !== undefined && zoneHint >= 0){
    const roll = Math.random();
    if(zoneHint <= 2){ // early zones favor weapons
      slot = roll < 0.45 ? 'weapon' : roll < 0.65 ? 'armor' : roll < 0.85 ? 'shield' : 'implant';
    } else if(zoneHint <= 5){ // mid zones favor armor
      slot = roll < 0.25 ? 'weapon' : roll < 0.55 ? 'armor' : roll < 0.80 ? 'shield' : 'implant';
    } else { // late zones favor implants
      slot = roll < 0.20 ? 'weapon' : roll < 0.35 ? 'armor' : roll < 0.55 ? 'shield' : 'implant';
    }
  } else {
    slot = GEAR_SLOTS[Math.floor(Math.random()*GEAR_SLOTS.length)];
  }
  const names = GEAR_NAMES[slot];
  const name = names[rarity] || names[names.length-1];
  const mult = RARITY_MULT[rarity];
  const basePower = Math.floor((3 + missionLevel * 1.5) * mult);

  // Skill requirement based on rarity and slot
  let reqSkill = -1, reqLevel = 0;
  if(rarity >= 2){ // Rare+ gear has skill requirements
    if(slot === 'weapon'){
      reqSkill = [0,1,2,3][Math.floor(Math.random()*4)]; // combat skill
      reqLevel = Math.floor(5 + rarity * 8 + missionLevel * 0.3);
    } else if(slot === 'armor' || slot === 'shield'){
      reqSkill = 14; // Survival
      reqLevel = Math.floor(3 + rarity * 6 + missionLevel * 0.2);
    } else if(slot === 'implant'){
      reqSkill = [8,11,12][Math.floor(Math.random()*3)]; // Crafting/Enchanting/Hacking
      reqLevel = Math.floor(5 + rarity * 7 + missionLevel * 0.25);
    }
    reqLevel = Math.min(99, reqLevel);
  }

  // Critical craft: 2% chance for a special prefix with stat bonus
  let critPrefix = '';
  let critPowerBonus = 0;
  let critDefBonus = 0;
  if(Math.random() < 0.02){
    const critTypes = [
      { prefix:'Perfected', powerMult:1.15, defMult:1.15 },
      { prefix:'Blessed', powerMult:1.10, defMult:1.20 },
      { prefix:'Cursed', powerMult:1.25, defMult:0.95 },
      { prefix:'Ancient', powerMult:1.12, defMult:1.12 },
      { prefix:'Void-Touched', powerMult:1.18, defMult:1.08 }
    ];
    const ct = critTypes[Math.floor(Math.random()*critTypes.length)];
    critPrefix = ct.prefix + ' ';
    critPowerBonus = ct.powerMult;
    critDefBonus = ct.defMult;
  }

  let finalPower = slot === 'weapon' ? basePower : Math.floor(basePower * 0.3);
  let finalDef = slot === 'armor' || slot === 'shield' ? basePower : Math.floor(basePower * 0.2);
  if(critPowerBonus > 0){ finalPower = Math.floor(finalPower * critPowerBonus); finalDef = Math.floor(finalDef * critDefBonus); }

  return {
    id: Date.now() + Math.random(),
    name: critPrefix + name,
    slot: slot,
    rarity: rarity,
    power: finalPower,
    defense: finalDef,
    level: Math.max(1, Math.floor(missionLevel * mult * 0.5)),
    reqSkill: reqSkill,
    reqLevel: reqLevel,
    critCraft: critPrefix !== ''
  };
}

// ==================== COMBAT ====================
function runCombat(mission, zoneIdx){
  if(G.energy < mission.energy){
    toast('Not enough energy! Need ' + mission.energy, '#f44');
    return;
  }
  G.energy -= mission.energy;

  let playerPower = getCombatPower();
  let playerDef = getCombatDefense();
  const playerSpeed = getCombatSpeed();
  let playerMaxHp = 50 + G.level * 10 + G.stats.defense * 3;
  // Survival skill HP bonuses
  if(G.skillLevels[14] >= 10) playerMaxHp += 30;
  if(G.skillLevels[14] >= 50) playerMaxHp += 60;
  if(G.skillLevels[14] >= 99) playerMaxHp += 100;
  // Synergy: Power Grid
  if(hasSynergy('energy')) playerMaxHp += 10;
  // Potion buffs
  if(G.activeBuff && G.activeBuff.type === 'power') playerPower = Math.floor(playerPower * 1.2);
  if(G.activeBuff && G.activeBuff.type === 'defense') playerDef = Math.floor(playerDef * 1.2);
  // Hunting boss damage bonus
  const huntingBossBonus = (mission.boss && G.skillLevels[7] >= 99) ? 1.25 : (mission.boss && G.skillLevels[7] >= 75) ? 1.15 : 1;
  playerPower = Math.floor(playerPower * huntingBossBonus);
  let playerHp = playerMaxHp;

  let enemyHp = Math.floor(mission.enemyHp * (1 + zoneIdx * 0.15));
  const enemyMaxHp = enemyHp;
  const enemyAtk = Math.floor(mission.enemyAtk * (1 + zoneIdx * 0.1));

  let log = [];
  let turn = 0;
  let won = false;

  // Weather effects
  const weatherId = G.weather || 'clear';
  let weatherSpeedMod = 1;
  let weatherDodgeBonus = 0;
  let weatherLuckBonus = 0;
  let weatherCorruptMod = 1;
  if(weatherId === 'storm') weatherSpeedMod = 0.9;
  if(weatherId === 'harsh_winds') weatherDodgeBonus = 5;
  if(weatherId === 'lucky_stars') weatherLuckBonus = 5;
  if(weatherId === 'void_surge') weatherCorruptMod = 1.1;

  // Combo counter
  let comboCount = 0;
  let maxCombo = 0;

  // Battle Rage meter (#4)
  let rage = 0;

  // Damage recap tracking (#9)
  let totalDmgDealt = 0;
  let totalDmgTaken = 0;
  let critsLanded = 0;
  // Follower damage tracking for MVP (#6)
  let followerDmgMap = {};
  // Enemy shield from special ability (#1)
  let enemyShieldActive = false;

  // Random event tracking
  let bonusGoldEvent = false;
  let enemyEnrageTurns = 0;
  let enemyConfusedTurn = false;

  // Elemental bonus (#2)
  const playerElement = G.element || 'physical';
  const zoneWeakness = ZONE_ELEMENTS[zoneIdx] || 'physical';
  const elementMatch = playerElement === zoneWeakness;

  log.push('--- ' + mission.name + ' ---');
  const wInfo = getWeatherInfo();
  if(weatherId !== 'clear') log.push('Weather: ' + wInfo.name + ' (' + wInfo.desc + ')');
  if(elementMatch) log.push('<span style="color:' + ELEMENT_COLORS[playerElement] + '">ELEMENT MATCH! ' + ELEMENT_NAMES[playerElement] + ' vs weakness! +20% dmg</span>');
  log.push('Your HP: ' + playerHp + ' | Enemy HP: ' + enemyHp);

  while(playerHp > 0 && enemyHp > 0 && turn < 50){
    turn++;

    // Random mid-combat events (~10% per turn)
    if(Math.random() < 0.10){
      const eventRoll = Math.random();
      if(eventRoll < 0.25){
        // Void rift - enemy confused, skips attack
        enemyConfusedTurn = true;
        log.push('  >> A VOID RIFT opens! Enemy confused for this turn!');
      } else if(eventRoll < 0.50){
        // Health pack
        const healAmt = Math.floor(playerMaxHp * 0.15);
        playerHp = Math.min(playerMaxHp, playerHp + healAmt);
        log.push('  >> You find a health pack! +' + healAmt + ' HP');
      } else if(eventRoll < 0.75){
        // Enemy enrage
        enemyEnrageTurns = 2;
        log.push('  >> Enemy ENRAGES! +30% ATK for 2 turns!');
      } else {
        // Lucky find - bonus gold
        bonusGoldEvent = true;
        log.push('  >> Lucky find! Bonus gold at the end of this fight!');
      }
    }

    // Player attacks
    let dmg = Math.max(1, playerPower - Math.floor(enemyAtk * 0.2) + Math.floor(Math.random()*5));
    // Elemental bonus (#2)
    if(elementMatch) dmg = Math.floor(dmg * 1.20);
    // Combo damage bonus
    if(comboCount >= 10) dmg = Math.floor(dmg * 1.20);
    else if(comboCount >= 5) dmg = Math.floor(dmg * 1.10);
    // Enemy shield debuff from special ability (#1)
    if(enemyShieldActive){ dmg = Math.floor(dmg * 0.7); enemyShieldActive = false; }
    // Rage burst (#4)
    if(rage >= 100){
      dmg = Math.floor(dmg * 2);
      log.push('  RAGE BURST! 2x damage unleashed!');
      rage = 0;
    }
    // Weather: corruption damage bonus
    if(weatherCorruptMod > 1 && G.skillLevels[2] > 0) dmg = Math.floor(dmg * weatherCorruptMod);
    // Class passives
    if(G.class === 'striker' && enemyHp < enemyMaxHp * 0.5) dmg = Math.floor(dmg * 1.15);
    if(G.class === 'berserker') dmg = Math.floor(dmg * (1 + (1 - playerHp/playerMaxHp) * 0.01 * 100)); // +1% per 1% HP missing
    if(G.class === 'necromancer'){ playerHp = Math.min(playerMaxHp, playerHp + Math.floor(dmg * 0.08)); } // Soul Siphon
    if(G.class === 'ranger' && turn === 1) dmg = Math.floor(dmg * 2); // Quick Draw: double first turn
    // XP potion buff
    // (handled at XP reward, not here)
    // Combat skill modifiers
    const primary = getPrimaryCombatSkill();
    // Melee bonuses
    if(G.skillLevels[0] >= 10) dmg = Math.floor(dmg * 1.05);
    if(G.skillLevels[0] >= 25) dmg = Math.floor(dmg * 1.08);
    if(G.skillLevels[0] >= 75) dmg = Math.floor(dmg * 1.12);
    if(G.skillLevels[0] >= 99 && playerHp < playerMaxHp * 0.4) dmg = Math.floor(dmg * 1.3); // Berserker
    // Ranged bonuses
    if(G.skillLevels[1] >= 25) dmg += Math.floor(enemyAtk * 0.08); // Pierce
    if(G.skillLevels[1] >= 50) dmg = Math.floor(dmg * 1.1);
    if(G.skillLevels[1] >= 99) dmg = Math.floor(dmg * 1.2); // Deadeye
    // Corruption bonuses
    if(G.skillLevels[2] >= 10) dmg = Math.floor(dmg * 1.05);
    if(G.skillLevels[2] >= 50) dmg = Math.floor(dmg * 1.12);
    // VOID LORD: 12% chance for 2x burst
    if(G.skillLevels[2] >= 99 && Math.random() < 0.12){
      dmg = Math.floor(dmg * 2);
      log.push('  VOID BURST! x2 damage!');
    }
    let corruptionDoT = 0;
    if(G.skillLevels[2] >= 25) corruptionDoT = Math.floor(dmg * 0.08); // Poison DoT
    // Crit chance (stealth)
    // Luck potion
    let critRate = getLuck() + weatherLuckBonus;
    if(G.activeBuff && G.activeBuff.type === 'luck') critRate = Math.floor(critRate * 1.3);
    if(G.skillLevels[3] >= 10) critRate += 3;
    if(G.skillLevels[3] >= 25) critRate += 5;
    if(G.skillLevels[3] >= 99) critRate += 15;
    // Synergy: War Blessing
    if(hasSynergy('crit')) critRate += 10;
    // Talent crit bonus (#14)
    critRate += getTalentLevel('crit') * 3;
    let critMult = 2;
    if(G.skillLevels[3] >= 50) critMult = 2.5;
    // Assassination: only on enemies below 20% HP
    if(G.skillLevels[3] >= 75 && enemyHp < enemyMaxHp * 0.2 && Math.random() < 0.02){ enemyHp = 0; log.push('Turn ' + turn + ': ASSASSINATE! Finished them off!'); }
    let isCrit = false;
    if(Math.random()*100 < critRate && enemyHp > 0){
      // Combo Finisher (#8): combo 7+ and crit = 3x instead of normal crit
      if(comboCount >= 7){
        dmg = Math.floor(dmg * 3);
        log.push('Turn ' + turn + ': FINISHER! x3 CRIT for ' + dmg + ' damage!');
      } else {
        dmg = Math.floor(dmg * critMult);
        log.push('Turn ' + turn + ': You CRIT for ' + dmg + ' damage!');
      }
      isCrit = true;
      critsLanded++;
    } else if(enemyHp > 0){
      log.push('Turn ' + turn + ': You deal ' + dmg + ' damage.');
    }
    // Corruption DoT
    if(corruptionDoT > 0 && enemyHp > 0){ enemyHp -= corruptionDoT; totalDmgDealt += corruptionDoT; }
    // Corruption life drain (5% of dmg)
    if(G.skillLevels[2] >= 75){ playerHp = Math.min(playerMaxHp, playerHp + Math.floor(dmg * 0.05)); }
    // Melee cleave
    if(G.skillLevels[0] >= 50 && Math.random() < 0.25){
      const cleave = Math.floor(dmg * 0.5);
      enemyHp -= cleave;
      totalDmgDealt += cleave;
      log.push('  CLEAVE! +' + cleave + ' bonus damage!');
    }
    // Ranged double tap
    if(G.skillLevels[1] >= 75 && Math.random() < 0.2){
      const dt = Math.floor(dmg * 0.6);
      enemyHp -= dt;
      totalDmgDealt += dt;
      log.push('  DOUBLE TAP! +' + dt + ' bonus damage!');
    }
    enemyHp -= dmg;
    totalDmgDealt += dmg;
    rage += 10; // Rage: +10 per hit dealt (#4)
    comboCount++; // landed a hit
    if(comboCount > maxCombo) maxCombo = comboCount;
    if(comboCount >= 3) log.push('  COMBO x' + comboCount + '!' + (comboCount >= 10 ? ' (+20% dmg)' : comboCount >= 5 ? ' (+10% dmg)' : ''));
    // Show rage every 5 turns (#4)
    if(turn % 5 === 0 && rage > 0 && rage < 100) log.push('  [Rage: ' + rage + '/100]');
    if(enemyHp <= 0){ won = true; break; }

    // Enemy attacks
    // Check if enemy is confused this turn (void rift event)
    if(enemyConfusedTurn){
      log.push('Turn ' + turn + ': Enemy is CONFUSED and stumbles around!');
      enemyConfusedTurn = false;
    } else {
      let eDmg = Math.max(1, enemyAtk - Math.floor(playerDef * 0.3) + Math.floor(Math.random()*3));
      // Enemy enrage buff
      if(enemyEnrageTurns > 0){ eDmg = Math.floor(eDmg * 1.3); enemyEnrageTurns--; }
      // Critical Defense (#5): 8% chance to BLOCK (15% for Tank)
      let blockChance = G.class === 'tank' ? 15 : 8;
      if(Math.random() * 100 < blockChance){
        eDmg = Math.floor(eDmg * 0.4);
        log.push('Turn ' + turn + ': BLOCK! Reduced incoming damage by 60%!');
      }
      // Class passives (defense)
      let dodgeRate = Math.min(35, playerSpeed * 0.5 * weatherSpeedMod);
      if(G.class === 'phantom' && turn <= 2) dodgeRate += 25;
      if(G.class === 'ranger') dodgeRate += 8; // Rangers naturally dodgy
      if(G.skillLevels[3] >= 99) dodgeRate += 10;
      dodgeRate += weatherDodgeBonus; // Weather: harsh winds dodge bonus
      // Talent dodge bonus (#14)
      dodgeRate += getTalentLevel('dodge') * 3;
      if(G.class === 'tank' && playerHp > playerMaxHp * 0.7) eDmg = Math.floor(eDmg * 0.8);
      // Paladin: Divine Shield blocks first hit
      if(G.class === 'paladin' && turn === 1){ eDmg = 0; log.push('Turn 1: DIVINE SHIELD blocks the attack!'); }
      if(Math.random()*100 < dodgeRate && eDmg > 0){
        log.push('Turn ' + turn + ': Enemy attacks but you DODGE!');
        // Counter-Attack (#3): 30% chance after dodge for 50% damage
        if(Math.random() < 0.30){
          const counterDmg = Math.floor(playerPower * 0.5);
          enemyHp -= counterDmg;
          totalDmgDealt += counterDmg;
          log.push('  COUNTER! ' + counterDmg + ' damage!');
          if(enemyHp <= 0){ won = true; break; }
        }
        // Dodge keeps combo alive
      } else {
        playerHp -= eDmg;
        totalDmgTaken += eDmg;
        rage += 20; // Rage: +20 per hit taken (#4)
        comboCount = 0; // took damage, reset combo
        log.push('Turn ' + turn + ': Enemy deals ' + eDmg + ' damage. (HP: ' + Math.max(0,playerHp) + ')');
      }
      // Enemy special abilities (#1): 10% chance after enemy attacks
      if(enemyHp > 0 && Math.random() < 0.10){
        if(zoneIdx <= 2){
          const healAmt = Math.floor(enemyMaxHp * 0.10);
          enemyHp = Math.min(enemyMaxHp, enemyHp + healAmt);
          log.push('  >> Enemy heals 10% HP! (+' + healAmt + ')');
        } else if(zoneIdx <= 5){
          enemyShieldActive = true;
          log.push('  >> Enemy shields! -30% dmg next turn!');
        } else if(zoneIdx <= 8){
          enemyEnrageTurns = Math.max(enemyEnrageTurns, 2);
          log.push('  >> Enemy enrages! +25% ATK for 2 turns!');
        } else {
          const addHp = Math.floor(enemyMaxHp * 0.50);
          enemyHp += addHp;
          log.push('  >> Enemy summons add! +50% HP! (+' + addHp + ')');
        }
      }
      // HP potion auto-use at low HP (Feature 18: respects toggle)
      if(playerHp > 0 && playerHp < playerMaxHp * 0.25 && G.potions.hp > 0 && (G.autoPotionEnabled !== false)){
        G.potions.hp--;
        const heal = Math.floor(playerMaxHp * 0.3);
        playerHp = Math.min(playerMaxHp, playerHp + heal);
        log.push('  Auto-used HP Potion! Healed ' + heal + ' HP');
        if(!G.combatStats) G.combatStats = {totalDmgDealt:0,totalHits:0,totalCrits:0,dodgeCount:0,potionsUsed:0,highestCombo:0};
        G.combatStats.potionsUsed = (G.combatStats.potionsUsed||0) + 1;
      }
    }
  }

  let rewards = { gold:0, xp:0, gear:null, skillXp:{} };

  if(won){
    log.push('=== VICTORY! ===');
    // Damage Recap (#9)
    log.push('--- DAMAGE RECAP ---');
    log.push('Total Damage Dealt: ' + totalDmgDealt + ' | Taken: ' + totalDmgTaken);
    log.push('Turns: ' + turn + ' | Crits: ' + critsLanded);
    G.total_kills++;
    G.missions_completed++;
    if(checkFirstTime('mission_win')){ G.gems += 3; toast('\uD83C\uDFC6 FIRST VICTORY! +3 bonus gems!', '#ffd700'); }
    // Feature 12: Battle Statistics
    if(!G.combatStats) G.combatStats = {totalDmgDealt:0,totalHits:0,totalCrits:0,dodgeCount:0,potionsUsed:0,highestCombo:0};
    G.combatStats.totalDmgDealt = (G.combatStats.totalDmgDealt||0) + totalDmgDealt;
    G.combatStats.totalHits = (G.combatStats.totalHits||0) + turn;
    G.combatStats.totalCrits = (G.combatStats.totalCrits||0) + critsLanded;
    if(maxCombo > (G.combatStats.highestCombo||0)) G.combatStats.highestCombo = maxCombo;
    // Feature 16: Session Stats
    if(!G.sessionStats) G.sessionStats = {gold:0,xp:0,kills:0};
    G.sessionStats.kills = (G.sessionStats.kills||0) + 1;
    // Feature 6: Bounty Hunter Rank
    G.bountiesCompleted = (G.bountiesCompleted||0) + 1;
    updateChallengeProgress('kills', 1);
    recordBestiaryKill(mission.name, mission.gold, mission.xp);
    // Boss kill counter (#8)
    if(!G.bossKillCounts) G.bossKillCounts = {};
    G.bossKillCounts[mission.name] = (G.bossKillCounts[mission.name]||0) + 1;
    if(mission.boss){
      G.bosses_killed++; updateBountyProgress('boss', 1);
      if(checkFirstTime('boss_kill')){ G.gems += 5; toast('\uD83C\uDFC6 FIRST BOSS KILL! +5 bonus gems!', '#ffd700'); }
      if(Math.random() < 0.04){ G.tickets1x = (G.tickets1x||0) + 1; toast('+1 Summon Ticket!','#0ff'); }
      // Blueprint drop (#24): 1% from boss kills
      if(Math.random() < 0.01){
        if(!G.blueprints) G.blueprints = [];
        const bpNames = ['Void Saber Blueprint','Nexus Helm Blueprint','Abyss Guard Blueprint','Omega Implant Blueprint','Titan Gauntlet Blueprint'];
        const bpName = bpNames[Math.floor(Math.random()*bpNames.length)];
        if(!G.blueprints.includes(bpName)){
          G.blueprints.push(bpName);
          log.push('BLUEPRINT DROP: ' + bpName + '!');
          toast('Blueprint found: ' + bpName, '#ffd700');
        }
      }
    }
    updateBountyProgress('kill', 1);

    rewards.gold = Math.floor(mission.gold * (1 + Math.random()*0.3));
    // Overkill Bonus (#10)
    if(Math.abs(enemyHp) > enemyMaxHp * 0.5){
      const overkillBonus = Math.floor(rewards.gold * 0.25);
      rewards.gold += overkillBonus;
      log.push('OVERKILL! +' + overkillBonus + ' bonus gold!');
    }
    rewards.xp = mission.xp;
    rewards.skillXp = mission.skillXp || {};

    // Loot drop chance
    let dropChance = mission.boss ? 50 : 15 + (getLuck() + weatherLuckBonus) * 0.3;
    // Scavenging skill boosts drop rate
    if(G.skillLevels[5] >= 10) dropChance += 5;
    if(G.skillLevels[5] >= 25) dropChance += 5;
    if(G.skillLevels[5] >= 50) dropChance += 3; // Better rarity handled elsewhere
    if(Math.random()*100 < dropChance){
      rewards.gear = generateGear(G.level, mission.boss, zoneIdx);
    }
    // Treasure Map drop (#21): 3% from missions
    if(Math.random() < 0.03){
      if(!G.treasureMaps) G.treasureMaps = 0;
      G.treasureMaps++;
      log.push('You found a TREASURE MAP!');
      toast('+1 Treasure Map!', '#ffd700');
    }

    // XP potion & synergy bonuses
    let xpMult = 1;
    // First zone (Rust Flats) gives 50% more XP to help early game
    if(zoneIdx === 0) xpMult += 0.5;
    if(G.activeBuff && G.activeBuff.type === 'xp') xpMult += 0.25;
    if(hasSynergy('skillxp')) xpMult += 0.08;

    G.gold += rewards.gold;
    G.total_gold_earned += rewards.gold;
    // Feature 16: Session Stats
    if(G.sessionStats) G.sessionStats.gold = (G.sessionStats.gold||0) + rewards.gold;
    if(G.sessionStats) G.sessionStats.xp = (G.sessionStats.xp||0) + Math.floor(rewards.xp * xpMult);
    addXp(Math.floor(rewards.xp * xpMult));
    for(const sk in rewards.skillXp){
      addSkillXp(parseInt(sk), Math.floor(rewards.skillXp[sk] * xpMult));
    }
    if(rewards.gear){
      // Auto-sell check (#3)
      if(G.autoSellRarity >= 0 && rewards.gear.rarity < G.autoSellRarity){
        const autoPrice = rewards.gear.level * (rewards.gear.rarity+1) * 3;
        G.gold += autoPrice; G.total_gold_earned += autoPrice;
        log.push('Auto-sold: ' + rewards.gear.name + ' [' + RARITY_NAMES[rewards.gear.rarity] + '] for ' + autoPrice + 'g');
        rewards.gear = null;
      } else {
        G.inventory.push(rewards.gear);
        log.push('LOOT: ' + rewards.gear.name + ' [' + RARITY_NAMES[rewards.gear.rarity] + ']' + (rewards.gear.critCraft ? ' ★CRITICAL CRAFT★' : ''));
      }
    }
    log.push('+' + rewards.gold + ' gold, +' + Math.floor(rewards.xp * xpMult) + ' XP');
    addFactionRep(1 + (mission.boss ? 5 : 0));
    addWinStreak();
    // Apply streak multiplier to rewards
    rewards.gold = Math.floor(rewards.gold * getStreakMult());
    checkTitles();
    // Lore fragment chance
    if(Math.random() < 0.02){ const lf = findLoreFragment(); if(lf) log.push('LORE: Found "'+lf.piece+'" ('+lf.set+')'); }
    // Tiny ticket chance on any mission win
    if(Math.random() < 0.008){
      G.tickets1x = (G.tickets1x||0) + 1;
      log.push('+1 Summon Ticket!');
    }
    // Bonus gold from random event
    if(bonusGoldEvent){
      const bonus = Math.floor(rewards.gold * 0.5) + 10;
      G.gold += bonus; G.total_gold_earned += bonus;
      rewards.gold += bonus;
      log.push('Lucky find bonus: +' + bonus + ' gold!');
    }
    // Lucky drop: 0.5% chance for Mystery Box on any kill
    if(Math.random() < 0.005){
      log.push('A shimmering MYSTERY BOX drops!');
      const boxReward = awardMysteryBox();
      log.push('Mystery Box: ' + boxReward);
    }
    // Resource drops from missions (#10)
    const resTypes = ['ore','scrap','data','bio'];
    const resDrop = resTypes[Math.floor(Math.random()*resTypes.length)];
    const resAmt = 1 + Math.floor(Math.random()*3);
    addResource(resDrop, resAmt);
    log.push('+' + resAmt + ' ' + resDrop);

    // Turn counter (#16)
    log.push('Completed in ' + turn + ' turns.');
    if(!G.fastestKills) G.fastestKills = {};
    if(!G.fastestKills[mission.name] || turn < G.fastestKills[mission.name]){
      G.fastestKills[mission.name] = turn;
      if(G.fastestKills[mission.name] <= turn) log.push('New fastest kill: ' + turn + ' turns!');
    }
    if(!G.records) G.records = {};
    if(!G.records.fastestKill || turn < G.records.fastestKill) G.records.fastestKill = turn;

    // Max combo display & tracking
    if(maxCombo >= 3) log.push('Max Combo: x' + maxCombo);
    if(!G._maxComboEver || maxCombo > G._maxComboEver) G._maxComboEver = maxCombo;
    // Weather luck bonus for loot
    if(weatherLuckBonus > 0) log.push('Lucky Stars granted +' + weatherLuckBonus + ' luck this fight.');
    // Track win with 1 HP for secret achievement
    if(playerHp === 1) G._wonWith1Hp = true;
    // Post-combat MVP (#6)
    const combatFollowersForMVP = G.followers.filter(f => f.assigned === 'combat' && f.happiness > 20);
    if(combatFollowersForMVP.length > 0){
      let mvp = combatFollowersForMVP[0], mvpDmg = 0;
      combatFollowersForMVP.forEach(f => {
        const fDmg = Math.floor(f.level * f.power * (f.rarity+1) * 0.1);
        if(fDmg > mvpDmg){ mvpDmg = fDmg; mvp = f; }
      });
      log.push('MVP: ' + (mvp.name||'Unknown') + ' contributed ~' + mvpDmg + ' equivalent damage!');
    }
    // Artifact fragment drop (#23) from nightmare zones 7+
    if(zoneIdx >= 7 && Math.random() < 0.05){
      G.artifactFragments = (G.artifactFragments||0) + 1;
      log.push('+1 Artifact Fragment! (' + G.artifactFragments + '/10)');
      toast('+1 Artifact Fragment!', '#ff2060');
    }
  } else {
    log.push('=== DEFEAT ===');
    log.push('You were overwhelmed...');
    resetWinStreak();
  }

  // Decrement potion buff
  if(G.activeBuff){
    G.activeBuff.turnsLeft--;
    if(G.activeBuff.turnsLeft <= 0){ G.activeBuff = null; }
  }

  G.combatLog = log;
  G._lastCombatMission = {mission, zoneIdx}; // For quick repeat (#12)
  G._lastCombatStats = {
    enemyName: mission.name, playerName: G.name||'Player',
    playerHp: Math.max(0,playerHp), playerMaxHp: playerMaxHp,
    enemyMaxHp: enemyMaxHp, dmgDealt: totalDmgDealt, dmgTaken: totalDmgTaken,
    turns: turn, crits: critsLanded, maxCombo: maxCombo, isBoss: !!mission.boss
  };
  checkAchievements();
  save();
  showCombatResult(log, won, rewards);
}

function showCombatResult(log, won, rewards){
  const cs = G._lastCombatStats || {};
  const rarityColors = ['#999','#0f0','#5588ff','#b026ff','#ffd700','#ff2060'];
  let html = '<div class="text-center">';

  // Victory/Defeat banner
  if(won){
    html += '<div style="font-size:28px;margin:16px 0;color:#ffd700;text-shadow:0 0 12px rgba(255,215,0,0.5)">⚔ VICTORY ⚔</div>';
  } else {
    html += '<div style="font-size:28px;margin:16px 0;color:#f44;text-shadow:0 0 12px rgba(255,68,68,0.5)">💀 DEFEAT 💀</div>';
  }

  // VS header
  html += '<div style="display:flex;align-items:center;justify-content:center;gap:20px;margin:12px 0">';
  html += '<div style="font-size:16px;color:#0ff;font-weight:700">' + (cs.playerName||'Player') + '</div>';
  html += '<div style="font-size:14px;color:#888">VS</div>';
  html += '<div style="font-size:16px;color:#f44;font-weight:700">' + (cs.isBoss?'💀 ':'') + (cs.enemyName||'Enemy') + '</div>';
  html += '</div>';

  // HP bars
  var playerHpPct = cs.playerMaxHp ? Math.max(0,Math.floor((cs.playerHp/cs.playerMaxHp)*100)) : (won?50:0);
  var enemyHpPct = won ? 0 : 100;
  html += '<div style="display:flex;gap:16px;margin:12px auto;max-width:500px">';

  html += '<div style="flex:1"><div class="text-sm" style="color:#f44;margin-bottom:4px">Enemy HP</div>';
  html += '<div class="pbar" style="border-color:#f44"><div class="pbar-fill" style="width:'+enemyHpPct+'%;background:#f44"></div>';
  html += '<span class="pbar-text">' + (won?'0':'???') + ' / ' + (cs.enemyMaxHp||'?') + '</span></div></div>';
  html += '</div>';

  // Gold/XP big numbers
  if(won && rewards.gold){
    html += '<div style="display:flex;justify-content:center;gap:24px;margin:16px 0">';
    html += '<div style="font-size:22px;color:#ffd700;font-weight:700">+' + rewards.gold + ' <span style="font-size:14px">gold</span></div>';
    html += '<div style="font-size:22px;color:#0ff;font-weight:700">+' + rewards.xp + ' <span style="font-size:14px">xp</span></div>';

  html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px auto;max-width:500px">';
  html += '<div class="card" style="text-align:center;padding:8px"><div class="text-sm text-dim">Damage Dealt</div><div style="font-size:18px;color:#0f0;font-weight:700">' + (cs.dmgDealt||0) + '</div></div>';
  html += '<div class="card" style="text-align:center;padding:8px"><div class="text-sm text-dim">Damage Taken</div><div style="font-size:18px;color:#f44;font-weight:700">' + (cs.dmgTaken||0) + '</div></div>';
  html += '<div class="card" style="text-align:center;padding:8px"><div class="text-sm text-dim">Turns</div><div style="font-size:18px;color:#fff;font-weight:700">' + (cs.turns||'?') + '</div></div>';
  html += '<div class="card" style="text-align:center;padding:8px"><div class="text-sm text-dim">Crits</div><div style="font-size:18px;color:#ffd700;font-weight:700">' + (cs.crits||0) + '</div></div>';
  html += '</div>';
  if(cs.maxCombo && cs.maxCombo >= 3){
    html += '<div class="text-sm" style="color:#ffd700;margin:4px 0">Max Combo: x' + cs.maxCombo + '</div>';
  }

  // Loot card
  if(won && rewards.gear){
    html += '<div style="margin:12px auto;max-width:400px">';
    html += '<div class="text-sm text-dim" style="margin-bottom:4px">LOOT DROP</div>';
    html += '<div class="card" style="border-color:'+rarityColors[rewards.gear.rarity]+';border-width:2px;text-align:center;padding:12px">';
    html += '<div class="' + RARITIES[rewards.gear.rarity] + '" style="font-size:16px;font-weight:700">' + rewards.gear.name + '</div>';

    html += '<div style="display:flex;justify-content:center;gap:16px;margin-top:8px">';
    html += '<span style="color:#0ff">PWR: ' + rewards.gear.power + '</span>';
    html += '<span style="color:#0f0">DEF: ' + rewards.gear.defense + '</span>';
    html += '</div></div></div>';
  }

  html += '</div>';

  // Collapsible battle log
  var logHtml = '<div class="log" style="max-height:300px">';
  log.forEach(function(line){
    var cls = '';
    if(line.includes('You deal') || line.includes('CRIT')) cls = 'dmg-enemy';
    else if(line.includes('Enemy deals')) cls = 'dmg-player';
    else if(line.includes('DODGE')) cls = 'heal';
    else if(line.includes('VICTORY')) cls = 'heal';
    else if(line.includes('DEFEAT')) cls = 'dmg-player';
    else if(line.includes('LOOT')) cls = 'legendary';
    else if(line.includes('COUNTER') || line.includes('BLOCK') || line.includes('RAGE BURST')) cls = 'heal';
    else if(line.includes('OVERKILL') || line.includes('FINISHER')) cls = 'legendary';
    else if(line.includes('DAMAGE RECAP')) cls = 'dmg-enemy';
    logHtml += '<div class="log-line ' + cls + '">' + line + '</div>';
  });
  logHtml += '</div>';
  html += collapseSection('combat-log', '📜 Battle Log (' + log.length + ' lines)', logHtml, false);

  // Action buttons
  if(won && G._lastCombatMission){
    html += '<div class="mt" style="text-align:center">';
    html += '<button class="btn btn-green" style="width:100%;padding:14px;font-size:16px;margin-bottom:8px" onclick=\'runCombat(' + JSON.stringify(G._lastCombatMission.mission).replace(/'/g,"\\'") + ',' + G._lastCombatMission.zoneIdx + ')\'>⚔ Run Again</button>';
    html += '<button class="btn" style="padding:8px 20px;font-size:12px;opacity:0.7" onclick="showTab(\'missions\')">Continue</button>';
    html += '</div>';
  } else {
    html += '<div class="mt" style="text-align:center"><button class="btn btn-cyan" onclick="showTab(\'missions\')">Continue</button></div>';
  }
  document.getElementById('content').innerHTML = html;
}

// ==================== DUNGEONS (Multi-wave) ====================
const DUNGEONS = [
  {name:'Scrap Pit',minLv:5,waves:3,energy:25,baseHp:80,baseAtk:8,goldMult:3,xpMult:3,desc:'3 waves of junk bots'},
  {name:'Neon Catacombs',minLv:15,waves:4,energy:40,baseHp:200,baseAtk:18,goldMult:4,xpMult:4,desc:'4 waves of undercity gangs'},
  {name:'Void Rift Alpha',minLv:30,waves:5,energy:60,baseHp:500,baseAtk:35,goldMult:5,xpMult:5,desc:'5 waves + Rift Boss'},
  {name:'Iron Gauntlet',minLv:45,waves:6,energy:80,baseHp:900,baseAtk:55,goldMult:6,xpMult:6,desc:'6 waves of war machines'},
  {name:'Abyssal Depths',minLv:60,waves:7,energy:100,baseHp:1500,baseAtk:85,goldMult:8,xpMult:8,desc:'7 waves into the void'},
  {name:'Nexus Trials',minLv:80,waves:8,energy:130,baseHp:2500,baseAtk:130,goldMult:10,xpMult:10,desc:'8 waves, legendary loot'},
  {name:'VOID HEART GAUNTLET',minLv:95,waves:10,energy:180,baseHp:4000,baseAtk:200,goldMult:15,xpMult:15,desc:'10 waves, mythic chance'}
];

function runDungeon(dungeonIdx, nightmare){
  const dg = DUNGEONS[dungeonIdx];
  if(G.level < dg.minLv){ toast('Need level ' + dg.minLv,'#f44'); return; }
  if(nightmare && !isNightmareUnlocked(dungeonIdx)){ toast('Clear normal first!','#f44'); return; }
  // Key check
  const keyType = getKeyTypeForDungeon(dungeonIdx);
  if(!G.dungeonKeys) G.dungeonKeys = {};
  if((G.dungeonKeys[keyType]||0) <= 0){ toast('Need a '+KEY_TYPES[keyType].name+'!','#f44'); return; }
  const energyCost = nightmare ? Math.floor(dg.energy * 1.5) : dg.energy;
  if(G.energy < energyCost){ toast('Need ' + energyCost + ' energy','#f44'); return; }
  G.dungeonKeys[keyType]--;
  G.energy -= energyCost;
  const nmMult = nightmare ? NIGHTMARE_MULT : {hp:1,atk:1,goldMult:1,xpMult:1};

  const playerPower = getCombatPower();
  const playerDef = getCombatDefense();
  const playerSpeed = getCombatSpeed();
  let playerMaxHp = 50 + G.level * 10 + G.stats.defense * 3;
  if(G.skillLevels[14] >= 10) playerMaxHp += 50;
  if(G.skillLevels[14] >= 50) playerMaxHp += 100;
  let playerHp = playerMaxHp;

  let log = [];
  let totalGold = 0, totalXp = 0;
  let lootDrops = [];
  let wavesCleared = 0;

  log.push('=== DUNGEON: ' + dg.name + ' ===');

  for(let wave = 1; wave <= dg.waves; wave++){
    const isFinalWave = wave === dg.waves;
    const waveScale = 1 + (wave - 1) * 0.3;
    let enemyHp = Math.floor(dg.baseHp * waveScale * (isFinalWave ? 2.5 : 1) * nmMult.hp);
    let enemyAtk = Math.floor(dg.baseAtk * waveScale * (isFinalWave ? 1.8 : 1) * nmMult.atk);
    const enemyName = (nightmare?'NM ':'') + dg.name + ' W' + wave;
    const huntingBossBonus = (isFinalWave && G.skillLevels[7] >= 99) ? 1.25 : (isFinalWave && G.skillLevels[7] >= 75) ? 1.15 : 1;
    let wavePower = Math.floor(playerPower * huntingBossBonus);

    log.push('--- Wave ' + wave + '/' + dg.waves + (isFinalWave ? ' [BOSS]' : '') + ' ---');
    log.push('Enemy HP: ' + enemyHp + ' | Your HP: ' + playerHp);

    let turn = 0;
    while(playerHp > 0 && enemyHp > 0 && turn < 40){
      turn++;
      let dmg = Math.max(1, wavePower - Math.floor(enemyAtk * 0.15) + Math.floor(Math.random()*5));
      // Skill bonuses (simplified for dungeon speed)
      if(G.skillLevels[0] >= 50 && Math.random() < 0.25) dmg = Math.floor(dmg * 1.5);
      if(G.skillLevels[2] >= 25) enemyHp -= Math.floor(dmg * 0.1); // DoT
      if(G.skillLevels[2] >= 75) playerHp = Math.min(playerMaxHp, playerHp + Math.floor(dmg * 0.08));
      let critRate = getLuck();
      if(G.skillLevels[3] >= 10) critRate += 5;
      if(G.skillLevels[3] >= 25) critRate += 5;
      let critMult = G.skillLevels[3] >= 50 ? 3 : 2;
      if(Math.random()*100 < critRate){ dmg = Math.floor(dmg * critMult); log.push('W'+wave+' T'+turn+': CRIT ' + dmg + '!'); }
      else { log.push('W'+wave+' T'+turn+': Hit ' + dmg); }
      if(G.skillLevels[3] >= 75 && Math.random() < 0.02){ enemyHp = 0; log.push('ASSASSINATE!'); }
      if(G.skillLevels[1] >= 75 && Math.random() < 0.2){ const dt = Math.floor(dmg*0.5); enemyHp -= dt; log.push('  Double tap +'+dt); }
      enemyHp -= dmg;
      if(enemyHp <= 0) break;

      let eDmg = Math.max(1, enemyAtk - Math.floor(playerDef * 0.3) + Math.floor(Math.random()*3));
      if(Math.random()*100 < Math.min(30, playerSpeed * 0.5)){
        log.push('W'+wave+' T'+turn+': DODGE!');
      } else {
        playerHp -= eDmg;
        log.push('W'+wave+' T'+turn+': Took ' + eDmg + ' (HP:' + Math.max(0,playerHp) + ')');
      }
    }

    if(enemyHp <= 0){
      wavesCleared++;
      G.total_kills++;
      let waveGold = Math.floor(dg.goldMult * wave * (10 + G.level) * (isFinalWave ? 3 : 1));
      let waveXp = Math.floor(dg.xpMult * wave * (5 + G.level) * (isFinalWave ? 3 : 1));
      totalGold += waveGold; totalXp += waveXp;
      log.push('Wave ' + wave + ' cleared! +' + waveGold + 'g +' + waveXp + 'xp');

      // Loot per wave (higher chance on later waves)
      let dropChance = 10 + wave * 8 + getLuck() * 0.3;
      if(G.skillLevels[5] >= 10) dropChance += 5;
      if(G.skillLevels[5] >= 25) dropChance += 5;
      if(isFinalWave) dropChance += 30;
      if(Math.random()*100 < dropChance){
        const gear = generateGear(G.level + wave * 2, isFinalWave);
        G.inventory.push(gear);
        lootDrops.push(gear);
        log.push('LOOT: ' + gear.name + ' [' + RARITY_NAMES[gear.rarity] + ']');
      }
      // Heal between waves
      playerHp = Math.min(playerMaxHp, playerHp + Math.floor(playerMaxHp * 0.15));
    } else {
      log.push('=== WIPED on Wave ' + wave + '! ===');
      break;
    }
  }

  if(wavesCleared === dg.waves){
    log.push('=== ' + (nightmare?'NIGHTMARE ':'') + 'DUNGEON COMPLETE! ===');
    G.bosses_killed++;
    G.dungeons_cleared++;
    if(checkFirstTime('dungeon_clear')){ G.gems += 5; G.tickets1x = (G.tickets1x||0) + 1; toast('\uD83C\uDFC6 FIRST DUNGEON CLEAR! +5 gems, +1 ticket!', '#ffd700'); }
    if(!G.bossKillCounts) G.bossKillCounts = {};
    G.bossKillCounts[dg.name] = (G.bossKillCounts[dg.name]||0) + 1;
    if(nightmare){
      G.nightmareClears = (G.nightmareClears||0) + 1;
      // Artifact fragment drop from nightmare dungeons (#23)
      if(Math.random() < 0.15){
        G.artifactFragments = (G.artifactFragments||0) + 1;
        log.push('+1 Artifact Fragment! (' + G.artifactFragments + '/10)');
        toast('+1 Artifact Fragment!', '#ff2060');
      }
    }
    updateBountyProgress('dungeon', wavesCleared);
    if(nightmare) updateChallengeProgress('nightmare', 1);
    updateChallengeProgress('dungeons', 1);
    // Bonus completion reward (nightmare = extra)
    const completionMult = nightmare ? 2.5 : 1.5;
    totalGold = Math.floor(totalGold * completionMult * nmMult.goldMult);
    totalXp = Math.floor(totalXp * completionMult * nmMult.xpMult);
    // Relic drop chance (dungeons and nightmare)
    const relicChance = nightmare ? 0.15 : 0.03;
    if(Math.random() < relicChance){
      const relic = dropRelic();
      if(relic) log.push('RELIC FOUND: ' + relic.name + ' - ' + relic.desc + '!');
    }
    // Gem reward for dungeon clear
    const gemReward = Math.floor(dg.waves * 0.5);
    G.gems += gemReward;
    log.push('Completion bonus! +' + gemReward + ' gems!');
    // Ticket drop from dungeon
    if(Math.random() < 0.06){
      G.tickets1x = (G.tickets1x||0) + 1;
      log.push('+1 Summon Ticket!');
    }
    if(dg.waves >= 8 && Math.random() < 0.03){
      G.tickets10x = (G.tickets10x||0) + 1;
      log.push('+1 10x Summon Ticket!!');
    }
  } else {
    log.push('Cleared ' + wavesCleared + '/' + dg.waves + ' waves.');
  }

  G.gold += totalGold;
  G.total_gold_earned += totalGold;
  addXp(totalXp);
  G.missions_completed += wavesCleared;
  log.push('Total: +' + totalGold + 'g +' + totalXp + 'xp, ' + lootDrops.length + ' items');

  checkAchievements();
  save();
  showDungeonResult(log, wavesCleared, dg.waves, lootDrops);
}

function showDungeonResult(log, cleared, total, loot){
  const complete = cleared === total;
  const rarityColors = ['#999','#0f0','#5588ff','#b026ff','#ffd700','#ff2060'];
  let html = '<div class="text-center">';

  // Banner
  if(complete){
    html += '<div style="font-size:28px;margin:16px 0;color:#ffd700;text-shadow:0 0 12px rgba(255,215,0,0.5)">🏰 DUNGEON COMPLETE 🏰</div>';
  } else {
    html += '<div style="font-size:28px;margin:16px 0;color:#f44;text-shadow:0 0 12px rgba(255,68,68,0.5)">🏰 DUNGEON FAILED 🏰</div>';
  }

  // Wave progress indicator
  html += '<div style="display:flex;justify-content:center;gap:6px;margin:12px 0;flex-wrap:wrap">';
  for(var w = 1; w <= total; w++){
    var waveCleared = w <= cleared;
    var isBossWave = w === total;
    var bgColor = waveCleared ? (isBossWave ? '#ffd700' : '#0f0') : '#333';
    var borderColor = isBossWave ? '#ffd700' : (waveCleared ? '#0f0' : '#555');
    html += '<div style="width:40px;height:40px;border-radius:8px;background:'+bgColor+';border:2px solid '+borderColor+';display:flex;align-items:center;justify-content:center;font-weight:700;color:'+(waveCleared?'#000':'#666')+';font-size:12px">';
    html += (isBossWave ? '💀' : 'W'+w);
    html += '</div>';
  }
  html += '</div>';
  html += '<div class="text-sm" style="color:'+(complete?'#0f0':'#f44')+'">Waves Cleared: ' + cleared + ' / ' + total + '</div>';

  // Extract gold/xp totals from log
  var totalLine = log.find(function(l){ return l.startsWith('Total:'); }) || '';
  var goldMatch = totalLine.match(/\+(\d+)g/);
  var xpMatch = totalLine.match(/\+(\d+)xp/);
  var totalGold = goldMatch ? goldMatch[1] : '0';
  var totalXp = xpMatch ? xpMatch[1] : '0';

  // Big reward numbers
  html += '<div style="display:flex;justify-content:center;gap:24px;margin:16px 0">';
  html += '<div style="font-size:22px;color:#ffd700;font-weight:700">+' + totalGold + ' <span style="font-size:14px">gold</span></div>';
  html += '<div style="font-size:22px;color:#0ff;font-weight:700">+' + totalXp + ' <span style="font-size:14px">xp</span></div>';
  html += '<div style="font-size:16px;color:#b026ff;font-weight:700">' + loot.length + ' <span style="font-size:14px">items</span></div>';
  html += '</div>';

  // Loot cards
  if(loot.length > 0){
    html += '<div class="text-sm text-dim" style="margin:8px 0">LOOT DROPS</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:8px 0">';
    loot.forEach(function(g){
      html += '<div class="card" style="border-color:'+rarityColors[g.rarity]+';border-width:2px;padding:10px;min-width:140px;text-align:center">';
      html += '<div class="' + RARITIES[g.rarity] + '" style="font-weight:700">' + g.name + '</div>';
      html += '<div class="text-sm" style="color:'+rarityColors[g.rarity]+'">[ ' + RARITY_NAMES[g.rarity] + ' ]</div>';
      html += '<div style="display:flex;justify-content:center;gap:12px;margin-top:6px">';
      html += '<span class="text-sm" style="color:#0ff">PWR:' + g.power + '</span>';
      html += '<span class="text-sm" style="color:#0f0">DEF:' + g.defense + '</span>';
      html += '</div></div>';
    });
    html += '</div>';
  }

  html += '</div>';

  // Collapsible battle log
  var logHtml = '<div class="log" style="max-height:300px">';
  log.forEach(function(line){
    var cls = '';
    if(line.includes('CRIT') || line.includes('Hit ') || line.includes('Double tap')) cls = 'dmg-enemy';
    else if(line.includes('Took ')) cls = 'dmg-player';
    else if(line.includes('DODGE') || line.includes('REVIVE') || line.includes('COMPLETE')) cls = 'heal';
    else if(line.includes('LOOT')) cls = 'legendary';
    else if(line.includes('ASSASSINATE')) cls = 'epic';
    logHtml += '<div class="log-line ' + cls + '">' + line + '</div>';
  });
  logHtml += '</div>';
  html += collapseSection('dungeon-log', '📜 Battle Log (' + log.length + ' lines)', logHtml, false);

  // Action button
  html += '<div class="mt" style="text-align:center"><button class="btn btn-cyan" onclick="showTab(\'missions\')">Continue</button></div>';
  document.getElementById('content').innerHTML = html;
}

// ==================== BOUNTY BOARD ====================
function generateBounties(){
  const bounties = [];
  const types = [
    {name:'Kill Contract',desc:'Eliminate targets',type:'kill',target:5+G.level,gold:50+G.level*8,xp:30+G.level*5,gems:1},
    {name:'Gather Intel',desc:'Hack data nodes',type:'hack',target:3+Math.floor(G.level/3),gold:40+G.level*6,xp:25+G.level*4,gems:1},
    {name:'Ore Requisition',desc:'Mine raw materials',type:'mine',target:4+Math.floor(G.level/2),gold:35+G.level*5,xp:20+G.level*3,gems:0},
    {name:'Scavenge Run',desc:'Find salvage',type:'scavenge',target:4+Math.floor(G.level/2),gold:30+G.level*5,xp:25+G.level*4,gems:1},
    {name:'Boss Bounty',desc:'Slay a boss',type:'boss',target:1,gold:100+G.level*15,xp:80+G.level*10,gems:2},
    {name:'Dungeon Dive',desc:'Clear dungeon waves',type:'dungeon',target:3,gold:80+G.level*12,xp:60+G.level*8,gems:2},
    {name:'Training Regimen',desc:'Train any skill',type:'train',target:5+Math.floor(G.level/3),gold:25+G.level*4,xp:20+G.level*3,gems:0},
  ];
  // Pick 3-4 random bounties
  const count = 3 + (G.skillLevels[12] >= 50 ? 1 : 0);
  const shuffled = types.sort(() => Math.random() - 0.5);
  for(let i = 0; i < Math.min(count, shuffled.length); i++){
    bounties.push({...shuffled[i], progress:0, completed:false, claimed:false});
  }
  return bounties;
}

function refreshBounties(){
  G.bounties = generateBounties();
  G.bountyRefreshTime = Date.now();
  save();
}

function claimBounty(idx){
  const b = G.bounties[idx];
  if(!b || !b.completed || b.claimed) return;
  b.claimed = true;
  G.gold += b.gold;
  G.total_gold_earned += b.gold;
  addXp(b.xp);
  if(b.gems > 0) G.gems += b.gems;
  let bmsg = 'Bounty claimed! +' + b.gold + 'g +' + b.xp + 'xp' + (b.gems > 0 ? ' +' + b.gems + ' gems' : '');
  // Boss and dungeon bounties have ticket chance
  if((b.type === 'boss' || b.type === 'dungeon') && Math.random() < 0.08){
    G.tickets1x = (G.tickets1x||0) + 1;
    bmsg += ' +1 Summon Ticket!';
  }
  toast(bmsg, '#ffd700');
  checkAchievements();
  save();
  showTab('missions');
}

// Track bounty progress (called after relevant actions)
function updateBountyProgress(type, amount){
  if(!G.bounties) return;
  G.bounties.forEach(b => {
    if(b.completed || b.claimed) return;
    if(b.type === type){
      b.progress = Math.min(b.target, b.progress + amount);
      if(b.progress >= b.target){
        b.completed = true;
        toast('Bounty complete: ' + b.name + '!', '#ffd700');
      }
    }
  });
}

// ==================== ENCHANTING SYSTEM ====================
function getEnchantCost(item){
  return Math.floor(50 * (item.rarity + 1) * (item.level + 1) * 0.5);
}

function enchantReroll(invIdx){
  if(G.skillLevels[11] < 10){ toast('Need Enchanting Lv.10','#f44'); return; }
  const item = G.inventory[invIdx];
  if(!item) return;
  const cost = getEnchantCost(item);
  if(G.gold < cost){ toast('Need ' + cost + ' gold','#f44'); return; }
  G.gold -= cost;

  // Reroll one stat randomly
  const variance = G.skillLevels[11] >= 99 ? 0.1 : (G.skillLevels[11] >= 75 ? 0.15 : 0.3);
  const basePower = Math.floor((3 + item.level * 1.5) * RARITY_MULT[item.rarity]);
  if(Math.random() < 0.5){
    item.power = Math.floor(basePower * (item.slot === 'weapon' ? 1 : 0.3) * (1 + (Math.random() * 0.4 - variance)));
  } else {
    item.defense = Math.floor(basePower * (item.slot === 'armor' || item.slot === 'shield' ? 1 : 0.2) * (1 + (Math.random() * 0.4 - variance)));
  }
  toast('Rerolled ' + item.name + ' stats!', '#b026ff');
  save();
  showTab('gear');
}

function enchantBoost(invIdx){

  const item = G.inventory[invIdx];
  if(!item) return;

  if(G.gold < cost){ toast('Need ' + cost + ' gold','#f44'); return; }
  G.gold -= cost;

  item.power = Math.floor(item.power * (1 + boost));
  item.defense = Math.floor(item.defense * (1 + boost));
  item.level += 1;
  toast(item.name + ' boosted! +' + Math.floor(boost*100) + '% stats!', '#ffd700');

  showTab('gear');
}

function enchantUpgradeRarity(invIdx){
  if(G.skillLevels[11] < 50){ toast('Need Enchanting Lv.50','#f44'); return; }
  const item = G.inventory[invIdx];
  if(!item || item.rarity >= 5) return;
  const cost = getEnchantCost(item) * 5;
  if(G.gold < cost){ toast('Need ' + cost + ' gold','#f44'); return; }
  G.gold -= cost;

    const names = GEAR_NAMES[item.slot];
    item.name = names[item.rarity] || names[names.length-1];
    item.power = Math.floor(item.power * RARITY_MULT[item.rarity] / RARITY_MULT[item.rarity-1]);
    item.defense = Math.floor(item.defense * RARITY_MULT[item.rarity] / RARITY_MULT[item.rarity-1]);
    toast('SUCCESS! ' + item.name + ' upgraded to ' + RARITY_NAMES[item.rarity] + '!', '#ffd700');
  } else {
    toast('Upgrade failed... item preserved.', '#f44');
  }
