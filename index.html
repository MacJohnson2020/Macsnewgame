// ==================== GAME LOOP ====================
let energyTimer = 0;
let saveTimer = 0;
let goldTimer = 0;
let followerTimer = 0;

function gameLoop(){
  if(!G) return;

  // Energy regen
  energyTimer++;
  const regenRate = getEnergyRegenRate();
  const regenTicks = Math.floor(regenRate); // ticks per energy (1 tick = 1 second)
  if(energyTimer >= regenTicks){
    energyTimer = 0;
    if(G.energy < getMaxEnergy()){
      G.energy++;
    }
  }

  // Passive gold
  goldTimer++;
  if(goldTimer >= 60){ // every 60 seconds
    goldTimer = 0;
    const gpm = getGoldPerMin();
    if(gpm > 0){
      G.gold += gpm;
    }
    // Feature 1: Stock Market price fluctuation (every minute)
    if(G.stockPrices){
      const stocks = ['VoidCorp','NeonTech','IronWorks','BioGen','CryptoVoid'];
      stocks.forEach(s => {
        const change = 1 + (Math.random() * 0.10 - 0.05); // +-5%
        G.stockPrices[s] = Math.max(1, Math.floor((G.stockPrices[s]||100) * change));
      });
    }
    // Feature 2: Crafting Queue - process 1 craft every 30 seconds (check every 2nd tick)
    // (handled below at 30s intervals)
  }

  // Feature 2: Crafting Queue processing (every 30 seconds)
  if(energyTimer % 30 === 0 && G.craftQueue && G.craftQueue.length > 0){
    const nextIdx = G.craftQueue.shift();
    if(nextIdx !== undefined && RECIPES[nextIdx]){
      const r = RECIPES[nextIdx];
      const canCraft = Object.keys(r.reqs).every(sk => G.skillLevels[parseInt(sk)] >= r.reqs[sk]) && G.gold >= r.cost;
      if(canCraft){
        G.gold -= r.cost;
        const mult = RARITY_MULT[r.rarity];
        const basePower = Math.floor((3 + G.level * 1.5) * mult);
        const gear = {
          id: Date.now()+Math.random(), name: r.name, slot: r.slot, rarity: r.rarity,
          power: r.slot==='weapon' ? basePower : Math.floor(basePower*0.3),
          defense: (r.slot==='armor'||r.slot==='shield') ? basePower : Math.floor(basePower*0.2),
          level: Math.max(1, Math.floor(G.level * mult * 0.5)),
          reqSkill:-1, reqLevel:0
        };
        G.inventory.push(gear);
        toast('Queue crafted: ' + r.name + '!', '#ffd700');
      } else {
        toast('Queue craft failed (missing reqs): ' + r.name, '#f44');
      }
    }
  }

  // Feature 3: Gem Mine passive income (every 5 min = 300 seconds)
  if(energyTimer % 300 === 0){
    const gemMineLv = getAllBuildingLevel('gemmine');
    if(gemMineLv > 0){
      const gemsEarned = Math.floor(gemMineLv / 3);
      if(gemsEarned > 0){
        G.gems += gemsEarned;
        toast('Gem Mine produced ' + gemsEarned + ' gem(s)!', '#b026ff');
      }
    }
    // Feature 4: Follower Salary - deduct 1 gold per excess follower over 10
    if(G.followers.length > 10){
      const excess = G.followers.length - 10;
      const salaryCost = excess;
      if(G.gold >= salaryCost){
        G.gold -= salaryCost;
        toast('Follower salaries: -' + salaryCost + 'g (' + excess + ' excess followers)', '#f80');
      } else {
        toast('Cannot pay follower salaries! (' + excess + ' excess followers)', '#f44');
      }
    }
  }

  // Feature 23: World Events (3% chance every 10 min)
  if(energyTimer % 600 === 0 && Math.random() < 0.03){
    const events = [
      {id:'gold_rush',name:'Gold Rush',desc:'+50% gold from all sources for 30 min',duration:1800000},
      {id:'void_storm',name:'Void Storm',desc:'Enemies +20% stronger but +30% XP for 30 min',duration:1800000},
      {id:'peaceful_day',name:'Peaceful Day',desc:'No raids for 1hr, +happiness to all followers',duration:3600000}
    ];
    const ev = events[Math.floor(Math.random()*events.length)];
    G.worldEvent = ev;
    G.worldEventEnd = Date.now() + ev.duration;
    if(ev.id === 'peaceful_day'){
      G.followers.forEach(f => { f.happiness = Math.min(100, f.happiness + 10); });
    }
    toast('WORLD EVENT: ' + ev.name + ' - ' + ev.desc, '#ff2060');
  }
  // Clear expired world events
  if(G.worldEvent && Date.now() > (G.worldEventEnd||0)){
    G.worldEvent = null;
    G.worldEventEnd = 0;
  }

  // Auto-battle (every 10 seconds)
  if(G.autoBattle && energyTimer % 10 === 0){
    processAutoBattle();
  }

  // Secret Shop spawn (#20): 5% chance per minute
  if(energyTimer % 60 === 0 && Math.random() < 0.05){
    spawnSecretShop();
  }

  // Faction Wars (#22): check weekly
  if(energyTimer % 3600 === 0){
    factionWarResult();
  }

  // Idle Skill Training (#1) - 1 XP per tick to highest combat skill
  if(G.skillLevels){
    const primarySkill = getPrimaryCombatSkill();
    addSkillXp(primarySkill, 1);
  }

  // Follower passive effects
  followerTimer++;
  if(followerTimer >= 120){ // every 2 min
    followerTimer = 0;
    G.followers.forEach(f => {
      if(f.happiness <= 20) { /* unhappy workers do nothing */ }
      else if(f.assigned === 'foundry'){
        // Foundry workers already handled by getGoldPerMin()
      } else if(f.assigned === 'lab'){
        // Lab workers: small passive XP
        addXp(Math.floor(f.level * 0.5));
      } else if(f.assigned === 'workshop'){
        // Workshop workers give crafting XP (Crafting = index 8)
        addSkillXp(8, Math.floor(f.level * 2));
      } else if(f.assigned === 'shrine'){
        // Shrine workers: small gem chance
        if(Math.random() < 0.01 * (f.rarity + 1)){
          G.gems += 1;
          toast(f.name + ' channeled a gem at the shrine!', '#b026ff');
        }
      } else if(f.assigned === 'generator'){
        // Generator workers: chance for bonus energy
        if(Math.random() < 0.3 && G.energy < getMaxEnergy()){
          G.energy = Math.min(getMaxEnergy(), G.energy + 1);
        }
      } else if(f.assigned === 'garrison'){
        // Garrison: small gold from repelling scouts
        if(Math.random() < 0.15){
          G.gold += Math.floor(f.level * (f.rarity+1));
        }
      }
      // Tavern workers slow happiness decay for all followers in same city
      // (handled below)
      // Slow happiness decay
      if(Math.random() < 0.1){
        // Tavern workers in same city reduce decay
        const ci = f.cityIdx || 0;
        const tavernWorkers = G.followers.filter(tw => tw.cityIdx === ci && tw.assigned === 'tavern' && tw.happiness > 20);
        const decayReduction = Math.min(0.08, tavernWorkers.length * 0.02); // up to 80% reduction
        if(Math.random() >= decayReduction){
          f.happiness = Math.max(0, f.happiness - 1);
        }
      }
      // Morale events: rebellion when happiness is very low
      if(f.happiness < 30 && Math.random() < 0.05){
        toast(getFollowerDisplayName(f) + ' has REBELLED and left your service!', '#f44');
        G.followers = G.followers.filter(x => x.id !== f.id);
        // Remove from council if applicable
        G.clanCouncil = G.clanCouncil.filter(id => id !== f.id);
      }
      // Happy followers sometimes find gifts
      if(f.happiness > 90 && Math.random() < 0.03){
        if(Math.random() < 0.5){
          const giftGold = 10 + Math.floor(f.level * (f.rarity+1) * 2);
          G.gold += giftGold; G.total_gold_earned += giftGold;
          toast(getFollowerDisplayName(f) + ' found a gift: +' + giftGold + ' gold!', '#ffd700');
        } else {
          const res = ['ore','scrap','data','bio'];
          const r = res[Math.floor(Math.random()*res.length)];
          const amt = 1 + Math.floor(f.rarity * 2);
          G.resources[r] = (G.resources[r]||0) + amt;
          toast(getFollowerDisplayName(f) + ' found a gift: +' + amt + ' ' + r + '!', '#0f0');
        }
      }
    });
  }

  // Update weather
  updateWeather();

  // Tribute gold from captured cities
  if(goldTimer === 0 && G.tributeGold > 0){
    G.gold += G.tributeGold;
  }

  // Process bounty contracts
  if(energyTimer % 60 === 0) processContracts();

  // Update corruption zones every 10 min
  if(energyTimer % 600 === 0) updateCorruptionZones();

  // Wanted board refresh (every 2 hours)
  if(!G.wantedTargets || G.wantedTargets.length === 0 || Date.now() - (G.wantedRefreshTime||0) > 7200000) refreshWanted();

  // Void rift spawn check (every ~5 min, 3% chance)
  if(energyTimer % 300 === 0 && Math.random() < 0.03) spawnRift();

  // Follower jobs processing (every 2 min tick with followers)
  if(followerTimer === 0){
    G.followers.forEach(f => {
      if(f.assigned === 'shopkeeper' || f.job === 'shopkeeper'){
        const income = Math.floor(3 + G.level * 0.2);
        G.gold += income;
      }
      if(f.assigned === 'trainer' || f.job === 'trainer'){
        const sk = Math.floor(Math.random()*15);
        addSkillXp(sk, Math.floor(5 + G.level * 0.5));
      }
      if((f.assigned === 'recruiter' || f.job === 'recruiter') && Math.random() < 0.005){
        const nf = generateFollower();
        G.followers.push(nf);
        addNotification(f.name + ' recruited ' + nf.name + '!');
        toast(f.name + ' recruited ' + nf.name + '!', '#ffd700');
      }
      if((f.assigned === 'alchemist' || f.job === 'alchemist') && Math.random() < 0.02){
        const potTypes = Object.keys(POTIONS);
        const pt = potTypes[Math.floor(Math.random()*potTypes.length)];
        G.potions[pt] = (G.potions[pt]||0) + 1;
        addNotification(f.name + ' brewed a ' + POTIONS[pt].name);
      }
    });
    checkTitles();
  }

  // Check events every 5 min
  if(energyTimer % 300 === 0) checkEvent();

  // Check expeditions (notify when done)
  if(G.expeditions && energyTimer % 10 === 0){
    G.expeditions.forEach((exp, i) => {
      if(!exp.collected && Date.now() >= exp.endTime){
        toast('Expedition ready to collect!', '#ffd700');
      }
    });
  }

  // Spawn roaming enemies every 30 seconds
  if(energyTimer % 30 === 0) spawnRoamingEnemies();

  // Roaming enemies attack cities every 60 seconds
  if(energyTimer % 60 === 0) processRoamerCityAttacks();

  // Raid events (random, ~every 8 min per city)
  G.cities.forEach((city, ci) => {
    const timeSinceRaid = Date.now() - (city.lastRaid || 0);
    if(timeSinceRaid > 480000 && Math.random() < 0.008){
      const result = triggerRaid(ci);
      showRaidResult(result);
    }
  });

  // Auto-save
  saveTimer++;
  if(saveTimer >= 30){
    saveTimer = 0;
    save();
  }

  // Update HUD
  updateHUD();
}

// Follower Rebirth (#13)
function rebirthFollower(fId){
  const f = G.followers.find(x => x.id === fId);
  if(!f){ toast('Follower not found!','#f44'); return; }
  if(f.level < 50){ toast('Follower must be level 50 to rebirth!','#f44'); return; }
  if(!f.rebirthCount) f.rebirthCount = 0;
  if(f.rebirthCount >= 3){ toast('Max 3 rebirths!','#f44'); return; }
  f.rebirthCount++;
  const permPowerBonus = Math.floor(f.power * 0.20);
  const permDefBonus = Math.floor(f.defense * 0.20);
  if(!f.permBonusPower) f.permBonusPower = 0;
  if(!f.permBonusDef) f.permBonusDef = 0;
  f.permBonusPower += permPowerBonus;
  f.permBonusDef += permDefBonus;
  f.level = 1;
  f.xp = 0;
  f.power = (f.rarity + 1) * 3 + f.permBonusPower;
  f.defense = (f.rarity + 1) * 2 + f.permBonusDef;
  toast(f.name + ' REBORN! ('+f.rebirthCount+'/3) Permanent bonus: +' + permPowerBonus + ' PWR +' + permDefBonus + ' DEF', '#ff2060');
  save();
  showTab('followers_detail', f.id);
}

// Endless Void Mode (#18)
function startEndlessVoid(){
  if(G.energy < 30){ toast('Need 30 energy!','#f44'); return; }
  G.energy -= 30;
  let playerPower = getCombatPower();
  let playerDef = getCombatDefense();
  let playerMaxHp = 50 + G.level * 10 + G.stats.defense * 3;
  if(G.skillLevels[14] >= 10) playerMaxHp += 30;
  if(G.skillLevels[14] >= 50) playerMaxHp += 60;
  if(G.skillLevels[14] >= 99) playerMaxHp += 100;
  let playerHp = playerMaxHp;
  let wave = 0;
  let totalGold = 0;
  let totalXp = 0;
  let log = ['=== ENDLESS VOID ==='];
  while(playerHp > 0 && wave < 999){
    wave++;
    const scale = 1 + wave * 0.3;
    let enemyHp = Math.floor(200 * scale);
    const enemyAtk = Math.floor(15 * scale);
    log.push('--- Wave ' + wave + ' (Enemy HP:'+enemyHp+' ATK:'+enemyAtk+') ---');
    let turn = 0;
    while(playerHp > 0 && enemyHp > 0 && turn < 30){
      turn++;
      let dmg = Math.max(1, playerPower - Math.floor(enemyAtk*0.15) + Math.floor(Math.random()*5));
      if(Math.random()*100 < getLuck()){ dmg = Math.floor(dmg * 2); log.push('W'+wave+' T'+turn+': CRIT '+dmg); }
      else log.push('W'+wave+' T'+turn+': Hit '+dmg);
      enemyHp -= dmg;
      if(enemyHp <= 0) break;
      let eDmg = Math.max(1, enemyAtk - Math.floor(playerDef*0.3) + Math.floor(Math.random()*3));
      if(Math.random()*100 < Math.min(30, getCombatSpeed()*0.5)){
        log.push('W'+wave+' T'+turn+': DODGE!');
      } else {
        playerHp -= eDmg;
        log.push('W'+wave+' T'+turn+': Took '+eDmg+' (HP:'+Math.max(0,playerHp)+')');
      }
    }
    if(enemyHp <= 0){
      const wGold = 10 + wave * 5;
      const wXp = 5 + wave * 3;
      totalGold += wGold; totalXp += wXp;
      log.push('Wave '+wave+' cleared! +'+wGold+'g +'+wXp+'xp');
      G.total_kills++;
    } else break;
  }
  const reachedWave = wave;
  if(!G.endlessRecord) G.endlessRecord = 0;
  if(reachedWave > G.endlessRecord){
    G.endlessRecord = reachedWave;
    log.push('NEW RECORD: Wave ' + reachedWave + '!');
  }
  G.gold += totalGold; G.total_gold_earned += totalGold;
  addXp(totalXp);
  log.push('=== VOID COLLAPSED at Wave ' + reachedWave + ' ===');
  log.push('Total: +' + totalGold + 'g +' + totalXp + 'xp');
  G.combatLog = log;
  checkAchievements(); save();
  showCombatResult(log, true, {gold:totalGold, xp:totalXp, gear:null});
}

// Boss Rush Mode (#19)
function startBossRush(){
  if(G.energy < 50){ toast('Need 50 energy!','#f44'); return; }
  G.energy -= 50;
  let playerPower = getCombatPower();
  let playerDef = getCombatDefense();
  let playerMaxHp = 50 + G.level * 10 + G.stats.defense * 3;
  if(G.skillLevels[14] >= 10) playerMaxHp += 30;
  if(G.skillLevels[14] >= 50) playerMaxHp += 60;
  if(G.skillLevels[14] >= 99) playerMaxHp += 100;
  let playerHp = playerMaxHp;
  let log = ['=== BOSS RUSH ==='];
  let totalGold = 0, totalXp = 0;
  let bossesDefeated = 0;
  for(let zi = 0; zi < ZONES.length; zi++){
    const zone = ZONES[zi];
    if(G.level < zone.minLv) break;
    const bossMission = zone.missions.find(m => m.boss);
    if(!bossMission) continue;
    let enemyHp = Math.floor(bossMission.enemyHp * (1 + zi * 0.15));
    const enemyAtk = Math.floor(bossMission.enemyAtk * (1 + zi * 0.1));
    log.push('--- BOSS: ' + bossMission.name + ' (HP:'+enemyHp+') ---');
    let turn = 0;
    while(playerHp > 0 && enemyHp > 0 && turn < 40){
      turn++;
      let dmg = Math.max(1, playerPower - Math.floor(enemyAtk*0.15) + Math.floor(Math.random()*5));
      if(Math.random()*100 < getLuck()){ dmg = Math.floor(dmg * 2); }
      enemyHp -= dmg;
      if(enemyHp <= 0) break;
      let eDmg = Math.max(1, enemyAtk - Math.floor(playerDef*0.3) + Math.floor(Math.random()*3));
      if(Math.random()*100 < Math.min(30, getCombatSpeed()*0.5)){
        log.push('  DODGE!');
      } else {
        playerHp -= eDmg;
      }
    }
    if(enemyHp <= 0){
      bossesDefeated++;
      const bGold = bossMission.gold * 2;
      const bXp = bossMission.xp * 2;
      totalGold += bGold; totalXp += bXp;
      log.push(bossMission.name + ' defeated! +' + bGold + 'g +' + bXp + 'xp');
      // Heal 20% between bosses
      playerHp = Math.min(playerMaxHp, playerHp + Math.floor(playerMaxHp * 0.2));
      log.push('  Healed 20% HP. (HP: '+playerHp+')');
    } else {
      log.push('FAILED at ' + bossMission.name + '!');
      break;
    }
  }
  if(bossesDefeated === ZONES.filter(z => G.level >= z.minLv && z.missions.some(m=>m.boss)).length){
    G.bossRushCleared = true;
    log.push('BOSS RUSH COMPLETE! All bosses defeated!');
    totalGold += 2000; G.gems += 20;
    toast('Boss Rush cleared! +2000g +20 gems!', '#ffd700');
  }
  G.gold += totalGold; G.total_gold_earned += totalGold;
  addXp(totalXp);
  log.push('=== Boss Rush: ' + bossesDefeated + ' bosses defeated, +' + totalGold + 'g ===');
  G.combatLog = log;
  checkAchievements(); save();
  showCombatResult(log, bossesDefeated > 0, {gold:totalGold, xp:totalXp, gear:null});
}

function buySecretShop(idx){
  if(!G.secretShop || !G.secretShop[idx] || G.secretShop[idx].bought) return;
  const item = G.secretShop[idx];
  if(G.gold < item.cost){ toast('Need '+item.cost+' gold','#f44'); return; }
  G.gold -= item.cost;
  item.bought = true;
  if(item.type === 'mythicgear'){
    const gear = generateGear(G.level + 20, true);
    gear.rarity = Math.max(gear.rarity, 4); // at least legendary
    G.inventory.push(gear);

  } else if(item.type === 'ticket10x'){
    G.tickets10x = (G.tickets10x||0) + 1;
    toast('+1 10x Summon Ticket!', '#ffd700');
  } else if(item.type === 'relic'){
    const relic = dropRelic();
    if(relic) toast('Got relic: ' + relic.name + '!', '#ff2060');
    else { G.gems += 15; toast('No new relics - got 15 gems instead!', '#b026ff'); }
  }
  save();
  showTab('missions');
}

// Faction Wars (#22)
function factionWarResult(){
  const weekId = new Date().toISOString().slice(0,10);
  const weekNum = Math.floor(Date.now() / (7*86400000));

  if(G.factionWarWeek === weekStr) return; // already processed this week
  G.factionWarWeek = weekStr;
  if(!G.faction) return;
  const sorted = Object.keys(FACTIONS).sort((a,b) => (G.factionPower?.[b]||0) - (G.factionPower?.[a]||0));

    G.factionWarResult = {rank:1, bonus:'Leader: +10% all stats this week'};

    G.factionWarResult = {rank:2, bonus:'2nd: +5% all stats this week'};

  save();
}

// Feature 21: Challenge Dungeons
function runChallengeDungeon(type){
  if(G.energy < 30){ toast('Need 30 energy!','#f44'); return; }
  if(!G.challengeDungeonClears) G.challengeDungeonClears = {};
  if(G.challengeDungeonClears[type]){ toast('Already cleared this challenge!','#f44'); return; }
  G.energy -= 30;
  var playerPower = getCombatPower();
  var playerDef = getCombatDefense();
  var playerMaxHp = 50 + G.level * 10 + G.stats.defense * 3;
  if(G.skillLevels[14] >= 10) playerMaxHp += 30;
  if(G.skillLevels[14] >= 50) playerMaxHp += 60;
  if(G.skillLevels[14] >= 99) playerMaxHp += 100;
  var playerHp = playerMaxHp;
  if(type === 'no_skills'){ playerPower = G.stats.power * 5; playerDef = G.stats.defense * 3; }
  if(type === 'glass_cannon'){ playerHp = 1; playerMaxHp = 1; playerPower *= 5; }
  var maxTurnsPerWave = type === 'speed_run' ? 15 : 30;
  var wave = 0;
  var won = true;
  var log = ['=== CHALLENGE: ' + type.toUpperCase() + ' ==='];
  while(wave < 5 && playerHp > 0){
    wave++;
    var scale = 1 + wave * 0.4;
    var eHp = Math.floor(500 * scale);
    var eAtk = Math.floor(30 * scale);
    log.push('--- Wave ' + wave + ' ---');
    var turn = 0;
    while(playerHp > 0 && eHp > 0 && turn < maxTurnsPerWave){
      turn++;
      var dmg = Math.max(1, playerPower - Math.floor(eAtk * 0.1) + Math.floor(Math.random()*5));
      if(Math.random()*100 < getLuck()) dmg = Math.floor(dmg * 2);
      eHp -= dmg;
      log.push('T'+turn+': Hit '+dmg+' (eHP:'+Math.max(0,eHp)+')');
      if(eHp <= 0) break;
      var eDmg2 = Math.max(1, eAtk - Math.floor(playerDef * 0.3));
      playerHp -= eDmg2;
    }
    if(playerHp <= 0 || (eHp > 0 && turn >= maxTurnsPerWave)){
      won = false;
      log.push('=== DEFEATED ===');
      break;
    }
  }
  if(won){
    G.challengeDungeonClears[type] = true;
    log.push('=== CHALLENGE CLEARED! ===');
    if(type === 'no_skills'){
      if(!G.unlockedTitles) G.unlockedTitles = [];
      if(!G.unlockedTitles.includes('Purist')){ G.unlockedTitles.push('Purist'); toast('Title unlocked: Purist!','#ffd700'); }
    }
    if(type === 'speed_run'){
      G.shards = (G.shards||0) + 5;
      toast('Challenge cleared! +5 shards!','#ffd700');
    }
    if(type === 'glass_cannon'){
      if(!G.unlockedTitles) G.unlockedTitles = [];
      if(!G.unlockedTitles.includes('Glass Cannon')){ G.unlockedTitles.push('Glass Cannon'); toast('Title unlocked: Glass Cannon!','#ffd700'); }
    }
    G.gold += 500; G.total_gold_earned += 500;
    addXp(300);
  }
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = function(e){ if(e.target===overlay) overlay.remove(); };
  var modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = '<h3>Challenge: ' + type + '</h3><div class="log">' + log.map(function(l){ return '<div class="log-line">'+l+'</div>'; }).join('') + '</div><br><button class="btn btn-cyan" onclick="this.closest(\'.modal-overlay\').remove();showTab(\'missions\')">Close</button>';
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  save();
}

// Feature 22: Seasonal Boss
function fightSeasonalBoss(){
  addStep(1);

  var sbName, sbHp, sbAtk, sbDrop;
  if(month <= 2){ sbName='Frost Wyrm'; sbHp=3000+G.level*80; sbAtk=80+G.level*3; sbDrop='Frost Crown'; }
  else if(month <= 5){ sbName='Solar Phoenix'; sbHp=3500+G.level*90; sbAtk=90+G.level*3; sbDrop='Phoenix Plume'; }
  else if(month <= 8){ sbName='Storm Titan'; sbHp=4000+G.level*100; sbAtk=100+G.level*4; sbDrop='Storm Gauntlet'; }
  else { sbName='Shadow Reaper'; sbHp=4500+G.level*110; sbAtk=110+G.level*4; sbDrop='Reaper Cloak'; }
  var playerPower = getCombatPower();
  var playerDef = getCombatDefense();
  var playerMaxHp = 50 + G.level * 10 + G.stats.defense * 3;
  if(G.skillLevels[14] >= 10) playerMaxHp += 30;
  if(G.skillLevels[14] >= 50) playerMaxHp += 60;
  if(G.skillLevels[14] >= 99) playerMaxHp += 100;
  var playerHp = playerMaxHp;
  var enemyHp = sbHp;
  var turn = 0;
  var log = ['=== SEASONAL BOSS: '+sbName+' ==='];
  while(playerHp > 0 && enemyHp > 0 && turn < 50){
    turn++;
    var dmg = Math.max(1, playerPower - Math.floor(sbAtk*0.1) + Math.floor(Math.random()*8));
    if(Math.random()*100 < getLuck()) dmg = Math.floor(dmg*2);
    enemyHp -= dmg;
    log.push('T'+turn+': Hit '+dmg+' (bossHP:'+Math.max(0,enemyHp)+')');

  if(won){

  } else {
    log.push('=== DEFEATED ===');
    toast('Failed to defeat ' + sbName + '!','#f44');

  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = function(e){ if(e.target===overlay) overlay.remove(); };

  modal.className = 'modal';

  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  save();
}

// Feature 24: Memory Match Mini-Game
function startMemoryMatch(cost){
  if(G.gold < cost){ toast('Need '+cost+'g!','#f44'); return; }
  G.gold -= cost;
  var nums = [1,2,3,4,1,2,3,4];
  for(var i = nums.length-1; i > 0; i--){ var j = Math.floor(Math.random()*(i+1)); var t = nums[i]; nums[i] = nums[j]; nums[j] = t; }
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  var modal = document.createElement('div');
  modal.className = 'modal';
  modal.style.minWidth = '280px';
  var revealed = [false,false,false,false,false,false,false,false];
  var matched = [false,false,false,false,false,false,false,false];
  var firstPick = -1;
  var pairs = 0;
  var attempts = 0;
  var locked = false;
  var showAll = true;
  function render(){
    var html = '<h3>Memory Match</h3>';
    html += '<div class="text-sm mb">Match all 4 pairs! Attempts: '+attempts+'</div>';
    html += '<div class="grid2" style="gap:8px">';
    for(var ci = 0; ci < 8; ci++){
      var show = showAll || revealed[ci] || matched[ci];
      var bg = matched[ci] ? '#0a2a0a' : (revealed[ci] ? '#1a1a3e' : '#1a1a2e');
      var clr = matched[ci] ? '#0f0' : (show ? '#ffd700' : '#666');
      html += '<div style="background:'+bg+';border:1px solid '+clr+';padding:20px;text-align:center;font-size:20px;cursor:pointer" onclick="window._mmClick('+ci+')">';
      html += show ? nums[ci] : '?';
      html += '</div>';
    }
    html += '</div>';
    if(pairs >= 4){
      var reward = 50 + G.level * 3;
      html += '<div class="mt" style="color:#ffd700">YOU WIN! +'+reward+'g +1 gem ('+attempts+' attempts)</div>';
      html += '<button class="btn btn-cyan" onclick="this.closest(\'.modal-overlay\').remove();showTab(\'gambling\')">Collect</button>';
    }
    modal.innerHTML = html;
  }
  window._mmClick = function(idx){
    if(locked || matched[idx] || revealed[idx] || showAll) return;
    revealed[idx] = true;
    render();
    if(firstPick < 0){
      firstPick = idx;
    } else {
      attempts++;
      locked = true;
      if(nums[firstPick] === nums[idx]){
        matched[firstPick] = true;
        matched[idx] = true;
        pairs++;
        firstPick = -1;
        locked = false;
        render();
        if(pairs >= 4){
          var reward = 50 + G.level * 3;
          G.gold += reward; G.total_gold_earned += reward;
          G.gems += 1;
          G.memoryMatchWins = (G.memoryMatchWins||0) + 1;
          G.gamblingWins = (G.gamblingWins||0) + 1;
          save();
        }
      } else {
        setTimeout(function(){
          revealed[firstPick] = false;
          revealed[idx] = false;
          firstPick = -1;
          locked = false;
          render();
        }, 800);
      }
    }
  };
  render();
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  setTimeout(function(){ showAll = false; render(); }, 1500);
  save();
}

  if(G.autoSellRarity === undefined) G.autoSellRarity = -1;
  if(!G.expeditionLog) G.expeditionLog = [];
  if(!G.bossKillCounts) G.bossKillCounts = {};
  if(!G.fastestKills) G.fastestKills = {};
  // === New features migration ===
  if(!G.element) G.element = 'physical';
  if(!G.masteryBadges) G.masteryBadges = {};
  if(!G.talents) G.talents = {};
  if(G.talentPoints === undefined){
    G.talentPoints = Math.floor(G.level / 5);
  }
  if(!G.endlessRecord) G.endlessRecord = 0;
  if(G.bossRushCleared === undefined) G.bossRushCleared = false;
  if(!G.secretShop) G.secretShop = null;
  if(!G.secretShopExpiry) G.secretShopExpiry = 0;
  if(!G.treasureMaps) G.treasureMaps = 0;
  if(!G.factionWarResult) G.factionWarResult = null;
  if(!G.factionWarWeek) G.factionWarWeek = '';
  if(!G.artifactFragments) G.artifactFragments = 0;
  if(!G.artifacts) G.artifacts = [];
  if(!G.blueprints) G.blueprints = [];
  if(!G.warChest) G.warChest = {amount:0, depositTime:0};
  if(!G.skillMilestonesAwarded) G.skillMilestonesAwarded = [];
  if(!G.awakenedDmgBonus) G.awakenedDmgBonus = G.awakenedCount || 0;
  // === 25 New Features Migration ===
  if(!G.investments) G.investments = {};
  if(!G.stockPrices) G.stockPrices = {VoidCorp:100,NeonTech:80,IronWorks:60,BioGen:120,CryptoVoid:200};
  if(!G.craftQueue) G.craftQueue = [];
  if(!G.bountiesCompleted) G.bountiesCompleted = 0;
  if(!G.fineResources) G.fineResources = {ore:0,scrap:0,data:0,bio:0};
  if(!G.pristineResources) G.pristineResources = {ore:0,scrap:0,data:0,bio:0};
  if(!G.luxuryPurchases) G.luxuryPurchases = {goldenName:0,extraStat:0,energyBoost:0,luckCharm:0,xpTome:0};
  if(!G.lastGiftExchange) G.lastGiftExchange = 0;
  if(!G.gearPresets) G.gearPresets = [];
  if(!G.combatStats) G.combatStats = {totalDmgDealt:0,totalHits:0,totalCrits:0,dodgeCount:0,potionsUsed:0,highestCombo:0};
  if(!G.sessionStart) G.sessionStart = Date.now();
  if(!G.sessionStats) G.sessionStats = {gold:0,xp:0,kills:0};
  if(G.autoPotionEnabled === undefined) G.autoPotionEnabled = true;
  if(G.compactMode === undefined) G.compactMode = false;
  if(!G.challengeDungeonClears) G.challengeDungeonClears = {};
  if(!G.lastSeasonalBossKill) G.lastSeasonalBossKill = '';
  if(!G.worldEvent) G.worldEvent = null;
  if(!G.worldEventEnd) G.worldEventEnd = 0;
  if(!G.memoryMatchWins) G.memoryMatchWins = 0;
  if(!G.prestigeShopPurchases) G.prestigeShopPurchases = {};
  if(!G.firsts) G.firsts = {};
  if(!G.milestones) G.milestones = {};
  // Transient state fields migration
  if(!G._followerSort) G._followerSort = '';
  if(!G._lastCombatMission) G._lastCombatMission = null;
  if(!G._lastCombatStats) G._lastCombatStats = null;
  if(!G.lastDamageRecap) G.lastDamageRecap = null;
  if(G.talentPointsAwarded === undefined) G.talentPointsAwarded = 0;
  if(G.awakenedDmgBonus === undefined) G.awakenedDmgBonus = G.awakenedCount || 0;
  if(G.challengesClaimed === undefined) G.challengesClaimed = 0;
  // Migration for fields that might be missing from very old saves
  if(G.winStreak === undefined) G.winStreak = 0;
  if(G.bestWinStreak === undefined) G.bestWinStreak = 0;
  if(!G.element) G.element = 'physical';
  if(!G.faction) G.faction = '';
  if(G.factionRep === undefined) G.factionRep = 0;
  if(!G.factionPower) G.factionPower = {};
  if(G.riftsCompleted === undefined) G.riftsCompleted = 0;
  if(G.lastTournament === undefined) G.lastTournament = 0;
  if(G.tournamentsWon === undefined) G.tournamentsWon = 0;
  if(!G.activeTitle) G.activeTitle = '';
  if(!G.unlockedTitles) G.unlockedTitles = [];
  if(!G.loreFragments) G.loreFragments = [];
  if(!G.notificationLog) G.notificationLog = [];
  if(!G.quickActions) G.quickActions = [];
  if(!G.capturedCities) G.capturedCities = [];
  if(G.tributeGold === undefined) G.tributeGold = 0;
  if(!G.corruptedZones) G.corruptedZones = {};
  if(!G.followerContracts) G.followerContracts = [];
  if(!G.wantedTargets) G.wantedTargets = [];
  if(G.wantedRefreshTime === undefined) G.wantedRefreshTime = 0;
  if(G.awakenedCount === undefined) G.awakenedCount = 0;
  if(G.nightmareClears === undefined) G.nightmareClears = 0;
  if(!G.challengeMonth) G.challengeMonth = '';
  if(G.marketRefreshTime === undefined) G.marketRefreshTime = 0;
  if(G.gamblingWins === undefined) G.gamblingWins = 0;
  if(G.gamblingLosses === undefined) G.gamblingLosses = 0;
  if(!G.dailyDungeonDate) G.dailyDungeonDate = '';
  if(G.dailyDungeonCleared === undefined) G.dailyDungeonCleared = false;
  // Reset session stats on load (new session)
  G.sessionStart = Date.now();
  G.sessionStats = {gold:0,xp:0,kills:0};
  // Rebirth migration for followers
  G.followers.forEach(f => {
    if(f.rebirthCount === undefined) f.rebirthCount = 0;
    if(!f.permBonusPower) f.permBonusPower = 0;
    if(!f.permBonusDef) f.permBonusDef = 0;
  });
  // Tutorial: -1 means completed/skipped for old saves
  if(G.tutorialStep === undefined) G.tutorialStep = -1;
  // Accent color
  if(!G.accentColor) G.accentColor = 'cyan';
  // Custom follower names
  if(!G.customNames) G.customNames = [];
  // Update defense for all cities
  G.cities.forEach((c, i) => updateCityDefense(i));
}

function init(){
  if(load()){
    migrateOldSave();
    calcOfflineProgress();
    checkDailyLogin();
    generateChallenges();
    // Init market if needed
    if(!G.marketStock || G.marketStock.length === 0 || Date.now() - (G.marketRefreshTime||0) > 86400000) refreshMarket();
    // Init world boss if needed
    if(!G.worldBossHp || G.worldBossHp <= 0){ G.worldBossHp = getWorldBoss().maxHp; }
    document.getElementById('top-bar').style.display = '';
    document.getElementById('nav').style.display = 'flex';
    setAccentColor(G.accentColor || 'cyan');
    save();
    showTab('missions');
  } else {
    showCharacterCreation();
  }
  // Remove splash
  setTimeout(()=>{ const sp = document.getElementById('splash'); if(sp) { sp.style.opacity='0'; sp.style.transition='opacity 0.5s'; setTimeout(()=>sp.remove(), 500); } }, 1500);
  // Game loop runs every second
  setInterval(gameLoop, 1000);
}

// Start
init();
</script>
</body>
</html>
