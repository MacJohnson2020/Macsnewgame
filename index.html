// ==================== ARENA TOWER ====================
function getArenaFloorEnemy(floor){
  const hp = Math.floor(100 * Math.pow(1.12, floor));
  const atk = Math.floor(10 * Math.pow(1.1, floor));
  const names = ['Arena Grunt','Arena Warrior','Arena Champion','Arena Elite','Arena Boss','Arena Legend','Arena Titan','Arena God'];
  const name = names[Math.min(Math.floor(floor/10), names.length-1)];
  return { name, hp, atk, gold: 10 + floor * 5, xp: 10 + floor * 4 };
}

function fightArenaFloor(){
  if(!G.arenaFloor) G.arenaFloor = 1;
  addStep(1);
  const floor = G.arenaFloor;
  const enemy = getArenaFloorEnemy(floor);
  const power = getCombatPower();
  const def = getCombatDefense();
  let playerHp = 50 + G.level * 10 + G.stats.defense * 3;
  const playerMaxHp = playerHp;
  let enemyHp = enemy.hp;
  let log = [];
  log.push('=== Arena Floor ' + floor + ': ' + enemy.name + ' ===');

  let turn = 0;
  while(playerHp > 0 && enemyHp > 0 && turn < 40){
    turn++;
    let dmg = Math.max(1, power - Math.floor(enemy.atk * 0.15) + Math.floor(Math.random()*5));
    dmg = Math.floor(dmg * getBestiaryBonus(enemy.name));
    if(Math.random()*100 < getLuck()){ dmg = Math.floor(dmg * 2); log.push('T'+turn+': CRIT '+dmg); }
    else log.push('T'+turn+': Hit '+dmg);
    enemyHp -= dmg;
    if(enemyHp <= 0) break;
    let eDmg = Math.max(1, enemy.atk - Math.floor(def * 0.3) + Math.floor(Math.random()*3));
    if(Math.random()*100 < Math.min(30, getCombatSpeed()*0.5)){ log.push('T'+turn+': DODGE'); }
    else { playerHp -= eDmg; log.push('T'+turn+': Took '+eDmg+' (HP:'+Math.max(0,playerHp)+')'); }
  }

  if(enemyHp <= 0){
    log.push('=== Floor ' + floor + ' cleared! ===');
    G.arenaFloor++;
    G.gold += enemy.gold; G.total_gold_earned += enemy.gold; addXp(enemy.xp);
    G.total_kills++;
    recordBestiaryKill(enemy.name, enemy.gold, enemy.xp);
    log.push('+' + enemy.gold + 'g +' + enemy.xp + 'xp');
    // Milestone rewards every 10 floors
    if(floor % 10 === 0){
      G.tickets1x = (G.tickets1x||0) + 1;
      log.push('+1 Summon Ticket! (Floor ' + floor + ' milestone)');
      if(floor % 50 === 0){ G.tickets10x = (G.tickets10x||0) + 1; log.push('+10x Ticket!! (Floor ' + floor + ')'); }
      const relic = dropRelic();
      if(relic) log.push('RELIC: ' + relic.name + '!');
    }
    // Key drops
    if(Math.random() < 0.08){ const k = G.level>=60?'nightmare':G.level>=30?'advanced':'basic'; G.dungeonKeys[k]=(G.dungeonKeys[k]||0)+1; log.push('+1 '+KEY_TYPES[k].name); }
  } else {
    log.push('=== Defeated on floor ' + floor + ' ===');
  }
  updateRecord('highestHit', Math.max(...log.filter(l=>l.includes('CRIT')||l.includes('Hit ')).map(l=>parseInt(l.match(/\d+$/)||[0]))));
  checkAchievements(); save();
  let html = '<h2>Arena Floor '+floor+': '+(enemyHp<=0?'Cleared!':'Defeat')+'</h2>';
  html += '<div class="log" style="max-height:250px">';
  log.forEach(l => { let c=''; if(l.includes('CRIT')||l.includes('Hit '))c='dmg-enemy'; else if(l.includes('Took'))c='dmg-player'; else if(l.includes('cleared')||l.includes('LOOT')||l.includes('Ticket')||l.includes('RELIC'))c='heal'; html+='<div class="log-line '+c+'">'+l+'</div>'; });
  html += '</div><div class="mt"><button class="btn btn-cyan" onclick="fightArenaFloor()">Next Floor</button> <button class="btn" onclick="showTab(\'missions\')">Leave</button></div>';
  document.getElementById('content').innerHTML = html;
}

// ==================== RESOURCES ====================
const RESOURCE_TYPES = ['ore','scrap','data','bio'];
function getResources(){
  if(!G.resources) G.resources = {ore:0,scrap:0,data:0,bio:0};
  return G.resources;
}
function addResource(type, amount){
  if(!G.resources) G.resources = {ore:0,scrap:0,data:0,bio:0};
  G.resources[type] = (G.resources[type]||0) + amount;
  // Feature 7: Material Quality - chance for fine/pristine
  if(!G.fineResources) G.fineResources = {ore:0,scrap:0,data:0,bio:0};
  if(!G.pristineResources) G.pristineResources = {ore:0,scrap:0,data:0,bio:0};
  for(let i = 0; i < amount; i++){
    const roll = Math.random();
    if(roll < 0.01){ G.pristineResources[type] = (G.pristineResources[type]||0) + 1; }
    else if(roll < 0.11){ G.fineResources[type] = (G.fineResources[type]||0) + 1; }
  }
}

// ==================== ACHIEVEMENT TIERS ====================
function getAchievementTier(id){
  // Based on how many achievements you have
  const count = G.achievements.length;
  if(count >= 60) return {tier:'gold',color:'#ffd700',mult:3};
  if(count >= 30) return {tier:'silver',color:'#ccc',mult:2};
  if(count >= 10) return {tier:'bronze',color:'#cd7f32',mult:1.5};
  return {tier:'none',color:'#666',mult:1};
}

// ==================== TRADE ROUTES ====================
function getTradeRouteIncome(){
  if(G.cities.length < 2) return 0;
  let income = 0;
  // Each pair of cities generates trade income based on their combined building levels
  for(let i = 0; i < G.cities.length; i++){
    for(let j = i+1; j < G.cities.length; j++){
      const c1 = G.cities[i], c2 = G.cities[j];
      const c1Total = Object.values(c1.buildings).reduce((s,v)=>s+v,0);
      const c2Total = Object.values(c2.buildings).reduce((s,v)=>s+v,0);
      income += Math.floor((c1Total + c2Total) * 0.3);
      // Trade specialty doubles route income
      if(c1.specialty === 'trade' || c2.specialty === 'trade') income = Math.floor(income * 1.5);
    }
  }
  return income;
}

function checkDailyLogin(){
  const today = new Date().toISOString().split('T')[0];
  if(G.lastLoginDay === today) return; // already claimed
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if(G.lastLoginDay === yesterday){
    G.loginStreak++;
  } else if(G.lastLoginDay){
    G.loginStreak = 1; // streak broken
  } else {
    G.loginStreak = 1; // first login
  }
  G.lastLoginDay = today;
  // Find best matching reward
  let reward = DAILY_REWARDS[0];
  for(let i = DAILY_REWARDS.length - 1; i >= 0; i--){
    if(G.loginStreak >= DAILY_REWARDS[i].day){ reward = DAILY_REWARDS[i]; break; }
  }
  G.gold += reward.gold;
  G.total_gold_earned += reward.gold;
  G.gems += reward.gems;
  if(reward.t1x) G.tickets1x = (G.tickets1x||0) + reward.t1x;
  if(reward.t10x) G.tickets10x = (G.tickets10x||0) + reward.t10x;
  let msg = 'Daily Login! Day ' + G.loginStreak + ': ' + reward.desc;
  // Day 30 bonus: free rare+ follower
  if(G.loginStreak >= 30 && G.loginStreak % 30 === 0){
    const f = generateFollower(Math.max(2, Math.floor(Math.random()*3)+2));
    G.followers.push(f);
    msg += ' + ' + f.name + ' [' + RARITY_NAMES[f.rarity] + ']!';
  }
  toast(msg, '#ffd700');
  save();
}

// ==================== POTION SYSTEM ====================
const POTIONS = {
  hp: {name:'HP Potion',desc:'Heal 30% HP in combat',reqAlch:10,reqHarv:1,cost:30,color:'#f44'},
  power: {name:'Power Elixir',desc:'+20% power for 5 turns',reqAlch:25,reqHarv:15,cost:60,color:'#f80'},
  defense: {name:'Iron Tonic',desc:'+20% defense for 5 turns',reqAlch:25,reqHarv:15,cost:60,color:'#4af'},
  luck: {name:'Fortune Brew',desc:'+30% luck for 5 turns',reqAlch:50,reqHarv:30,cost:100,color:'#ffd700'},
  xp: {name:'Insight Serum',desc:'+25% XP for 10 turns',reqAlch:75,reqHarv:50,cost:150,color:'#0ff'}
};

function brewPotion(type){
  const p = POTIONS[type];
  if(!p) return;
  if(G.skillLevels[10] < p.reqAlch){ toast('Need Alchemy Lv.' + p.reqAlch, '#f44'); return; }
  if(G.skillLevels[6] < p.reqHarv){ toast('Need Harvesting Lv.' + p.reqHarv, '#f44'); return; }
  let cost = p.cost;
  if(G.skillLevels[10] >= 99) cost = Math.floor(cost * 0.5); // ALCHEMIST: 50% cheaper
  if(G.gold < cost){ toast('Need ' + cost + ' gold', '#f44'); return; }
  G.gold -= cost;
  G.potions[type] = (G.potions[type] || 0) + 1;
  addSkillXp(10, 10 + G.skillLevels[10]);
  addSkillXp(6, 5 + G.skillLevels[6]);
  toast('Brewed ' + p.name + '! (x' + G.potions[type] + ')', p.color);
  save();
}

function usePotion(type){
  if(!G.potions[type] || G.potions[type] <= 0){ toast('No ' + POTIONS[type].name + '!', '#f44'); return; }
  G.potions[type]--;
  let duration = 5;
  if(type === 'xp') duration = 10;
  if(G.skillLevels[10] >= 99) duration = Math.floor(duration * 1.5); // ALCHEMIST: 50% longer
  G.activeBuff = { type: type, turnsLeft: duration };
  toast('Used ' + POTIONS[type].name + '! (' + duration + ' turns)', POTIONS[type].color);
  save();
}

// ==================== BUILDING SYNERGIES ====================
function getBuildingSynergies(cityIdx){
  const city = G.cities[cityIdx !== undefined ? cityIdx : G.currentCity];
  const b = city.buildings;
  const synergies = [];
  // Foundry + Workshop = +15% crafting output
  if((b.foundry||0) >= 5 && (b.workshop||0) >= 5)
    synergies.push({name:'Industrial Complex',desc:'Foundry+Workshop: +15% crafting quality',bonus:'craft'});
  // Barracks + Shrine = +10% combat luck
  if((b.barracks||0) >= 5 && (b.shrine||0) >= 5)
    synergies.push({name:'War Blessing',desc:'Barracks+Shrine: +10% crit in combat',bonus:'crit'});
  // Lab + Shrine = +8% skill XP
  if((b.lab||0) >= 5 && (b.shrine||0) >= 5)
    synergies.push({name:'Enlightenment',desc:'Lab+Shrine: +8% skill XP',bonus:'skillxp'});
  // Generator + Vault = +10 max energy
  if((b.generator||0) >= 5 && (b.vault||0) >= 5)
    synergies.push({name:'Power Grid',desc:'Generator+Vault: +10 max energy',bonus:'energy'});
  // Tavern + Barracks = followers in barracks get +20% power
  if((b.tavern||0) >= 5 && (b.barracks||0) >= 5)
    synergies.push({name:'Battle Feast',desc:'Tavern+Barracks: barracks soldiers +20% power',bonus:'soldier'});
  // All buildings >= 10 = mega synergy
  if(BUILDINGS.every(bd => (b[bd.id]||0) >= 10))
    synergies.push({name:'Metropolis',desc:'All buildings Lv.10+: +5% to everything',bonus:'all'});
  return synergies;
}

function hasSynergy(bonus){
  for(let i = 0; i < G.cities.length; i++){
    if(getBuildingSynergies(i).some(s => s.bonus === bonus)) return true;
  }
  return false;
}

// ==================== WORLD BOSS ====================
function getWorldBoss(){
  const tier = (G.worldBossKills || 0);
  const hp = 50000 * Math.pow(1.5, tier);
  const name = ['Void Colossus','Abyssal Leviathan','Nexus Titan','Corruption Incarnate','The Eternal'][Math.min(tier, 4)];
  const atk = 50 + tier * 30;
  return { name, maxHp: Math.floor(hp), atk, tier };
}

function attackWorldBoss(){
  addStep(1);

  const boss = getWorldBoss();
  if(!G.worldBossHp || G.worldBossHp <= 0) G.worldBossHp = boss.maxHp;

  const power = getCombatPower();
  let dmg = Math.floor(power * (0.8 + Math.random() * 0.4));
  // Class passive & potions apply
  if(G.activeBuff && G.activeBuff.type === 'power') dmg = Math.floor(dmg * 1.2);
  // Crits
  if(Math.random() * 100 < getLuck()) dmg = Math.floor(dmg * 2);

  G.worldBossHp -= dmg;
  G.worldBossDmgDealt = (G.worldBossDmgDealt || 0) + dmg;
  updateChallengeProgress('wbhits', 1);
  updateRecord('highestHit', dmg);
  updateRecord('totalDmgDealt', G.worldBossDmgDealt);

  let msg = 'Hit ' + boss.name + ' for ' + dmg + '! (HP: ' + Math.max(0, G.worldBossHp) + '/' + boss.maxHp + ')';

  if(G.worldBossHp <= 0){
    // Boss killed!
    G.worldBossKills = (G.worldBossKills || 0) + 1;
    const goldReward = 500 + G.worldBossKills * 200;
    const gemReward = 3 + G.worldBossKills;
    const xpReward = 300 + G.worldBossKills * 100;
    G.gold += goldReward;
    G.total_gold_earned += goldReward;
    G.gems += gemReward;
    addXp(xpReward);
    G.worldBossHp = 0;
    G.worldBossDmgDealt = 0;
    msg = boss.name + ' DEFEATED! +' + goldReward + 'g +' + gemReward + ' gems +' + xpReward + 'xp! Next boss is stronger...';
    toast(msg, '#ffd700');
    // Drop gear
    const gear = generateGear(G.level + 10, true);
    G.inventory.push(gear);
    toast('Boss dropped: ' + gear.name + ' [' + RARITY_NAMES[gear.rarity] + ']', '#ffd700');
    // Relic chance from world boss
    if(Math.random() < 0.1){
      const relic = dropRelic();
      if(relic) toast('RELIC: ' + relic.name + '!', '#ff2060');
    }
    // Rare ticket drop from world boss
    if(Math.random() < 0.08){
      G.tickets1x = (G.tickets1x||0) + 1;
      toast('+1 Summon Ticket!', '#0ff');
    }
    if(G.worldBossKills > 3 && Math.random() < 0.03){
      G.tickets10x = (G.tickets10x||0) + 1;
      toast('+1 10x Summon Ticket!!', '#ffd700');
    }
    // Artifact fragment from world boss (#23)
    if(Math.random() < 0.20){
      G.artifactFragments = (G.artifactFragments||0) + 1;
      toast('+1 Artifact Fragment! (' + G.artifactFragments + '/10)', '#ff2060');
    }
  } else {
    toast(msg, '#0ff');
  }

  // Decrement buff
  if(G.activeBuff){
    G.activeBuff.turnsLeft--;
    if(G.activeBuff.turnsLeft <= 0) G.activeBuff = null;
  }

  checkAchievements();
  save();
  showTab('missions');
}

// ==================== AUTO-BATTLE ====================
function startAutoBattle(zoneIdx, missionIdx){
  const zone = ZONES[zoneIdx];
  if(!zone || G.level < zone.minLv) return;
  const mission = zone.missions[missionIdx];
  if(!mission) return;
  // Need at least 1 combat follower
  const combatFollowers = G.followers.filter(f => f.assigned === 'combat' && f.happiness > 20);
  if(combatFollowers.length === 0){ toast('Need followers assigned to combat!', '#f44'); return; }
  G.autoBattle = { zoneIdx, missionIdx, missionName: mission.name, zoneName: zone.name };
  G.autoBattleEarnings = { gold:0, xp:0, kills:0, items:0 };
  toast('Auto-battle started: ' + mission.name, '#0ff');
  save();
  showTab('missions');
}

function stopAutoBattle(){
  if(!G.autoBattle) return;
  toast('Auto-battle stopped. Earned: ' + G.autoBattleEarnings.gold + 'g, ' + G.autoBattleEarnings.kills + ' kills', '#0ff');
  G.autoBattle = null;
  save();
  showTab('missions');
}

function processAutoBattle(){
  if(!G.autoBattle) return;
  const zone = ZONES[G.autoBattle.zoneIdx];
  if(!zone) { G.autoBattle = null; return; }
  const mission = zone.missions[G.autoBattle.missionIdx];
  if(!mission) { G.autoBattle = null; return; }

  // Followers fight on their own - uses their combined power
  const combatFollowers = G.followers.filter(f => f.assigned === 'combat' && f.happiness > 20);
  if(combatFollowers.length === 0){ stopAutoBattle(); return; }

  let followerPower = 0;
  combatFollowers.forEach(f => { followerPower += f.level * f.power * (f.rarity + 1) * 0.3; });
  // Talent follower power bonus (#14)
  followerPower = Math.floor(followerPower * (1 + getTalentBonus('fpow')));

  const enemyPower = mission.enemyHp * 0.3 + mission.enemyAtk * 2;

  // Win chance based on power ratio
  const ratio = followerPower / Math.max(1, enemyPower);
  const winChance = Math.min(0.85, ratio * 0.5); // cap at 85%

  if(Math.random() < winChance){
    // Won
    const goldEarned = Math.floor(mission.gold * 0.6); // 60% of normal (they're followers)
    const xpEarned = Math.floor(mission.xp * 0.4); // 40% XP
    G.gold += goldEarned;
    G.total_gold_earned += goldEarned;
    addXp(xpEarned);
    G.autoBattleEarnings.gold += goldEarned;
    G.autoBattleEarnings.xp += xpEarned;
    G.autoBattleEarnings.kills++;
    G.total_kills++;
    G.missions_completed++;

    // Small gear drop chance
    if(Math.random() < 0.08){
      const gear = generateGear(G.level, false);
      G.inventory.push(gear);
      G.autoBattleEarnings.items++;
    }
    // Very small ticket chance from auto-battle
    if(Math.random() < 0.01){
      G.tickets1x = (G.tickets1x||0) + 1;
      toast('Auto-battle found a Summon Ticket!', '#0ff');
    }

    // Follower XP
    combatFollowers.forEach(f => {
      f.xp += 5;
      const needed = f.level * 50;
      if(f.xp >= needed && f.level < 50){
        f.xp -= needed;
        f.level++;
        f.power += (f.rarity + 1);
        f.defense += Math.floor((f.rarity + 1) * 0.7);
      }
    });
  }

  // Build bonds between combat followers
  for(let i = 0; i < combatFollowers.length; i++){
    for(let j = i+1; j < combatFollowers.length; j++){
      if(Math.random() < 0.1) updateBond(combatFollowers[i].id, combatFollowers[j].id, 1);
    }
  }
  // Happiness drain from fighting
  combatFollowers.forEach(f => {
    if(Math.random() < 0.05) f.happiness = Math.max(0, f.happiness - 1);
  });
}

function checkAchievements(){
  checkMilestones();

    if(!G.achievements.includes(a.id) && a.check()){
      G.achievements.push(a.id);
      // Secret achievements get special treatment
      if(a.secret){
        toast('SECRET Achievement: ' + a.name + '!', '#ff2060');
        G.gems += 10;
        G.tickets1x = (G.tickets1x||0) + 2;
        if(!G.secretAchievements) G.secretAchievements = [];
        G.secretAchievements.push(a.id);
      } else {
        toast('Achievement: ' + a.name + '!', '#ffd700');
        // Early achievements give gems, late ones give tickets
        const earlyAchievements = ['first_kill','kill_10','level_5','level_10','gold_500','gold_1k','pull_1','followers_1','followers_5','building_1','boss_1'];
        const midAchievements = ['kill_50','level_25','gold_5k','pull_10','boss_10','followers_10','building_5','skill_10','dungeon_1','raid_win_1','city_2'];
        if(earlyAchievements.includes(a.id)){
          G.gems += 5; // generous early gems
        } else if(midAchievements.includes(a.id)){
          G.gems += 3;
        } else {
          G.gems += 1;
          // Late achievements give tickets
          G.tickets1x = (G.tickets1x||0) + 1;
        }
      }
    }
  });
}

// ==================== PRESTIGE ====================
function doPrestige(){
  if(G.level < 100){
    toast('Must be level 100 to prestige!', '#f44');
    return;
  }
  const newPrestige = G.prestige + 1;
  const newBonus = newPrestige * 10; // 10% per prestige
  const name = G.name;
  const cls = G.class;
  const elem = G.element || 'physical';
  const gems = G.gems + 20; // bonus gems
  const achievements = G.achievements;
  const totalPulls = G.total_gacha_pulls;
  const ascension = G.ascension || 0;
  const worldTier = G.worldTier || 1;
  // Feature 25: Preserve prestige shop and luxury upgrades
  const psp = JSON.parse(JSON.stringify(G.prestigeShopPurchases || {}));
  const luxP = JSON.parse(JSON.stringify(G.luxuryPurchases || {}));
  const cStats = JSON.parse(JSON.stringify(G.combatStats || {}));
  const bComp = G.bountiesCompleted || 0;
  let keptF = null;
  if(psp.keepFollower && G.followers.length > 0){
    keptF = JSON.parse(JSON.stringify(G.followers.reduce((best, f) => (!best || f.rarity > best.rarity || (f.rarity === best.rarity && f.level > best.level)) ? f : best, null)));
  }

  G = newGame(name, cls);
  G.element = elem;
  G.prestige = newPrestige;
  G.prestige_bonus = newBonus;
  G.gems = gems;
  G.achievements = achievements;
  G.total_gacha_pulls = totalPulls;
  G.ascension = ascension;
  G.worldTier = worldTier;
  G.prestigeShopPurchases = psp;
  G.luxuryPurchases = luxP;
  G.combatStats = cStats;
  G.bountiesCompleted = bComp;
  // Apply class starting stats
  const clData = CLASSES[cls];
  if(clData){
    G.stats.power += clData.power;
    G.stats.defense += clData.defense;
    G.stats.speed += clData.speed;
    G.stats.luck += clData.luck;
  }
  if(psp.startingLevel){
    for(let i = 0; i < psp.startingLevel; i++){
      if(G.level < 100){ G.xp = 0; G.level++; G.statPoints += 3; }
    }
  }
  if(keptF){
    keptF.assigned = 'idle'; keptF.cityIdx = 0;
    G.followers.push(keptF);
    toast('Kept follower: ' + keptF.name + '!', '#b026ff');
  }
  toast('PRESTIGE ' + newPrestige + '! +' + newBonus + '% XP bonus!', '#ffd700');
  save();
  showTab('profile');
}

// ==================== OFFLINE PROGRESS ====================
function calcOfflineProgress(){
  if(!G.lastOnline) return;
  const now = Date.now();
  const elapsed = (now - G.lastOnline) / 1000; // seconds
  if(elapsed < 60) return; // less than a minute
  G._offlineLevelBefore = G.level;

  // Energy regen
  const regenRate = getEnergyRegenRate();
  const energyGained = Math.min(Math.floor(elapsed / regenRate), getMaxEnergy() - G.energy);
  G.energy = Math.min(getMaxEnergy(), G.energy + energyGained);

  // Gold from foundry
  const goldPerMin = getGoldPerMin();
  const goldGained = Math.floor(goldPerMin * (elapsed / 60));
  G.gold += goldGained;

  // Follower happiness decay
  G.followers.forEach(f => {
    f.happiness = Math.max(0, f.happiness - Math.floor(elapsed / 3600) * 5);
  });

  // Offline Auto-Battle Earnings (#20)
  let abGold = 0, abXp = 0, abKills = 0;
  if(G.autoBattle){
    const zone = ZONES[G.autoBattle.zoneIdx];
    if(zone){
      const mission = zone.missions[G.autoBattle.missionIdx];
      if(mission){
        const combatFollowers = G.followers.filter(f => f.assigned === 'combat' && f.happiness > 20);
        if(combatFollowers.length > 0){
          let followerPower = 0;
          combatFollowers.forEach(f => { followerPower += f.level * f.power * (f.rarity + 1) * 0.3; });
          const enemyPower = mission.enemyHp * 0.3 + mission.enemyAtk * 2;
          const ratio = followerPower / Math.max(1, enemyPower);
          const winChance = Math.min(0.85, ratio * 0.5);
          // Simulate battles every 10 seconds while offline
          const battles = Math.floor(elapsed / 10);
          for(let i = 0; i < Math.min(battles, 360); i++){ // cap at 1 hour worth
            if(Math.random() < winChance){
              const g = Math.floor(mission.gold * 0.6);
              abGold += g; abKills++;
              abXp += Math.floor(mission.xp * 0.4);
            }
          }
          G.gold += abGold; G.total_gold_earned += abGold;
          if(abXp > 0) addXp(abXp);
          G.autoBattleEarnings.gold += abGold;
          G.autoBattleEarnings.kills += abKills;
          G.total_kills += abKills;
          G.missions_completed += abKills;
        }
      }
    }
  }

  if(energyGained > 0 || goldGained > 0 || abGold > 0){
    const mins = Math.floor(elapsed / 60);
    const levelsBefore = G._offlineLevelBefore || G.level;
    const levelsGained = G.level - levelsBefore;
    setTimeout(() => showWelcomeBack({
      minutes: mins,
      energyGained: energyGained,
      goldGained: goldGained,
      levelsGained: levelsGained,
      autoBattleGold: abGold,
      autoBattleKills: abKills
    }), 500);
  }
  G.lastOnline = now;
}

// ==================== WELCOME BACK MODAL ====================
function showWelcomeBack(data){
  const hrs = Math.floor(data.minutes / 60);
  const mins = data.minutes % 60;
  const timeStr = hrs > 0 ? hrs + 'h ' + mins + 'm' : data.minutes + ' min';
  const foundryGold = data.goldGained;
  let html = '<div class="modal-overlay" onclick="this.remove()">';
  html += '<div class="modal" style="text-align:center;min-width:280px" onclick="event.stopPropagation()">';
  html += '<div style="font-size:24px;font-weight:900;color:#0ff;margin-bottom:12px">WELCOME BACK!</div>';
  html += '<div style="margin:8px 0;font-size:14px;color:#aaa">\u23F1 Away for <span style="color:#eee">' + timeStr + '</span></div>';
  if(data.energyGained > 0) html += '<div style="margin:4px 0">\u26A1 <span style="color:#0f0">+' + data.energyGained + ' Energy</span></div>';
  if(data.goldGained > 0 || data.autoBattleGold > 0){
    html += '<div style="margin:4px 0">\uD83D\uDCB0 <span style="color:#ffd700">+' + (data.goldGained + (data.autoBattleGold||0)) + ' Gold</span>';
    const parts = [];
    if(foundryGold > 0) parts.push('Foundry: ' + foundryGold);
    if(data.autoBattleGold > 0) parts.push('Auto-battle: ' + data.autoBattleGold);
    if(parts.length > 0) html += ' <span class="text-sm text-dim">(' + parts.join(', ') + ')</span>';
    html += '</div>';
  }
  if(data.levelsGained > 0) html += '<div style="margin:4px 0">\u2B06 <span style="color:#b026ff">+' + data.levelsGained + ' Level' + (data.levelsGained>1?'s':'') + ' gained</span></div>';
  if(data.autoBattleKills > 0) html += '<div style="margin:4px 0">\u2694 Auto-battle: <span style="color:#f44">' + data.autoBattleKills + ' kills</span></div>';
  html += '<div style="margin-top:16px"><button class="btn btn-cyan" style="padding:10px 32px;font-size:15px" onclick="this.closest(\'.modal-overlay\').remove()">Continue</button></div>';
  html += '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
}

  msgs.push(AMBIENT_TEXT[Math.floor(Date.now()/30000) % AMBIENT_TEXT.length]);
  return msgs;
}

let currentTab = 'missions';

function updateHUD(){
  if(!G) return;
  document.getElementById('hud-level').textContent = G.level;
  const maxEn = getMaxEnergy();
  document.getElementById('hud-energy').textContent = G.energy + '/' + maxEn;
  const enFill = document.getElementById('hud-energy-fill');
  if(enFill) enFill.style.width = Math.min(100, (G.energy/maxEn)*100) + '%';
  const enTimerEl = document.getElementById('hud-energy-timer');
  if(enTimerEl){
    if(G.energy < maxEn){
      const secsToNext = Math.max(0, getEnergyRegenRate() - energyTimer);
      enTimerEl.textContent = 'Next: ' + secsToNext + 's';
    } else {
      enTimerEl.textContent = '';
    }
  }
  document.getElementById('hud-gold').textContent = fmtNum(G.gold);
  document.getElementById('hud-gems').textContent = G.gems;
  const needed = xpForLevel(G.level);
  const pct = Math.min(100, (G.xp / needed) * 100);
  document.getElementById('hud-xp-fill').style.width = pct + '%';
  document.getElementById('hud-xp-text').textContent = fmtNum(G.xp) + ' / ' + fmtNum(needed) + ' XP';
  document.getElementById('hud-title').textContent = G.activeTitle ? '[ ' + G.activeTitle + ' ]' : '';
  // Ticket display
  const ticketEl = document.getElementById('hud-tickets');
  if(ticketEl){
    let tHtml = '';
    if((G.tickets1x||0) > 0) tHtml += '<span>&#127915; ' + G.tickets1x + '</span>';
    if((G.tickets10x||0) > 0) tHtml += '<span style="color:#ffd700">&#127915;x10 ' + G.tickets10x + '</span>';
    if((G.winStreak||0) >= 3) tHtml += '<span style="color:#f80">&#128293; x' + G.winStreak + '</span>';
    ticketEl.innerHTML = tHtml;
  }
  // Notification Badge
  let badgeCount = 0;
  if(G.expeditions) G.expeditions.forEach(exp => { if(Date.now() >= exp.endTime && !exp.collected) badgeCount++; });
  if(G.bounties) G.bounties.forEach(b => { if(b.completed && !b.claimed) badgeCount++; });
  if(G.notificationLog && G.notificationLog.length > 0) badgeCount += Math.min(3, G.notificationLog.filter(n => Date.now() - n.time < 300000).length);
  const moreBtn = document.getElementById('tab-more');
  if(moreBtn) moreBtn.innerHTML = '<span class="nav-icon">&#8942;</span>More' + (badgeCount > 0 ? ' <span class="badge">' + badgeCount + '</span>' : '');
}

function showTab(tab, extra){
  // Remove active from all
  document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
  const tabBtn = document.getElementById('tab-' + tab);
  if(tabBtn) tabBtn.classList.add('active');

  currentTab = tab;
  document.getElementById('content').scrollTop = 0;
  window.scrollTo(0,0);
  const c = document.getElementById('content');

  switch(tab){
    case 'missions': renderMissions(c); break;
    case 'skills': renderSkills(c); break;
    case 'gear': renderGear(c); break;
    case 'town': renderTown(c); break;
    case 'gacha': renderGacha(c); break;
    case 'profile': renderProfile(c); break;
    case 'more': renderMore(c); break;
    case 'research': renderResearch(c); break;
    case 'explore': renderExplore(c); break;
    case 'clan': renderClan(c); break;
    case 'expeditions': renderExpeditions(c); break;
    case 'recipes': renderRecipes(c); break;
    case 'fusion': renderFusion(c); break;
    case 'market': renderMarket(c); break;
    case 'challenges': renderChallenges(c); break;
    case 'relics': renderRelics(c); break;
    case 'bestiary': renderBestiary(c); break;
    case 'halloffame': renderHallOfFame(c); break;
    case 'dashboard': renderDashboard(c); break;
    case 'factions': renderFactions(c); break;
    case 'gambling': renderGambling(c); break;

}

function getHint(){
  if(!G) return '';
  if(G.level === 1 && G.missions_completed === 0) return 'Start by running missions in Rust Flats to earn gold and XP!';
  if(G.level < 5 && G.followers.length === 0) return 'Visit the Summon tab to pull your first followers!';
  if(G.level >= 5 && !G.cities[0].buildings.generator) return 'Build a Generator in your Town to regen energy faster.';
  if(G.level >= 10 && G.skillLevels[0] < 5) return 'Train your combat skills in the Skills tab for more power.';
  if(G.level >= 15 && G.followers.length > 0 && G.followers.every(f=>f.assigned==='idle')) return 'Assign followers to buildings in Town for bonuses!';
  if(G.level >= 20 && !G.faction) return 'Join a Faction in the More tab for combat and gold bonuses.';
  if(G.level >= 30 && G.dungeons_cleared === 0) return 'Try a Dungeon! Craft keys in the dungeon section.';
  if(G.level >= 50 && G.cities.length < 2) return 'You can found a second city in the Town tab!';
  if(G.level >= 70 && (G.riftsCompleted||0) === 0) return 'Watch for Void Rifts on the Missions page - great rewards!';
  if(G.level >= 90) return 'Push for level 100 to unlock Prestige and Ascension!';
  return '';
}

function getSmartSuggestions(){
  if(!G) return [];
  var s = [];
  if(G.energy >= getMaxEnergy()) s.push('Your energy is full! Go fight!');
  if(G.followers.some(f => f.happiness < 30)) s.push('\u26A0 Followers need feeding!');
  // Check affordable building upgrades
  var city = getCity();
  BUILDINGS.forEach(function(b){
    var lv = city.buildings[b.id] || 0;
    var cost = getBuildingCost(b.id);
    if(G.gold >= cost && lv < 20) s.push('You can afford to upgrade ' + b.name + '!');
  });
  // Check for better gear in inventory
  ['weapon','armor','shield','implant'].forEach(function(slot){
    var equipped = G.gear[slot];
    var eqPwr = equipped ? (equipped.power||0) + (equipped.defense||0) : 0;
    G.inventory.forEach(function(it){
      if(it.slot === slot && ((it.power||0) + (it.defense||0)) > eqPwr) s.push('You have better gear to equip!');
    });
  });
  if(G.statPoints > 0) s.push('You have stat points to spend!');
  if(G.expeditions && G.expeditions.some(function(e){ return Date.now() >= e.endTime && !e.collected; })) s.push('Expedition ready to collect!');
  return s;
}

function renderSmartHint(){
  var suggestions = getSmartSuggestions();
  if(suggestions.length > 0) return '<div class="hint">' + suggestions[0] + '</div>';
  return '';
}

function renderSkills(c){
  const catIcons = {Combat:'\u2694',Gathering:'\u26CF',Production:'\uD83D\uDD28',Utility:'\uD83D\uDD27'};
  const catColors = {Combat:'#f44',Gathering:'#0f0',Production:'#ffd700',Utility:'#0ff'};
  const catBarClass = {Combat:'pbar-red',Gathering:'pbar-green',Production:'pbar-gold',Utility:'pbar-cyan'};
  let html = '<h2>Skills</h2>';
  // Tutorial hint step 5
  if(G.tutorialStep === 5){
    html += '<div class="tutorial-hint">Train skills to get stronger. You\'re on your own now, Raider!</div>';
    G.tutorialStep = -1; save();
  }
  html += renderSmartHint();
  html += '<div class="text-sm text-dim mb">Train skills to level them up. Higher levels unlock bonuses and gear requirements.</div>';
  for(const cat in SKILL_CATEGORIES){
    const color = catColors[cat];
    const icon = catIcons[cat];
    html += '<div style="display:flex;align-items:center;gap:8px;margin:16px 0 8px">';
    html += '<span style="font-size:20px">' + icon + '</span>';
    html += '<h3 style="color:'+color+';margin:0">' + cat + '</h3>';
    html += '</div>';
    html += '<div class="grid2">';
    SKILL_CATEGORIES[cat].forEach(i => {
      const name = SKILL_NAMES[i];
      const lv = G.skillLevels[i];
      const xp = G.skills[i];
      const needed = xpForSkillLevel(lv);
      const pct = Math.min(100, (xp/needed)*100);
      let cost = 3 + Math.floor(lv * 0.5);
      if(G.skillLevels[14] >= 99) cost = Math.floor(cost * 0.8);
      else if(G.skillLevels[14] >= 75) cost = Math.floor(cost * 0.85);
      else if(G.skillLevels[14] >= 25) cost = Math.floor(cost * 0.92);
      cost = Math.max(1, cost);
      const hasBadge = G.masteryBadges && G.masteryBadges[i];
      html += '<div class="card" style="position:relative;padding-left:70px;min-height:90px">';
      // Circular level indicator
      html += '<div style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;border:3px solid '+color+';display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,0.3)">';
      html += '<span style="font-size:16px;font-weight:700;color:'+color+'">' + lv + '</span>';
      if(hasBadge) html += '<span style="font-size:10px;color:#ffd700">\u2605</span>';
      html += '</div>';
      // Name and mastery
      html += '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">';
      html += '<b style="color:'+color+'">' + name + '</b>';
      if(hasBadge) html += '<span class="badge" style="background:#ffd700;color:#000;font-size:9px;padding:1px 5px;border-radius:8px">\u2605 MASTERED</span>';
      html += '</div>';
      if(!G.compactMode) html += '<div class="text-sm text-dim" style="margin:2px 0">' + SKILL_DESCS[i] + '</div>';
      // XP progress bar
      html += '<div class="pbar ' + (catBarClass[cat]||'pbar-purple') + '" style="height:14px;margin:4px 0"><div class="pbar-fill" style="width:' + pct + '%"></div>';
      html += '<span class="pbar-text" style="font-size:10px">' + fmtNum(xp) + ' / ' + fmtNum(needed) + '</span></div>';
      // Unlock milestone dots
      const unlocks = getSkillUnlocks(i);
      if(unlocks.length > 0){
        html += '<div style="display:flex;gap:4px;margin:4px 0;align-items:center">';
        unlocks.forEach(u => {
          const dotColor = u.unlocked ? color : '#333';
          const dotBorder = u.unlocked ? color : '#555';
          html += '<span title="Lv.' + u.lv + ': ' + u.desc + '" style="display:inline-block;width:14px;height:14px;border-radius:50%;background:'+dotColor+';border:2px solid '+dotBorder+';cursor:help;transition:all 0.2s"></span>';
        });
        html += '</div>';
      }
      // Train buttons
      html += '<div style="display:flex;gap:6px;margin-top:4px">';
      html += '<button class="btn btn-purple" style="flex:1;padding:4px 8px;min-height:28px;font-size:11px" onclick="trainSkill(' + i + ')">Train <span class="text-dim">EN:' + cost + '</span></button>';
      html += '<button class="btn" style="flex:1;padding:4px 8px;min-height:28px;font-size:11px;color:#b026ff;border-color:#b026ff" onclick="trainSkillX10(' + i + ')">x10 <span class="text-dim">EN:' + (cost*10) + '</span></button>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
  }
  c.innerHTML = html;
}

function equipItem(idx){
  const item = G.inventory[idx];
  if(!item) return;
  // Check skill requirement
  if(item.reqSkill >= 0 && item.reqLevel > 0){
    if(G.skillLevels[item.reqSkill] < item.reqLevel){
      toast('Need ' + SKILL_NAMES[item.reqSkill] + ' Lv.' + item.reqLevel + ' to equip!', '#f44');
      return;
    }
  }
  const oldPower = getCombatPower();
  // Swap if something equipped
  if(G.gear[item.slot]){
    G.inventory.push(G.gear[item.slot]);
  }
  G.gear[item.slot] = item;
  G.inventory.splice(idx, 1);
  const newPower = getCombatPower();
  const diff = newPower - oldPower;
  if(diff > 0) toast('\u2B06 +' + diff + ' Power!', '#0f0');
  else if(diff < 0) toast('\u2B07 ' + diff + ' Power', '#f44');
  else toast('Equipped ' + item.name, '#0ff');
  save();
  showTab('gear');
}

function unequip(slot){
  if(!G.gear[slot]) return;
  const oldPower = getCombatPower();
  G.inventory.push(G.gear[slot]);
  G.gear[slot] = null;
  const newPower = getCombatPower();
  const diff = newPower - oldPower;
  if(diff < 0) toast('\u2B07 ' + diff + ' Power', '#f44');
  save();
  showTab('gear');
}

function sellItem(idx){
  const item = G.inventory[idx];
  if(!item) return;
  if(item.favorited){ toast('Cannot sell favorited item!','#f44'); return; }
  const price = item.level * (item.rarity+1) * 3;
  G.gold += price;
  G.inventory.splice(idx, 1);
  toast('Sold for ' + price + ' gold', '#ffd700');
  save();
  showTab('gear');
}

// Gear Favorites (#9)
function toggleFavorite(invIdx){
  const item = G.inventory[invIdx];
  if(!item) return;
  item.favorited = !item.favorited;
  toast(item.favorited ? item.name + ' favorited!' : item.name + ' unfavorited.', '#ffd700');
  save(); showTab('gear');
}

        html += '<span title="'+(worker ? worker.name + ' Lv.' + worker.level : 'Empty')+'" style="display:inline-block;width:14px;height:14px;border-radius:50%;background:'+(filled?wColor:'transparent')+';border:2px solid '+wColor+';cursor:'+(filled?'pointer':'default')+'"' + (filled?' onclick="showTab(\'followers_detail\','+worker.id+')"':'') + '></span>';
      }
      html += '</div>';
    }
    // Slot bonus info
    if(lv > 0) html += '<div class="text-sm" style="color:#555;margin:2px 0">' + b.slotBonus + '</div>';
    // Upgrade button
    if(!maxed){
      html += '<button class="btn btn-cyan" style="padding:3px 8px;min-height:24px;font-size:11px;width:100%;margin-top:4px" onclick="upgradeBuilding(\'' + b.id + '\')">\u2191 Upgrade (' + fmtNum(cost) + 'g)</button>';
    } else {
      html += '<div style="text-align:center;margin-top:4px"><span class="legendary" style="font-size:11px">MAXED</span></div>';
    }
    html += '</div>';
  });
  html += '</div>';

  // Idle & Combat followers
  const cityFollowers = G.followers.filter(f => (f.cityIdx || 0) === ci);
  const idleFollowers = cityFollowers.filter(f => f.assigned === 'idle' || f.assigned === 'combat');
  if(idleFollowers.length > 0){
    html += '<h3>Idle & Combat (' + idleFollowers.length + ')</h3>';
    html += '<div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap">';
    ['rarity','level','power','happiness'].forEach(s => {
      const active = G._followerSort === s;
      html += '<button class="btn' + (active?' btn-cyan':'') + '" style="padding:2px 8px;min-height:22px;font-size:10px;border-radius:12px" onclick="G._followerSort=\''+s+'\';showTab(\'town\')">' + s.charAt(0).toUpperCase()+s.slice(1) + '</button>';
    });
    html += '</div>';
    if(G._followerSort === 'rarity') idleFollowers.sort((a,b) => b.rarity - a.rarity);
    else if(G._followerSort === 'level') idleFollowers.sort((a,b) => b.level - a.level);
    else if(G._followerSort === 'power') idleFollowers.sort((a,b) => b.power - a.power);
    else if(G._followerSort === 'happiness') idleFollowers.sort((a,b) => a.happiness - b.happiness);
    idleFollowers.forEach(f => {
      const rc = rarityColors[f.rarity];
      const hColor = f.happiness > 60 ? '#0f0' : f.happiness > 30 ? '#ffd700' : '#f44';
      html += '<div class="follower-card" style="border-left:3px solid '+rc+';display:flex;align-items:center;gap:8px;padding:5px 8px">';
      html += '<span class="' + RARITIES[f.rarity] + '" style="font-weight:700">' + f.name + '</span>';
      html += '<span class="text-sm text-dim">Lv.' + f.level + '</span>';
      html += '<span class="text-sm text-dim">' + f.class + '</span>';
      html += '<span class="badge" style="background:' + (f.assigned==='combat'?'#f44':'#444') + ';color:#fff;font-size:8px;padding:1px 5px;border-radius:8px">' + f.assigned + '</span>';
      html += '<span style="color:' + hColor + ';font-size:12px">\u2665' + f.happiness + '</span>';
      html += '<button class="btn" style="padding:2px 6px;min-height:22px;font-size:10px;margin-left:auto" onclick="showTab(\'followers_detail\',' + f.id + ')">Manage</button>';
      html += '</div>';
    });
  }

  // Unassigned followers
  const unassigned = G.followers.filter(f => f.cityIdx === undefined || f.cityIdx === null);
  if(unassigned.length > 0){
    html += '<div class="card" style="border-color:#f44;margin-top:8px">';
    html += '<div style="color:#f44;font-weight:700;margin-bottom:6px">\u26A0 Unassigned (' + unassigned.length + ')</div>';
    unassigned.forEach(f => {
      const rc = rarityColors[f.rarity];
      html += '<div style="display:flex;align-items:center;gap:8px;margin:4px 0">';
      html += '<span style="width:8px;height:8px;border-radius:50%;background:'+rc+'"></span>';
      html += '<span class="' + RARITIES[f.rarity] + '">' + f.name + '</span>';
      html += '<span class="text-sm text-dim">Lv.' + f.level + '</span>';
      html += '<button class="btn btn-green" style="padding:2px 8px;min-height:22px;font-size:10px;margin-left:auto" onclick="moveFollowerToCity(' + f.id + ',' + ci + ')">Assign</button>';
      html += '</div>';
    });
    html += '</div>';
  }

  // Bulk actions
  if(cityFollowers.length > 0){
    html += '<div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap">';
    html += '<button class="btn btn-green" style="flex:1;min-width:120px;padding:8px;font-size:13px" onclick="bulkFeed(' + ci + ')">\uD83C\uDF56 Feed All (' + cityFollowers.length + ')</button>';
    html += '<button class="btn btn-purple" style="flex:1;min-width:120px;padding:8px;font-size:13px" onclick="bulkTrain(' + ci + ')">\u2694 Train All</button>';
    html += '<button class="btn btn-cyan" style="flex:1;min-width:120px;padding:8px;font-size:13px" onclick="autoAssignFollowers()">\u2699 Auto-Assign</button>';
    html += '<button class="btn" style="flex:1;min-width:120px;padding:8px;font-size:13px;color:#888;border-color:#888" onclick="renameCity(' + ci + ')">\u270F Rename (100g)</button>';
    html += '</div>';
  }

  c.innerHTML = html;
}

function bulkFeed(cityIdx){
  const followers = G.followers.filter(f => (f.cityIdx || 0) === cityIdx && f.happiness < 100);
  if(followers.length === 0){ toast('All followers are happy!', '#0f0'); return; }
  let totalCost = 0;
  followers.forEach(f => { totalCost += 10 + f.level * 5; });
  if(G.gold < totalCost){ toast('Need ' + totalCost + ' gold to feed all', '#f44'); return; }
  G.gold -= totalCost;
  let fed = 0;
  followers.forEach(f => {
    f.happiness = Math.min(100, f.happiness + 20);
    f.loyalty = Math.min(100, f.loyalty + 5);
    fed++;
  });
  toast('Fed ' + fed + ' followers for ' + totalCost + ' gold!', '#0f0');
  save();
  showTab('town');
}

function bulkTrain(cityIdx){
  const followers = G.followers.filter(f => (f.cityIdx || 0) === cityIdx && f.level < 50);
  if(followers.length === 0){ toast('All followers maxed!', '#0f0'); return; }
  let totalCost = 0;
  followers.forEach(f => { totalCost += 20 + f.level * 15; });
  if(G.gold < totalCost){ toast('Need ' + totalCost + ' gold to train all', '#f44'); return; }
  G.gold -= totalCost;
  let leveled = 0;
  followers.forEach(f => {
    const oldLevel = f.level;
    f.xp += 30 + f.level * 5;
    const needed = f.level * 50;
    if(f.xp >= needed && f.level < 50){
      f.xp -= needed;
      f.level++;
      f.power += (f.rarity + 1);
      f.defense += Math.floor((f.rarity + 1) * 0.7);
      leveled++;
      // Title announcements on milestone levels
      if(oldLevel < 25 && f.level >= 25) toast(f.name + ' earned a title: ' + getFollowerDisplayName(f) + '!', '#ffd700');
      if(oldLevel < 50 && f.level >= 50) toast(f.name + ' has become LEGENDARY: ' + getFollowerDisplayName(f) + '!', '#ff2060');
    }
  });
  toast('Trained ' + followers.length + ' followers! ' + leveled + ' leveled up!', '#b026ff');
  save();
  showTab('town');
}

// Follower Auto-Assign (#7)
function autoAssignFollowers(){
  const ci = G.currentCity;
  const idleFollowers = G.followers.filter(f => (f.cityIdx||0) === ci && f.assigned === 'idle');
  if(idleFollowers.length === 0){ toast('No idle followers to assign!','#f44'); return; }
  let assigned = 0;
  idleFollowers.forEach(f => {
    const classInfo = FOLLOWER_CLASS_BONUSES[f.class];
    if(!classInfo) return;
    const bestBldg = classInfo.bestBuilding;
    const bLv = G.cities[ci].buildings[bestBldg] || 0;
    if(bLv <= 0) return;
    const slots = getBuildingSlots(bestBldg, ci);
    const current = getFollowersInSlot(bestBldg, ci).length;
    if(current < slots){
      f.assigned = bestBldg;
      assigned++;
    }
  });
  // Assign remaining idle to combat
  const stillIdle = G.followers.filter(f => (f.cityIdx||0) === ci && f.assigned === 'idle');
  stillIdle.forEach(f => { f.assigned = 'combat'; assigned++; });
  toast('Auto-assigned ' + assigned + ' followers!', '#0ff');
  save(); showTab('town');
}

// City Rename (#14)
function renameCity(cityIdx){
  const newName = prompt('Enter new city name:');
  if(!newName || newName.trim() === '') return;
  if(G.gold < 100){ toast('Need 100 gold to rename','#f44'); return; }
  G.gold -= 100;
  G.cities[cityIdx].name = newName.trim().substring(0, 20);
  toast('City renamed to ' + G.cities[cityIdx].name + '!', '#0ff');
  save(); showTab('town');
}

// Follower Gift System (#11)
function giveFollowerGift(fId, giftType){
  const f = G.followers.find(x => x.id === fId);
  if(!f) return;
  if(G.gold < 50){ toast('Need 50 gold','#f44'); return; }
  G.gold -= 50;
  if(giftType === 'food'){
    f.happiness = Math.min(100, f.happiness + 20);
    toast(f.name + ' loved the food! +20 happiness', '#0f0');
  } else if(giftType === 'manual'){
    f.xp += 50 + f.level * 10;
    const needed = f.level * 50;
    if(f.xp >= needed && f.level < 50){ f.xp -= needed; f.level++; f.power += (f.rarity+1); f.defense += Math.floor((f.rarity+1)*0.7); toast(f.name + ' leveled up!','#b026ff'); }
    else { toast(f.name + ' gained training XP from manual!', '#0ff'); }
  } else if(giftType === 'token'){
    f.loyalty = Math.min(100, f.loyalty + 15);
    toast(f.name + ' feels more loyal! +15 loyalty', '#ffd700');
  }
  save(); showTab('followers_detail', fId);
}

  // Pity trackers as progress bars

  c.innerHTML = html;
}

function renderProfile(c){
  const clsData = CLASSES[G.class];

  let html = '';

  // Character header card
  html += '<div class="card" style="border-color:'+clsData.passiveColor+';border-width:2px;padding:16px;background:linear-gradient(135deg, rgba(0,0,0,0.3) 0%, transparent 100%)">';

  html += '<div style="width:56px;height:56px;border-radius:50%;border:3px solid '+clsData.passiveColor+';display:flex;align-items:center;justify-content:center;font-size:28px;background:rgba(0,0,0,0.4)">' + classIcon + '</div>';
  html += '<div style="flex:1">';
  html += '<div style="font-size:20px;font-weight:700;color:'+(isGolden?'#ffd700':'#eee')+'">' + G.name + '</div>';
  html += '<div style="color:'+clsData.passiveColor+';font-size:13px">' + clsData.name + ' <span class="text-dim">Lv.' + G.level + '/100</span></div>';
  if(G.prestige > 0) html += '<div class="text-sm" style="color:#ffd700">\u2B50 Prestige ' + G.prestige + ' (+' + G.prestige_bonus + '% XP)</div>';
  html += '</div>';
  html += '<div style="text-align:right">';
  html += '<div class="text-sm text-dim">\uD83D\uDD25 Streak: ' + (G.loginStreak||0) + 'd</div>';
  if(G.lastOnline){
    const hoursAgo = Math.floor((Date.now() - G.lastOnline) / 3600000);
    const minsAgo = Math.floor((Date.now() - G.lastOnline) / 60000);
    html += '<div class="text-sm text-dim">' + (hoursAgo > 0 ? hoursAgo + 'h ago' : minsAgo + 'm ago') + '</div>';
  }
  html += '</div>';
  html += '</div>';
  // Passive
  html += '<div style="margin-top:8px;padding:6px 10px;background:rgba(0,0,0,0.2);border-radius:6px;border-left:3px solid '+clsData.passiveColor+'">';

  html += '</div>';
  // Bounty rank + skill total
  const bhCount = G.bountiesCompleted || 0;
  let bhRank = 'Novice', bhColor = '#888';
  if(bhCount >= 100){ bhRank = 'Legendary'; bhColor = '#ffd700'; }
  else if(bhCount >= 50){ bhRank = 'Elite'; bhColor = '#b026ff'; }
  else if(bhCount >= 25){ bhRank = 'Veteran'; bhColor = '#44f'; }
  else if(bhCount >= 10){ bhRank = 'Hunter'; bhColor = '#0f0'; }
  const bhBonus = Math.floor((bhCount >= 100 ? 5 : bhCount >= 50 ? 4 : bhCount >= 25 ? 3 : bhCount >= 10 ? 2 : 1) - 1) * 2;
  const totalSkillLevel = G.skillLevels.reduce((sum, lv) => sum + lv, 0);
  let milestoneBonus = '';
  if(totalSkillLevel >= 1000) milestoneBonus = '+20% all stats';
  else if(totalSkillLevel >= 500) milestoneBonus = '+15% all stats';
  else if(totalSkillLevel >= 250) milestoneBonus = '+10% all stats';
  else if(totalSkillLevel >= 100) milestoneBonus = '+5% all stats';
  html += '<div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap">';
  html += '<div class="text-sm">Bounty: <span style="color:'+bhColor+'">' + bhRank + '</span> <span class="text-dim">(' + bhCount + ', +' + bhBonus + '%)</span></div>';
  html += '<div class="text-sm">Skills: <span style="color:#b026ff">' + totalSkillLevel + '</span>/1485' + (milestoneBonus ? ' <span style="color:#ffd700">' + milestoneBonus + '</span>' : '') + '</div>';
  html += '</div>';
  html += '</div>';

  // Stats as horizontal bars
  html += '<h3>Stats <span class="text-sm text-dim">(Points: ' + G.statPoints + ')</span></h3>';
  html += '<div class="card">';
  const statColors = {power:'#f44',defense:'#4af',speed:'#0f0',luck:'#ffd700'};
  const statIcons = {power:'\u2694',defense:'\uD83D\uDEE1',speed:'\u26A1',luck:'\u2618'};
  const maxStat = Math.max(30, ...['power','defense','speed','luck'].map(s => G.stats[s]));
  ['power','defense','speed','luck'].forEach(s => {
    const pct = Math.min(100, (G.stats[s] / maxStat) * 100);
    html += '<div style="display:flex;align-items:center;gap:8px;margin:4px 0">';
    html += '<span style="width:20px;text-align:center">' + statIcons[s] + '</span>';
    html += '<span style="min-width:55px;font-size:12px">' + s.charAt(0).toUpperCase()+s.slice(1) + '</span>';
    html += '<div style="flex:1;height:16px;background:#111;border-radius:3px;position:relative;overflow:hidden">';
    html += '<div style="width:'+pct+'%;height:100%;background:'+statColors[s]+';border-radius:3px;transition:width 0.3s"></div>';
    html += '<span style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:10px;font-weight:700;color:#fff;text-shadow:0 0 3px #000">' + G.stats[s] + '</span>';
    html += '</div>';
    if(G.statPoints > 0){
      html += '<button class="btn btn-green" style="padding:0 8px;min-height:22px;font-size:14px;width:28px" onclick="allocStat(\'' + s + '\')">+</button>';
    }
    html += '</div>';
  });
  html += '</div>';

  // Talents
  html += '<h3>Talents <span class="text-sm text-dim">(Points: ' + (G.talentPoints||0) + ')</span></h3>';

    html += '<div style="height:6px;background:#111;border-radius:3px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:#b026ff;border-radius:3px"></div></div>';
    html += '</div>';
    if((G.talentPoints||0) > 0 && cur < t.max){
      html += '<button class="btn btn-purple" style="padding:0 6px;min-height:20px;font-size:12px;width:24px" onclick="buyTalent(\''+t.id+'\')">+</button>';
    }
    html += '</div>';
  });
  html += '</div></div>';

  // Artifacts

  html += '<span class="text-sm">Fragments:</span>';
  html += '<div class="pbar pbar-gold" style="flex:1;height:12px"><div class="pbar-fill" style="width:'+fragPct+'%"></div><span class="pbar-text" style="font-size:9px">' + frags + '/10</span></div>';
  if(frags >= 10) html += '<button class="btn btn-gold" style="padding:3px 10px;min-height:24px;font-size:11px" onclick="forgeArtifact();showTab(\'profile\')">\u2728 Forge!</button>';
  html += '</div>';
  if(G.artifacts && G.artifacts.length > 0){
    G.artifacts.forEach(a => {
      html += '<div style="display:flex;align-items:center;gap:6px;padding:3px 0;border-left:2px solid #ff2060;padding-left:8px;margin:3px 0">';
      html += '<span style="color:#ff2060;font-weight:700;font-size:12px">' + a.name + '</span>';
      html += '<span class="text-sm text-dim">' + a.desc + '</span>';
      html += '</div>';
    });
  }
  html += '</div>';

  // Blueprints
  if(G.blueprints && G.blueprints.length > 0){
    html += '<h3>Blueprints</h3>';
    html += '<div class="card"><div style="display:flex;gap:6px;flex-wrap:wrap">';
    G.blueprints.forEach(bp => {
      html += '<span class="badge" style="background:#ffd700;color:#000;padding:3px 8px;border-radius:10px;font-size:10px">' + bp + '</span>';
    });
    html += '</div></div>';
  }

  // Faction War Result
  if(G.factionWarResult){
    html += '<div class="card glow-gold" style="border-color:#f80"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:20px">\uD83C\uDFC6</span><div><b>Faction War</b> Rank #' + G.factionWarResult.rank + '<br><span class="text-sm" style="color:#ffd700">' + G.factionWarResult.bonus + '</span></div></div></div>';
  }

  // Potions as visual item slots
  html += '<h3>\u2697 Alchemy</h3>';
  html += '<div class="card">';

  }
  html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">';

      html += '<div style="text-align:center;padding:6px 10px;border:1px solid '+p.color+';border-radius:6px;min-width:60px">';

    {icon:'\uD83D\uDC80',val:fmtNum(G.bosses_killed),label:'Bosses'},
    {icon:'\uD83D\uDDE1',val:fmtNum(G.total_kills),label:'Kills'},
    {icon:'\uD83D\uDCB0',val:fmtNum(G.total_gold_earned),label:'Gold'},
    {icon:'\uD83D\uDC8E',val:G.total_gacha_pulls,label:'Pulls'},
    {icon:'\uD83D\uDC65',val:G.followers.length,label:'Followers'}
  ];

  html += '<div class="stat-row"><span class="text-sm text-dim">Potions Used</span><span>' + (cs.potionsUsed||0) + '</span></div>';

  html += '<div class="card text-sm">';

    html += r + ': <span style="color:#0f0">Fine:' + (fR[r]||0) + '</span> <span style="color:#ffd700">Pristine:' + (pR[r]||0) + '</span> ';
  });

  html += '</div>';

  const progressAchs = [
    {id:'kill_100',name:'Complete 100 missions',cur:G.missions_completed,target:100},
    {id:'kill_250',name:'Complete 250 missions',cur:G.missions_completed,target:250},
    {id:'kill_500',name:'Complete 500 missions',cur:G.missions_completed,target:500},
    {id:'kill_1000',name:'Complete 1000 missions',cur:G.missions_completed,target:1000},
    {id:'boss_10',name:'Kill 10 bosses',cur:G.bosses_killed,target:10},
    {id:'boss_50',name:'Kill 50 bosses',cur:G.bosses_killed,target:50},
    {id:'boss_100',name:'Kill 100 bosses',cur:G.bosses_killed,target:100},
    {id:'gold_10k',name:'Earn 10k gold',cur:G.total_gold_earned,target:10000},
    {id:'gold_50k',name:'Earn 50k gold',cur:G.total_gold_earned,target:50000},

  ];
  progressAchs.forEach(pa => {
    if(G.achievements.includes(pa.id)) return; // already earned
    const pct = Math.min(100, Math.floor((pa.cur / pa.target) * 100));
    html += pa.name + ': <span style="color:#0ff">' + Math.min(pa.cur, pa.target) + '/' + pa.target + '</span>';
    html += '<div class="pbar pbar-gold"><div class="pbar-fill" style="width:'+pct+'%"></div><span class="pbar-text">'+pct+'%</span></div>';
  });
  html += '</div>';

  // Prestige
  if(G.level >= 100){
    html += '<div class="card mt">';

    html += '</div>';
  }

  // Save/Load
  html += '<div class="card mt">';
  html += '<button class="btn" onclick="save();toast(\'Saved!\',\'#0f0\')">Manual Save</button> ';
  html += '<button class="btn btn-red" onclick="if(confirm(\'Delete ALL save data?\')){ localStorage.removeItem(\'voidraiders_save\'); location.reload(); }">Reset Game</button>';
  html += '</div>';

  c.innerHTML = html;
}

function allocStat(stat){
  if(G.statPoints <= 0) return;
  G.statPoints--;
  G.stats[stat]++;
  save();
  showTab('profile');
}

function renderResearch(c){
  const labLv = getAllBuildingLevel('lab');
  const done = Object.keys(G.research||{}).filter(k=>G.research[k]).length;
  let html = '<h2>🔬 Research</h2>';
  html += '<div class="card"><div class="card-row"><div class="card-icon">🔬</div><div class="card-body">';
  html += '<div class="card-title">Lab Level: ' + labLv + '</div>';
  html += '<div class="card-desc">Researched: ' + done + '/' + TECH_TREE.length + (labLv<3?' | Need Lab Lv.3 to research':'') + '</div>';
  html += '</div></div></div>';
  TECH_TREE.forEach(t => {
    const isDone = G.research[t.id];
    const canResearch = !isDone && labLv >= 3 && Object.keys(t.req).every(r => G.research[r]);
    const icon = isDone ? '✅' : canResearch ? '🔓' : '🔒';
    const border = isDone ? '#0f0' : canResearch ? 'var(--accent)' : '#1e1e3a';
    html += '<div class="card" style="border-color:'+border+'"><div class="card-row">';
    html += '<div style="font-size:20px;width:30px;text-align:center">' + icon + '</div>';
    html += '<div class="card-body">';
    html += '<div class="card-title">' + t.name + '</div>';
    html += '<div class="card-desc">' + t.desc + '</div>';
    if(Object.keys(t.req).length > 0) html += '<div class="text-sm" style="color:#556;margin-top:2px">Needs: ' + Object.keys(t.req).map(r => TECH_TREE.find(x=>x.id===r).name).join(', ') + '</div>';
    html += '</div>';
    if(isDone) html += '<div style="color:#0f0;font-weight:700;font-size:12px">DONE</div>';
    else if(canResearch) html += '<div class="card-action"><button class="btn btn-cyan" onclick="researchTech(\''+t.id+'\');showTab(\'research\')">' + fmtNum(t.cost) + 'g</button></div>';
    else html += '<div style="color:#334;font-size:11px">' + fmtNum(t.cost) + 'g</div>';
    html += '</div></div>';
  });
  html += '<button class="btn btn-full" onclick="showTab(\'more\')">← Back</button>';
  c.innerHTML = html;
}

function renderExplore(c){
  generateMap();
  const tileIcons = {enemy:'💀',boss:'👹',cache:'💰',resource:'⛏',ruins:'🏛',shrine:'⛩',trap:'💥',empty:'·'};
  let html = '<h2>🗺 Explore</h2>';
  html += '<div class="card"><div class="card-row"><div class="card-icon">🗺</div><div class="card-body">';
  html += '<div class="card-title">Tile ' + (G.mapPosition||0) + ' / 50</div>';
  const pct = Math.floor(((G.mapPosition||0)/50)*100);
  html += '<div class="pbar pbar-cyan pbar-sm" style="margin-top:4px"><div class="pbar-fill" style="width:'+pct+'%"></div><span class="pbar-text">'+pct+'%</span></div>';
  html += '<div class="card-desc">Free to explore. Find caches, shrines, and bosses!</div>';
  html += '</div></div></div>';
  // Show tiles
  const start = Math.max(0, (G.mapPosition||0) - 2);
  const end = Math.min(MAP_TILES.length, (G.mapPosition||0) + 6);
  for(let i = start; i < end; i++){
    const tile = MAP_TILES[i];
    const explored = G.exploredTiles && G.exploredTiles.includes(i);
    const canExplore = i <= (G.mapPosition||0) + 1 && !explored;
    const icon = explored ? (tileIcons[tile.type]||'·') : '❓';
    const border = canExplore ? 'var(--accent)' : explored ? '#1e1e3a' : '#111';
    html += '<div class="card" style="border-color:'+border+'"><div class="card-row">';
    html += '<div style="font-size:22px;width:36px;text-align:center">' + icon + '</div>';
    html += '<div class="card-body">';
    html += '<div class="card-title" style="font-size:13px">Tile ' + i + (explored ? ': ' + tile.name : '') + '</div>';
    if(!explored && canExplore) html += '<div class="card-desc">Unknown territory</div>';
    else if(!explored) html += '<div class="card-desc" style="color:#333">Too far ahead</div>';
    html += '</div>';
    if(canExplore) html += '<div class="card-action"><button class="btn btn-cyan" onclick="exploreTile('+i+');showTab(\'explore\')">Explore</button></div>';
    html += '</div></div>';
  }
  if((G.treasureMaps||0) > 0) html += '<div class="card text-center"><button class="btn btn-gold btn-full" onclick="useTreasureMap();showTab(\'explore\')">🗺 Use Treasure Map ('+G.treasureMaps+')</button></div>';
  html += '<button class="btn btn-full" onclick="showTab(\'more\')">← Back</button>';
  c.innerHTML = html;
}

function renderExpeditions(c){
  let html = '<h2>Expeditions</h2>';
  html += '<div class="text-sm text-dim mb">Send followers on timed missions. Max 3 active.</div>';
  // Active expeditions
  if(G.expeditions && G.expeditions.length > 0){
    html += '<h3>Active (' + G.expeditions.length + '/3)</h3>';
    G.expeditions.forEach((exp, i) => {
      const type = EXPEDITION_TYPES[exp.type];
      const timeLeft = Math.max(0, Math.floor((exp.endTime - Date.now()) / 1000));
      const ready = timeLeft <= 0;
      const fNames = exp.followerIds.map(id => { const f = G.followers.find(x=>x.id===id); return f ? f.name : '?'; }).join(', ');
      html += '<div class="card" style="border-color:'+(ready?'#ffd700':'#333')+'">';
      html += '<b>' + type.name + '</b> - ' + fNames + '<br>';
      if(ready){ html += '<button class="btn btn-gold" onclick="collectExpedition('+i+');showTab(\'expeditions\')">COLLECT!</button>'; }
      else { html += 'Time left: ' + Math.floor(timeLeft/60) + 'm ' + (timeLeft%60) + 's'; }
      html += '</div>';
    });
  }
  // Start new
  if(!G.expeditions || G.expeditions.length < 3){
    html += '<h3>Start Expedition</h3>';
    const idleFollowers = G.followers.filter(f => f.assigned === 'idle' || f.assigned === 'combat');
    if(idleFollowers.length === 0){
      html += '<div class="text-dim">No idle followers available.</div>';
    } else {
      EXPEDITION_TYPES.forEach((type, ti) => {
        html += '<div class="card">';
        html += '<b>' + type.name + '</b> (' + type.desc + ') - EN:' + type.energy + '<br>';
        html += '<span class="text-sm">Gold: ' + type.goldMin + '-' + type.goldMax + ' | XP: ' + type.xpMin + '-' + type.xpMax + ' | Gear: ' + Math.floor(type.gearChance*100) + '%</span><br>';
        // Quick send first idle follower
        const first = idleFollowers[0];
        html += '<button class="btn btn-cyan" onclick="startExpedition('+ti+',['+first.id+']);showTab(\'expeditions\')">Send ' + first.name + '</button>';
        if(idleFollowers.length > 1){
          const ids = idleFollowers.slice(0,3).map(f=>f.id);
          html += ' <button class="btn btn-green" onclick="startExpedition('+ti+','+JSON.stringify(ids)+');showTab(\'expeditions\')">Send '+Math.min(3,idleFollowers.length)+' followers</button>';
        }
        html += '</div>';
      });
    }
  }
  // Expedition Log (#4)
  if(G.expeditionLog && G.expeditionLog.length > 0){
    html += '<h3>Expedition Log</h3>';
    G.expeditionLog.forEach(entry => {
      const ago = Math.floor((Date.now() - entry.time) / 60000);
      html += '<div class="card text-sm">';
      html += '<span style="color:#ffd700">' + (entry.type||'Expedition') + '</span> (' + ago + 'm ago)<br>';
      html += entry.msg;
      html += '</div>';
    });
  }
  html += '<div class="mt"><button class="btn" onclick="showTab(\'more\')">Back</button></div>';
  c.innerHTML = html;
}

function renderRecipes(c){
  let html = '<h2>Crafting Recipes</h2>';
  html += '<div class="text-sm text-dim mb">Multi-skill recipes for powerful gear.</div>';
  // Feature 2: Crafting Queue display
  if(G.craftQueue && G.craftQueue.length > 0){
    html += '<div class="card" style="border-color:#0ff"><b>Craft Queue (' + G.craftQueue.length + ')</b>: ';
    G.craftQueue.forEach((idx, qi) => {
      html += '<span class="text-sm">' + (RECIPES[idx]?.name||'?') + '</span>';
      if(qi < G.craftQueue.length-1) html += ', ';
    });
    html += ' <button class="btn btn-red" style="padding:2px 6px;min-height:24px" onclick="G.craftQueue=[];save();showTab(\'recipes\')">Clear Queue</button>';
    html += '</div>';
  }
  RECIPES.forEach((r, i) => {
    const canCraft = Object.keys(r.reqs).every(sk => G.skillLevels[parseInt(sk)] >= r.reqs[sk]);
    html += '<div class="card" style="border-color:' + (canCraft?'#ffd700':'#333') + '">';
    html += '<span class="' + RARITIES[r.rarity] + '">' + r.name + '</span> [' + r.slot + ']<br>';
    html += '<span class="text-sm">Requires: ' + r.desc + '</span><br>';
    html += '<span class="text-sm">Cost: ' + r.cost + 'g</span> ';
    if(canCraft){ html += '<button class="btn btn-gold" onclick="craftRecipe('+i+');showTab(\'recipes\')">Craft!</button>'; }
    else { html += '<span class="text-dim">Skills too low</span>'; }
    // Feature 2: Queue button
    if(canCraft){ html += ' <button class="btn btn-cyan" style="padding:4px 8px;min-height:30px" onclick="queueCraft('+i+');showTab(\'recipes\')">+ Queue</button>'; }
    html += '</div>';
  });
  // Blueprint recipes (#24)
  if(G.blueprints && G.blueprints.length > 0){
    html += '<h3>Blueprint Recipes</h3>';
    html += '<div class="text-sm text-dim mb">Special recipes unlocked from boss blueprint drops.</div>';
    G.blueprints.forEach((bp, i) => {
      const bpCost = 2000 + i * 1000;
      const canCraft = G.skillLevels[8] >= 50;
      html += '<div class="card" style="border-color:' + (canCraft?'#ff2060':'#333') + '">';
      html += '<span style="color:#ff2060">' + bp + '</span><br>';
      html += '<span class="text-sm">Requires: Crafting Lv.50 | Cost: ' + bpCost + 'g</span> ';
      if(canCraft){ html += '<button class="btn" style="color:#ff2060;border-color:#ff2060" onclick="craftBlueprint('+i+');showTab(\'recipes\')">Craft!</button>'; }
      else { html += '<span class="text-dim">Need Crafting 50</span>'; }
      html += '</div>';
    });
  }
  html += '<div class="mt"><button class="btn" onclick="showTab(\'more\')">Back</button></div>';
  c.innerHTML = html;
}

function renderFusion(c){
  let html = '<h2>Follower Fusion</h2>';
  html += '<div class="text-sm text-dim mb">Combine 3 same-rarity followers into 1 of the next rarity.</div>';
  // Group followers by rarity
  for(let r = 0; r < 5; r++){
    const pool = G.followers.filter(f => f.rarity === r);
    if(pool.length < 3) continue;
    html += '<div class="card">';
    html += '<b class="' + RARITIES[r] + '">' + RARITY_NAMES[r] + '</b> (' + pool.length + ' available) → <span class="' + RARITIES[r+1] + '">' + RARITY_NAMES[r+1] + '</span><br>';
    // Fuse first 3
    const ids = pool.slice(0,3);
    html += '<span class="text-sm">' + ids.map(f=>f.name).join(' + ') + '</span> ';
    html += '<button class="btn btn-gold" onclick="fuseFollowers('+ids[0].id+','+ids[1].id+','+ids[2].id+');showTab(\'fusion\')">FUSE!</button>';
    html += '</div>';
  }
  const noFusable = [0,1,2,3,4].every(r => G.followers.filter(f=>f.rarity===r).length < 3);
  if(noFusable) html += '<div class="text-dim">Need 3 followers of the same rarity to fuse.</div>';
  html += '<div class="mt"><button class="btn" onclick="showTab(\'more\')">Back</button></div>';
  c.innerHTML = html;
}

function renderClan(c){
  let html = '<h2>Clan</h2>';
  if(!G.clanName){
    html += '<div class="card">';
    html += '<div class="text-sm text-dim mb">Found a clan to unlock perks and organize your followers.</div>';
    html += '<button class="btn btn-cyan" onclick="var n=prompt(\'Name your clan:\');if(n)createClan(n);showTab(\'clan\')">Found Clan (500g)</button>';
    html += '</div>';
  } else {
    html += '<div class="card"><b style="color:#0ff">' + G.clanName + '</b><br>';
    html += 'Clan Power: ' + getClanPower() + '</div>';
    // Council
    html += '<h3>Council (' + G.clanCouncil.length + '/5)</h3>';
    G.clanCouncil.forEach(id => {
      const f = G.followers.find(x=>x.id===id);
      if(!f) return;
      html += '<div class="follower-card"><span class="' + RARITIES[f.rarity] + '">' + f.name + '</span> Lv.' + f.level;
      html += ' <button class="btn btn-red" style="padding:2px 6px;min-height:24px" onclick="removeFromCouncil('+f.id+');showTab(\'clan\')">Remove</button></div>';
    });
    if(G.clanCouncil.length < 5){
      const available = G.followers.filter(f => !G.clanCouncil.includes(f.id)).sort((a,b) => (b.rarity*100+b.level) - (a.rarity*100+a.level));
      if(available.length > 0){
        html += '<div class="text-sm mt">Add to council:</div>';
        available.slice(0,5).forEach(f => {
          html += '<button class="btn" style="padding:4px 8px;min-height:30px" onclick="addToCouncil('+f.id+');showTab(\'clan\')">' + f.name + ' [' + RARITY_NAMES[f.rarity] + ' Lv.' + f.level + ']</button> ';
        });
      }
    }
    // Perks
    html += '<h3>Clan Perks</h3>';
    CLAN_PERKS.forEach(p => {
      const owned = G.clanPerks[p.id];
      html += '<div class="card" style="border-color:'+(owned?'#0f0':'#333')+'">';
      html += '<b>' + p.name + '</b> - ' + p.desc + '<br>';
      if(owned){ html += '<span style="color:#0f0">UNLOCKED</span>'; }
      else { html += '<button class="btn btn-cyan" onclick="buyClanPerk(\''+p.id+'\');showTab(\'clan\')">Unlock ('+p.cost+'g)</button>'; }
      html += '</div>';
    });
  }
  html += '<div class="mt"><button class="btn" onclick="showTab(\'more\')">Back</button></div>';
  c.innerHTML = html;
}

function renderMarket(c){
  let html = '<h2>Black Market</h2>';
  html += '<div class="text-sm text-dim mb">Refreshes daily. Buy what you need — no gacha RNG.</div>';
  if(!G.marketStock || G.marketStock.length === 0) refreshMarket();
  if(Date.now() - (G.marketRefreshTime||0) > 86400000){ refreshMarket(); }
  const timeLeft = Math.floor((86400000 - (Date.now() - G.marketRefreshTime)) / 60000);
  html += '<div class="text-sm mb">Refreshes in: ' + Math.floor(timeLeft/60) + 'h ' + (timeLeft%60) + 'm | <button class="btn" style="padding:2px 6px;min-height:24px;font-size:10px" onclick="refreshMarket();showTab(\'market\')">Force Refresh</button></div>';
  G.marketStock.forEach((item, i) => {
    html += '<div class="card" style="border-color:' + (item.bought?'#333':'#ffd700') + '">';
    if(item.type === 'follower'){
      html += '<span class="' + RARITIES[item.rarity] + '">' + item.name + '</span> [' + RARITY_NAMES[item.rarity] + ' ' + item.cls + ']';
    } else if(item.type === 'gear'){
      html += '<span class="' + RARITIES[item.gear.rarity] + '">' + item.gear.name + '</span> [' + item.gear.slot + '] PWR:' + item.gear.power + ' DEF:' + item.gear.defense;
    } else if(item.type === 'key'){
      html += KEY_TYPES[item.keyType].name;
    } else if(item.type === 'ticket1x'){
      html += '<span style="color:#0ff">Summon Ticket (1x)</span>';
    } else if(item.type === 'ticket10x'){
      html += '<span style="color:#ffd700">10x Summon Ticket</span>';
    }
    html += ' | <b>' + item.cost + 'g</b> ';
    if(item.bought){ html += '<span class="text-dim">SOLD</span>'; }
    else { html += '<button class="btn btn-gold" onclick="buyMarketItem('+i+');showTab(\'market\')">Buy</button>'; }
    html += '</div>';
  });
  html += '<div class="mt"><button class="btn" onclick="showTab(\'more\')">Back</button></div>';
  c.innerHTML = html;
}

function renderBestiary(c){
  let html = '<h2>Bestiary</h2>';
  const entries = Object.keys(G.bestiary || {});
  html += '<div class="text-sm text-dim mb">Enemies catalogued: ' + entries.length + ' | Kill 25/50/100 for damage bonuses.</div>';
  if(entries.length === 0){
    html += '<div class="text-dim">No entries yet. Go fight something!</div>';
  }
  entries.sort((a,b) => G.bestiary[b].kills - G.bestiary[a].kills);
  entries.forEach(name => {
    const entry = G.bestiary[name];
    const bonus = getBestiaryBonus(name);
    const bonusStr = bonus > 1 ? ' <span style="color:#0f0">+' + Math.floor((bonus-1)*100) + '% dmg</span>' : '';
    html += '<div class="card">';
    html += '<b>' + name + '</b> - Kills: ' + entry.kills + bonusStr;
    const next = entry.kills < 25 ? (25-entry.kills)+' to +5%' : entry.kills < 50 ? (50-entry.kills)+' to +10%' : entry.kills < 100 ? (100-entry.kills)+' to +15%' : 'MAX';
    html += ' <span class="text-sm text-dim">[Next: ' + next + ']</span>';
    html += '</div>';
  });
  html += '<div class="mt"><button class="btn" onclick="showTab(\'more\')">Back</button></div>';
  c.innerHTML = html;
}
