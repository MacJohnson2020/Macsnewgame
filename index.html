// ==================== PRESTIGE ====================
function doPrestige(){
  if(G.level < 100){
    toast('Must be level 100 to prestige!', '#f44');
    return;
  }
  const newPrestige = G.prestige + 1;
  const newBonus = newPrestige * 10; // 10% per prestige
  const name = G.name;
  const cls = G.class;
  const gems = G.gems + 20; // bonus gems
  const achievements = G.achievements;
  const totalPulls = G.total_gacha_pulls;

  G = newGame(name, cls);
  G.prestige = newPrestige;
  G.prestige_bonus = newBonus;
  G.gems = gems;
  G.achievements = achievements;
  G.total_gacha_pulls = totalPulls;
  toast('PRESTIGE ' + newPrestige + '! +' + newBonus + '% XP bonus!', '#ffd700');
  save();
  showTab('profile');
}

// ==================== OFFLINE PROGRESS ====================
function calcOfflineProgress(){
  if(!G.lastOnline) return;
  const now = Date.now();
  const elapsed = (now - G.lastOnline) / 1000; // seconds
  if(elapsed < 60) return; // less than a minute

  // Energy regen
  const regenRate = getEnergyRegenRate();
  const energyGained = Math.min(Math.floor(elapsed / regenRate), getMaxEnergy() - G.energy);
  G.energy = Math.min(getMaxEnergy(), G.energy + energyGained);

  // Gold from foundry
  const goldPerMin = getGoldPerMin();
  const goldGained = Math.floor(goldPerMin * (elapsed / 60));
  G.gold += goldGained;

  // Follower happiness decay
  G.followers.forEach(f => {
    f.happiness = Math.max(0, f.happiness - Math.floor(elapsed / 3600) * 5);
  });

  if(energyGained > 0 || goldGained > 0){
    const mins = Math.floor(elapsed / 60);
    let msg = 'Welcome back! (' + mins + ' min offline)\n';
    if(energyGained > 0) msg += '+' + energyGained + ' Energy\n';
    if(goldGained > 0) msg += '+' + goldGained + ' Gold\n';
    setTimeout(() => toast(msg, '#0ff'), 500);
  }
  G.lastOnline = now;
}

// ==================== UI RENDERING ====================
let currentTab = 'missions';

function updateHUD(){
  if(!G) return;
  document.getElementById('hud-level').textContent = G.level;
  document.getElementById('hud-energy').textContent = G.energy + '/' + getMaxEnergy();
  document.getElementById('hud-gold').textContent = G.gold;
  document.getElementById('hud-gems').textContent = G.gems;
  const needed = xpForLevel(G.level);
  const pct = Math.min(100, (G.xp / needed) * 100);
  document.getElementById('hud-xp-fill').style.width = pct + '%';
  document.getElementById('hud-xp-text').textContent = G.xp + ' / ' + needed + ' XP';
}

function showTab(tab, extra){
  // Remove active from all
  document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
  const tabBtn = document.getElementById('tab-' + tab);
  if(tabBtn) tabBtn.classList.add('active');

  currentTab = tab;
  const c = document.getElementById('content');

  switch(tab){
    case 'missions': renderMissions(c); break;
    case 'skills': renderSkills(c); break;
    case 'gear': renderGear(c); break;
    case 'town': renderTown(c); break;
    case 'gacha': renderGacha(c); break;
    case 'profile': renderProfile(c); break;
    case 'more': renderMore(c); break;
    case 'research': renderResearch(c); break;
    case 'explore': renderExplore(c); break;
    case 'clan': renderClan(c); break;
    case 'expeditions': renderExpeditions(c); break;
    case 'recipes': renderRecipes(c); break;
    case 'fusion': renderFusion(c); break;
    case 'followers_detail': renderFollowerDetail(c, extra); break;
    case 'inventory': renderInventory(c); break;
    default: renderMissions(c);
  }
  updateHUD();
}

function renderMissions(c){

  html += '<br>Class: <span style="color:'+cls.passiveColor+'">' + cls.passive + '</span> - ' + cls.passiveDesc;

    });
    html += '</div>';
  });
  c.innerHTML = html;

function renderSkills(c){
  let html = '<h2>Skills (15)</h2>';
  html += '<div class="text-sm text-dim mb">Train skills to level them up. Higher levels unlock bonuses and gear requirements.</div>';
  for(const cat in SKILL_CATEGORIES){
    const color = cat==='Combat'?'#f44':cat==='Gathering'?'#0f0':cat==='Production'?'#ffd700':'#0ff';
    html += '<h3 style="color:'+color+'">-- ' + cat + ' --</h3>';
    SKILL_CATEGORIES[cat].forEach(i => {
      const name = SKILL_NAMES[i];
      const lv = G.skillLevels[i];
      const xp = G.skills[i];
      const needed = xpForSkillLevel(lv);
      const pct = Math.min(100, (xp/needed)*100);
      let cost = 3 + Math.floor(lv * 0.5);
      if(G.skillLevels[14] >= 99) cost = Math.floor(cost * 0.8);
      else if(G.skillLevels[14] >= 75) cost = Math.floor(cost * 0.85);
      else if(G.skillLevels[14] >= 25) cost = Math.floor(cost * 0.92);
      cost = Math.max(1, cost);
      html += '<div class="card">';
      html += '<b>' + name + '</b> Lv.' + lv + '/99';
      html += ' <span class="text-sm text-dim">- ' + SKILL_DESCS[i] + '</span>';
      html += '<div class="pbar pbar-purple"><div class="pbar-fill" style="width:' + pct + '%"></div>';
      html += '<span class="pbar-text">' + xp + '/' + needed + '</span></div>';
      // Show unlocks
      const unlocks = getSkillUnlocks(i);
      if(unlocks.length > 0){
        html += '<div class="text-sm">';
        unlocks.forEach(u => {
          html += '<span style="color:' + (u.unlocked?'#0f0':'#444') + '">' + (u.unlocked?'*':'') + 'Lv.' + u.lv + ': ' + u.desc + '</span> ';
        });
        html += '</div>';
      }
      html += '<button class="btn btn-purple" onclick="trainSkill(' + i + ')">Train (EN:' + cost + ')</button>';
      html += '</div>';
    });
  }
  c.innerHTML = html;
}

function renderGear(c){
  let html = '<h2>Loadout</h2>';
  html += '<div class="text-sm text-dim mb">Power: ' + getCombatPower() + ' | Defense: ' + getCombatDefense() + ' | Speed: ' + getCombatSpeed() + ' | Luck: ' + getLuck() + '</div>';
  GEAR_SLOTS.forEach(slot => {
    html += '<div class="card">';

  G.inventory.forEach((item, i) => {

    html += ' [' + item.slot + '] PWR:' + item.power + ' DEF:' + item.defense + ' Lv.' + item.level;
    // Gear comparison vs equipped
    const equipped = G.gear[item.slot];
    if(equipped){
      const pwrDiff = item.power - equipped.power;
      const defDiff = item.defense - equipped.defense;
      const pwrColor = pwrDiff > 0 ? '#0f0' : pwrDiff < 0 ? '#f44' : '#888';
      const defColor = defDiff > 0 ? '#0f0' : defDiff < 0 ? '#f44' : '#888';
      html += ' <span class="text-sm">[vs equipped: <span style="color:'+pwrColor+'">'+(pwrDiff>0?'+':'')+pwrDiff+'P</span> <span style="color:'+defColor+'">'+(defDiff>0?'+':'')+defDiff+'D</span>]</span>';
    } else {
      html += ' <span class="text-sm" style="color:#0f0">[no gear in slot]</span>';
    }
    // Skill requirement
    if(item.reqSkill >= 0 && item.reqLevel > 0){
      const met = G.skillLevels[item.reqSkill] >= item.reqLevel;
      html += ' <span style="color:' + (met?'#0f0':'#f44') + '">[Req: ' + SKILL_NAMES[item.reqSkill] + ' ' + item.reqLevel + ']</span>';
    }
    html += '<br>';
    html += '<button class="btn btn-green" onclick="equipItem(' + i + ')">Equip</button>';
    html += ' <button class="btn btn-red" onclick="sellItem(' + i + ')">Sell(' + (item.level * (item.rarity+1) * 3) + 'g)</button>';
    // Enchanting options
    if(G.skillLevels[11] >= 10){
      html += ' <button class="btn btn-purple" onclick="enchantReroll(' + i + ')">Reroll(' + getEnchantCost(item) + 'g)</button>';
    }
    if(G.skillLevels[11] >= 25){
      html += ' <button class="btn btn-purple" onclick="enchantBoost(' + i + ')">Boost(' + (getEnchantCost(item)*2) + 'g)</button>';
    }
    if(G.skillLevels[11] >= 50 && item.rarity < 5){
      html += ' <button class="btn btn-gold" onclick="enchantUpgradeRarity(' + i + ')">Upgrade Rarity(' + (getEnchantCost(item)*5) + 'g)</button>';
    }
    html += '</div>';
  });

  // Crafting section
  if(G.skillLevels[8] >= 10){
    let maxRarity = 0;
    if(G.skillLevels[8] >= 99) maxRarity = 5;
    else if(G.skillLevels[8] >= 75) maxRarity = 4;
    else if(G.skillLevels[8] >= 50) maxRarity = 3;
    else if(G.skillLevels[8] >= 25) maxRarity = 2;
    else maxRarity = 1;
    const craftCost = Math.floor(100 * Math.pow(2.5, maxRarity));
    html += '<h2>Crafting (Max: ' + RARITY_NAMES[maxRarity] + ')</h2>';
    html += '<div class="text-sm text-dim mb">Craft gear at your max rarity. Cost: ' + craftCost + 'g</div>';
    GEAR_SLOTS.forEach(slot => {
      html += '<button class="btn btn-cyan" onclick="craftGear(\'' + slot + '\')">Craft ' + slot + '</button> ';
    });
  }

  // Enchanting info
  if(G.skillLevels[11] >= 10){
    html += '<h2>Enchanting (Lv.' + G.skillLevels[11] + ')</h2>';
    html += '<div class="card text-sm">';
    html += 'Lv.10: Reroll stats | Lv.25: Boost +10-20% | Lv.50: Upgrade rarity<br>';
    html += 'Lv.75: Guaranteed boost | Lv.99: ENCHANTER - perfect rolls, high upgrade chance';
    html += '</div>';
  }

  c.innerHTML = html;
}

function equipItem(idx){
  const item = G.inventory[idx];
  if(!item) return;
  // Check skill requirement
  if(item.reqSkill >= 0 && item.reqLevel > 0){
    if(G.skillLevels[item.reqSkill] < item.reqLevel){
      toast('Need ' + SKILL_NAMES[item.reqSkill] + ' Lv.' + item.reqLevel + ' to equip!', '#f44');
      return;
    }
  }
  // Swap if something equipped
  if(G.gear[item.slot]){
    G.inventory.push(G.gear[item.slot]);
  }
  G.gear[item.slot] = item;
  G.inventory.splice(idx, 1);
  toast('Equipped ' + item.name, '#0ff');
  save();
  showTab('gear');
}

function unequip(slot){
  if(!G.gear[slot]) return;
  G.inventory.push(G.gear[slot]);
  G.gear[slot] = null;
  save();
  showTab('gear');
}

function sellItem(idx){
  const item = G.inventory[idx];
  if(!item) return;
  const price = item.level * (item.rarity+1) * 3;
  G.gold += price;
  G.inventory.splice(idx, 1);
  toast('Sold for ' + price + ' gold', '#ffd700');
  save();
  showTab('gear');
}

function bulkFeed(cityIdx){
  const followers = G.followers.filter(f => (f.cityIdx || 0) === cityIdx && f.happiness < 100);
  if(followers.length === 0){ toast('All followers are happy!', '#0f0'); return; }
  let totalCost = 0;
  followers.forEach(f => { totalCost += 10 + f.level * 5; });
  if(G.gold < totalCost){ toast('Need ' + totalCost + ' gold to feed all', '#f44'); return; }
  G.gold -= totalCost;
  let fed = 0;
  followers.forEach(f => {
    f.happiness = Math.min(100, f.happiness + 20);
    f.loyalty = Math.min(100, f.loyalty + 5);
    fed++;
  });
  toast('Fed ' + fed + ' followers for ' + totalCost + ' gold!', '#0f0');
  save();
  showTab('town');
}

function bulkTrain(cityIdx){
  const followers = G.followers.filter(f => (f.cityIdx || 0) === cityIdx && f.level < 50);
  if(followers.length === 0){ toast('All followers maxed!', '#0f0'); return; }
  let totalCost = 0;
  followers.forEach(f => { totalCost += 20 + f.level * 15; });
  if(G.gold < totalCost){ toast('Need ' + totalCost + ' gold to train all', '#f44'); return; }
  G.gold -= totalCost;
  let leveled = 0;
  followers.forEach(f => {
    f.xp += 30 + f.level * 5;
    const needed = f.level * 50;
    if(f.xp >= needed && f.level < 50){
      f.xp -= needed;
      f.level++;
      f.power += (f.rarity + 1);
      f.defense += Math.floor((f.rarity + 1) * 0.7);
      leveled++;
    }
  });
  toast('Trained ' + followers.length + ' followers! ' + leveled + ' leveled up!', '#b026ff');
  save();
  showTab('town');
}

  if(!G.expeditions || G.expeditions.length < 3){
    html += '<h3>Start Expedition</h3>';
    const idleFollowers = G.followers.filter(f => f.assigned === 'idle' || f.assigned === 'combat');
    if(idleFollowers.length === 0){
      html += '<div class="text-dim">No idle followers available.</div>';
    } else {
      EXPEDITION_TYPES.forEach((type, ti) => {
        html += '<div class="card">';
        html += '<b>' + type.name + '</b> (' + type.desc + ') - EN:' + type.energy + '<br>';
        html += '<span class="text-sm">Gold: ' + type.goldMin + '-' + type.goldMax + ' | XP: ' + type.xpMin + '-' + type.xpMax + ' | Gear: ' + Math.floor(type.gearChance*100) + '%</span><br>';
        // Quick send first idle follower
        const first = idleFollowers[0];
        html += '<button class="btn btn-cyan" onclick="startExpedition('+ti+',['+first.id+']);showTab(\'expeditions\')">Send ' + first.name + '</button>';
        if(idleFollowers.length > 1){
          const ids = idleFollowers.slice(0,3).map(f=>f.id);
          html += ' <button class="btn btn-green" onclick="startExpedition('+ti+','+JSON.stringify(ids)+');showTab(\'expeditions\')">Send '+Math.min(3,idleFollowers.length)+' followers</button>';
        }
        html += '</div>';
      });
    }
  }
  html += '<div class="mt"><button class="btn" onclick="showTab(\'more\')">Back</button></div>';
  c.innerHTML = html;
}

function renderRecipes(c){
  let html = '<h2>Crafting Recipes</h2>';
  html += '<div class="text-sm text-dim mb">Multi-skill recipes for powerful gear.</div>';
  RECIPES.forEach((r, i) => {
    const canCraft = Object.keys(r.reqs).every(sk => G.skillLevels[parseInt(sk)] >= r.reqs[sk]);
    html += '<div class="card" style="border-color:' + (canCraft?'#ffd700':'#333') + '">';
    html += '<span class="' + RARITIES[r.rarity] + '">' + r.name + '</span> [' + r.slot + ']<br>';
    html += '<span class="text-sm">Requires: ' + r.desc + '</span><br>';
    html += '<span class="text-sm">Cost: ' + r.cost + 'g</span> ';
    if(canCraft){ html += '<button class="btn btn-gold" onclick="craftRecipe('+i+');showTab(\'recipes\')">Craft!</button>'; }
    else { html += '<span class="text-dim">Skills too low</span>'; }
    html += '</div>';
  });
  html += '<div class="mt"><button class="btn" onclick="showTab(\'more\')">Back</button></div>';
  c.innerHTML = html;
}

function renderFusion(c){
  let html = '<h2>Follower Fusion</h2>';
  html += '<div class="text-sm text-dim mb">Combine 3 same-rarity followers into 1 of the next rarity.</div>';
  // Group followers by rarity
  for(let r = 0; r < 5; r++){
    const pool = G.followers.filter(f => f.rarity === r);
    if(pool.length < 3) continue;
    html += '<div class="card">';
    html += '<b class="' + RARITIES[r] + '">' + RARITY_NAMES[r] + '</b> (' + pool.length + ' available) → <span class="' + RARITIES[r+1] + '">' + RARITY_NAMES[r+1] + '</span><br>';
    // Fuse first 3
    const ids = pool.slice(0,3);
    html += '<span class="text-sm">' + ids.map(f=>f.name).join(' + ') + '</span> ';
    html += '<button class="btn btn-gold" onclick="fuseFollowers('+ids[0].id+','+ids[1].id+','+ids[2].id+');showTab(\'fusion\')">FUSE!</button>';
    html += '</div>';
  }
  const noFusable = [0,1,2,3,4].every(r => G.followers.filter(f=>f.rarity===r).length < 3);
  if(noFusable) html += '<div class="text-dim">Need 3 followers of the same rarity to fuse.</div>';
  html += '<div class="mt"><button class="btn" onclick="showTab(\'more\')">Back</button></div>';
  c.innerHTML = html;
}

function renderClan(c){
  let html = '<h2>Clan</h2>';
  if(!G.clanName){
    html += '<div class="card">';
    html += '<div class="text-sm text-dim mb">Found a clan to unlock perks and organize your followers.</div>';
    html += '<button class="btn btn-cyan" onclick="var n=prompt(\'Name your clan:\');if(n)createClan(n);showTab(\'clan\')">Found Clan (500g)</button>';
    html += '</div>';
  } else {
    html += '<div class="card"><b style="color:#0ff">' + G.clanName + '</b><br>';
    html += 'Clan Power: ' + getClanPower() + '</div>';
    // Council
    html += '<h3>Council (' + G.clanCouncil.length + '/5)</h3>';
    G.clanCouncil.forEach(id => {
      const f = G.followers.find(x=>x.id===id);
      if(!f) return;
      html += '<div class="follower-card"><span class="' + RARITIES[f.rarity] + '">' + f.name + '</span> Lv.' + f.level;
      html += ' <button class="btn btn-red" style="padding:2px 6px;min-height:24px" onclick="removeFromCouncil('+f.id+');showTab(\'clan\')">Remove</button></div>';
    });
    if(G.clanCouncil.length < 5){
      const available = G.followers.filter(f => !G.clanCouncil.includes(f.id)).sort((a,b) => (b.rarity*100+b.level) - (a.rarity*100+a.level));
      if(available.length > 0){
        html += '<div class="text-sm mt">Add to council:</div>';
        available.slice(0,5).forEach(f => {
          html += '<button class="btn" style="padding:4px 8px;min-height:30px" onclick="addToCouncil('+f.id+');showTab(\'clan\')">' + f.name + ' [' + RARITY_NAMES[f.rarity] + ' Lv.' + f.level + ']</button> ';
        });
      }
    }
    // Perks
    html += '<h3>Clan Perks</h3>';
    CLAN_PERKS.forEach(p => {
      const owned = G.clanPerks[p.id];
      html += '<div class="card" style="border-color:'+(owned?'#0f0':'#333')+'">';
      html += '<b>' + p.name + '</b> - ' + p.desc + '<br>';
      if(owned){ html += '<span style="color:#0f0">UNLOCKED</span>'; }
      else { html += '<button class="btn btn-cyan" onclick="buyClanPerk(\''+p.id+'\');showTab(\'clan\')">Unlock ('+p.cost+'g)</button>'; }
      html += '</div>';
    });
  }
  html += '<div class="mt"><button class="btn" onclick="showTab(\'more\')">Back</button></div>';
  c.innerHTML = html;
}

// ==================== CHARACTER CREATION ====================
function showCharacterCreation(){
  const c = document.getElementById('content');
  let html = '<div style="text-align:center;padding:20px">';
  html += '<h2 style="font-size:22px;color:#0ff">VOID RAIDERS</h2>';
  html += '<div class="text-dim mb">A wasteland awaits...</div>';
  html += '<div class="card">';
  html += '<div class="mb"><label>Name:</label><br><input type="text" id="char-name" placeholder="Enter your name" maxlength="20"></div>';
  html += '<div class="mb"><label>Class:</label><br>';
  html += '<select id="char-class">';
  for(const k in CLASSES){
    const cl = CLASSES[k];
    html += '<option value="' + k + '">' + cl.name + ' - ' + cl.desc + '</option>';
  }
  html += '</select></div>';
  html += '<button class="btn btn-cyan" onclick="startGame()" style="width:100%;font-size:16px;padding:14px">BEGIN</button>';
  html += '</div></div>';
  c.innerHTML = html;
  document.getElementById('top-bar').style.display = 'none';
  document.getElementById('nav').style.display = 'none';
}

function startGame(){
  const name = document.getElementById('char-name').value.trim() || 'Raider';
  const cls = document.getElementById('char-class').value;
  G = newGame(name, cls);
  // Apply class starting stats
  const clData = CLASSES[cls];
  G.stats.power += clData.power;
  G.stats.defense += clData.defense;
  G.stats.speed += clData.speed;
  G.stats.luck += clData.luck;
  save();
  document.getElementById('top-bar').style.display = '';
  document.getElementById('nav').style.display = 'flex';
  showTab('missions');
  toast('Welcome to the Void, ' + name + '!', '#0ff');
}

// ==================== GAME LOOP ====================
let energyTimer = 0;
let saveTimer = 0;
let goldTimer = 0;
let followerTimer = 0;

function gameLoop(){
  if(!G) return;

  // Energy regen
  energyTimer++;
  const regenRate = getEnergyRegenRate();
  const regenTicks = Math.floor(regenRate); // ticks per energy (1 tick = 1 second)
  if(energyTimer >= regenTicks){
    energyTimer = 0;
    if(G.energy < getMaxEnergy()){
      G.energy++;
    }
  }

  // Passive gold
  goldTimer++;
  if(goldTimer >= 60){ // every 60 seconds
    goldTimer = 0;
    const gpm = getGoldPerMin();
    if(gpm > 0){
      G.gold += gpm;
    }
  }

  // Auto-battle (every 10 seconds)
  if(G.autoBattle && energyTimer % 10 === 0){
    processAutoBattle();
  }

  // Follower passive effects
  followerTimer++;
  if(followerTimer >= 120){ // every 2 min
    followerTimer = 0;
    G.followers.forEach(f => {
      if(f.happiness <= 20) { /* unhappy workers do nothing */ }
      else if(f.assigned === 'foundry'){
        // Foundry workers already handled by getGoldPerMin()
      } else if(f.assigned === 'lab'){
        // Lab workers: small passive XP
        addXp(Math.floor(f.level * 0.5));
      } else if(f.assigned === 'workshop'){
        // Workshop workers give crafting XP (Crafting = index 8)
        addSkillXp(8, Math.floor(f.level * 2));
      } else if(f.assigned === 'shrine'){
        // Shrine workers: small gem chance
        if(Math.random() < 0.01 * (f.rarity + 1)){
          G.gems += 1;
          toast(f.name + ' channeled a gem at the shrine!', '#b026ff');
        }
      } else if(f.assigned === 'generator'){
        // Generator workers: chance for bonus energy
        if(Math.random() < 0.3 && G.energy < getMaxEnergy()){
          G.energy = Math.min(getMaxEnergy(), G.energy + 1);
        }
      } else if(f.assigned === 'garrison'){
        // Garrison: small gold from repelling scouts
        if(Math.random() < 0.15){
          G.gold += Math.floor(f.level * (f.rarity+1));
        }
      }
      // Tavern workers slow happiness decay for all followers in same city
      // (handled below)
      // Slow happiness decay
      if(Math.random() < 0.1){
        // Tavern workers in same city reduce decay
        const ci = f.cityIdx || 0;
        const tavernWorkers = G.followers.filter(tw => tw.cityIdx === ci && tw.assigned === 'tavern' && tw.happiness > 20);
        const decayReduction = Math.min(0.08, tavernWorkers.length * 0.02); // up to 80% reduction
        if(Math.random() >= decayReduction){
          f.happiness = Math.max(0, f.happiness - 1);
        }
      }
    });
  }

  // Check events every 5 min
  if(energyTimer % 300 === 0) checkEvent();

  // Check expeditions (notify when done)
  if(G.expeditions && energyTimer % 10 === 0){
    G.expeditions.forEach((exp, i) => {
      if(!exp.collected && Date.now() >= exp.endTime){
        toast('Expedition ready to collect!', '#ffd700');
      }
    });
  }

  // Spawn roaming enemies every 30 seconds
  if(energyTimer % 30 === 0) spawnRoamingEnemies();

  // Roaming enemies attack cities every 60 seconds
  if(energyTimer % 60 === 0) processRoamerCityAttacks();

  // Raid events (random, ~every 8 min per city)
  G.cities.forEach((city, ci) => {
    const timeSinceRaid = Date.now() - (city.lastRaid || 0);
    if(timeSinceRaid > 480000 && Math.random() < 0.008){
      const result = triggerRaid(ci);
      showRaidResult(result);
    }
  });

  // Auto-save
  saveTimer++;
  if(saveTimer >= 30){
    saveTimer = 0;
    save();
  }

  // Update HUD
  updateHUD();
}

// ==================== INIT ====================
function migrateOldSave(){
  // Migrate old single-buildings saves to multi-city
  if(!G.cities){
    const oldBuildings = G.buildings || {};
    G.cities = [newCity('Outpost Alpha')];
    G.cities[0].buildings = oldBuildings;
    G.currentCity = 0;
    delete G.buildings;
  }
  if(G.total_raids_won === undefined) G.total_raids_won = 0;
  if(G.dungeons_cleared === undefined) G.dungeons_cleared = 0;
  if(!G.roamingEnemies) G.roamingEnemies = [];
  if(!G.potions) G.potions = { hp:0, power:0, defense:0, luck:0, xp:0 };
  if(G.worldBossKills === undefined) G.worldBossKills = 0;
  if(G.loginStreak === undefined) G.loginStreak = 0;
  // Assign followers to city 0 if they don't have a city, migrate old roles
  if(!G.tickets1x) G.tickets1x = 0;
  if(!G.tickets10x) G.tickets10x = 0;
  if(!G.shards) G.shards = 0;
  if(!G.wishList) G.wishList = [];
  G.followers.forEach(f => {
    if(f.cityIdx === undefined) f.cityIdx = 0;
    if(f.assigned === 'patrol') f.assigned = 'garrison';
    if(f.assigned === 'mining') f.assigned = 'foundry';
    // Add stars and abilities to old followers
    if(f.stars === undefined) f.stars = getStartingStars(f.rarity);
    if(!f.ability){
      const abilities = FOLLOWER_ABILITIES[f.class] || FOLLOWER_ABILITIES['Fighter'];
      f.ability = abilities[Math.min(f.rarity, abilities.length-1)];
    }
  });
  // Update defense for all cities
  G.cities.forEach((c, i) => updateCityDefense(i));
}

function init(){
  if(load()){
    migrateOldSave();
    calcOfflineProgress();
    checkDailyLogin();
    // Init world boss if needed
    if(!G.worldBossHp || G.worldBossHp <= 0){ G.worldBossHp = getWorldBoss().maxHp; }
    document.getElementById('top-bar').style.display = '';
    document.getElementById('nav').style.display = 'flex';
    save();
    showTab('missions');
  } else {
    showCharacterCreation();
  }
  // Game loop runs every second
  setInterval(gameLoop, 1000);
}

// Start
init();
</script>
