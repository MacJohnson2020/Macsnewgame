#app { max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

#top-bar { background:#111; padding:8px 12px; border-bottom:1px solid #333; position:sticky; top:0; z-index:10; }

.stat-val { color:#0ff; font-size:13px; font-weight:bold; }
.gold-val { color:#ffd700; }
.energy-val { color:#0f0; }
/* Main Content */
#content { flex:1; overflow-y:auto; padding:10px; padding-bottom:70px; }
/* Bottom Nav */
#nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; display:flex; background:#111; border-top:1px solid #333; z-index:10; }
#nav button { flex:1; padding:12px 4px; background:none; border:none; color:#666; font-family:inherit; font-size:11px; cursor:pointer; }
#nav button.active { color:#0ff; border-top:2px solid #0ff; }
/* Buttons */
.btn { display:inline-block; padding:10px 16px; margin:4px; background:#1a1a2e; border:1px solid #333; color:#ccc; font-family:inherit; font-size:13px; cursor:pointer; min-height:44px; min-width:44px; }
.btn:active { background:#2a2a4e; }
.btn:disabled { opacity:0.4; }
.btn-cyan { border-color:#0ff; color:#0ff; }
.btn-purple { border-color:#b026ff; color:#b026ff; }
.btn-gold { border-color:#ffd700; color:#ffd700; }
.btn-green { border-color:#0f0; color:#0f0; }
.btn-red { border-color:#f44; color:#f44; }
/* Rarity Colors */
.common { color:#aaa; } .uncommon { color:#0f0; } .rare { color:#44f; }
.epic { color:#b026ff; } .legendary { color:#ffd700; } .mythic { color:#ff2060; text-shadow:0 0 6px #ff2060; }
/* Progress Bar */
.pbar { background:#1a1a2e; border:1px solid #333; height:16px; margin:4px 0; position:relative; }
.pbar-fill { height:100%; transition:width 0.3s; }
.pbar-text { position:absolute; top:0; left:4px; font-size:10px; line-height:16px; color:#fff; }
.pbar-cyan .pbar-fill { background:#0ff; }
.pbar-green .pbar-fill { background:#0a0; }
.pbar-purple .pbar-fill { background:#b026ff; }
.pbar-gold .pbar-fill { background:#ffd700; }
/* Sections */
h2 { color:#0ff; font-size:16px; margin:12px 0 8px; border-bottom:1px solid #333; padding-bottom:4px; }
h3 { color:#b026ff; font-size:14px; margin:8px 0 4px; }
.card { background:#111; border:1px solid #222; padding:10px; margin:6px 0; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
.text-center { text-align:center; }
.text-sm { font-size:11px; }
.text-dim { color:#666; }
.mt { margin-top:8px; }
.mb { margin-bottom:8px; }
/* Toast */
#toast-container { position:fixed; top:50px; left:50%; transform:translateX(-50%); z-index:100; width:90%; max-width:400px; }
.toast { background:#1a1a2e; border:1px solid #0ff; padding:10px; margin:4px 0; text-align:center; animation: fadeIn 0.3s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
/* Modal */
.modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:50; display:flex; align-items:center; justify-content:center; }
.modal { background:#111; border:1px solid #0ff; padding:20px; max-width:90%; max-height:80vh; overflow-y:auto; }
/* Combat Log */
.log { max-height:200px; overflow-y:auto; background:#050510; border:1px solid #222; padding:6px; font-size:12px; }
.log-line { margin:2px 0; }
.dmg-player { color:#f44; } .dmg-enemy { color:#0ff; } .heal { color:#0f0; }
/* Followers */
.follower-card { background:#0a0a1a; border:1px solid #333; padding:8px; margin:4px 0; }
.follower-card .name { font-weight:bold; }
/* Input */
input[type="text"] { background:#1a1a2e; border:1px solid #333; color:#ccc; padding:8px; font-family:inherit; font-size:14px; width:100%; }
select { background:#1a1a2e; border:1px solid #333; color:#ccc; padding:8px; font-family:inherit; font-size:14px; }

function getBuildingSlots(bId, cityIdx){
  const city = G.cities[cityIdx !== undefined ? cityIdx : G.currentCity];
  const lv = city.buildings[bId] || 0;
  return Math.floor(lv / 5) + (lv > 0 ? 1 : 0); // 1 slot at lv1, +1 every 5 levels, max 5 at lv20
}

function getFollowersInSlot(bId, cityIdx){
  const ci = cityIdx !== undefined ? cityIdx : G.currentCity;
  return G.followers.filter(f => f.cityIdx === ci && f.assigned === bId);
}

function getWallGarrison(cityIdx){
  const ci = cityIdx !== undefined ? cityIdx : G.currentCity;
  return G.followers.filter(f => f.cityIdx === ci && f.assigned === 'garrison');
}

function getGarrisonSlots(cityIdx){
  const city = G.cities[cityIdx !== undefined ? cityIdx : G.currentCity];
  return Math.floor(city.wallLevel / 3) + (city.wallLevel > 0 ? 1 : 0); // 1 at lv1, +1 per 3 levels
}

// Stars: commons start at 1, each rarity starts +1 higher. Max 5 stars.
function getStartingStars(rarity){ return Math.min(5, 1 + Math.floor(rarity / 2)); }
// Star bonuses: each star = +15% power/def
function getStarMult(stars){ return 1 + (stars - 1) * 0.15; }
// Cost to activate next star
function getStarUpgradeCost(currentStars, rarity){
  return Math.floor(100 * Math.pow(3, currentStars) * (rarity + 1));
}
function getStarUpgradeShards(currentStars){
  return 5 * currentStars;

    // Exploration
    exploredTiles: [],
    mapPosition: 0,
    // Ascension
    ascension: 0,
    worldTier: 1
  };
}

// Compatibility: G.buildings points to current city's buildings
function getCityBuildings(){ return G.cities[G.currentCity].buildings; }
function getCity(){ return G.cities[G.currentCity]; }
function getAllBuildingLevel(bId){
  // Sum building level across all cities
  let total = 0;
  G.cities.forEach(c => { total += c.buildings[bId] || 0; });
  return total;
}

function save(){
  if(!G) return;
  G.lastSave = Date.now();
  G.lastOnline = Date.now();
  localStorage.setItem('voidraiders_save', JSON.stringify(G));
}

function load(){
  try {
    const d = localStorage.getItem('voidraiders_save');
    if(d){ G = JSON.parse(d); return true; }
  } catch(e){}
  return false;
}

function toast(msg, color){
  const c = document.getElementById('toast-container');
  const d = document.createElement('div');
  d.className = 'toast';
  if(color) d.style.borderColor = color;
  d.textContent = msg;
  c.appendChild(d);
  setTimeout(()=> d.remove(), 2500);
}

// ==================== CORE MECHANICS ====================
function getMaxEnergy(){
  let base = 100;
  const vaultLv = getAllBuildingLevel('vault');
  base += vaultLv * 5;
  if(hasSynergy('energy')) base += 10;
  base += getResearchBonus('maxEnergy');
  return base;
}

function getEnergyRegenRate(){
  let base = 30;
  const genLv = getAllBuildingLevel('generator');
  base = Math.max(5, base - genLv * 2);
  return base;
}

function getXpBoost(){
  let boost = 1 + (G.prestige_bonus / 100);
  const labLv = getAllBuildingLevel('lab');
  boost += labLv * 0.05;
  G.cities.forEach(c => {
    if(c.specialty === 'research') boost += SPECIALTIES.research.bonus.xp;
  });
  boost += getResearchBonus('combatXp') + getClanBonus('xp');
  boost += getEventBonus('xp');
  return boost;
}

// Best combat skill determines primary style
function getPrimaryCombatSkill(){
  let best = 0, bestLv = G.skillLevels[0];
  for(let i = 1; i <= 3; i++){
    if(G.skillLevels[i] > bestLv){ best = i; bestLv = G.skillLevels[i]; }
  }
  return best; // 0=Melee,1=Ranged,2=Corruption,3=Stealth
}

function getCombatPower(){
  let p = G.stats.power;
  const bLv = getAllBuildingLevel('barracks');
  p += bLv * 3;
  // Military specialty bonus
  G.cities.forEach(c => {
    if(c.specialty === 'military') p += Math.floor(p * SPECIALTIES.military.bonus.combat);
  });
  for(const slot of GEAR_SLOTS){
    if(G.gear[slot]) p += G.gear[slot].power || 0;
  }
  const cls = CLASSES[G.class];
  p += cls.power * G.level;
  // Set bonus, research, clan, world tier
  p = Math.floor(p * getSetPowerMult());
  p = Math.floor(p * (1 + getResearchBonus('combatPower') + getClanBonus('power')));
  // Combat skill bonuses
  p += Math.floor(G.skillLevels[0] * 1.5); // Melee: raw power
  p += Math.floor(G.skillLevels[1] * 1.0); // Ranged: steady power
  p += Math.floor(G.skillLevels[2] * 2.0); // Corruption: high burst
  // Stealth gives crit not power
  // Leadership boosts follower contribution
  let leadershipMult = 1 + G.skillLevels[13] * 0.015;
  if(G.skillLevels[13] >= 99) leadershipMult += 0.5; // COMMANDER: +50% follower power
  const activeFollowers = G.followers.filter(f => f.assigned === 'combat');
  activeFollowers.forEach(f => { p += Math.floor(f.level * f.power * 0.5 * leadershipMult); });
  return Math.floor(p);
}

function getCombatDefense(){
  let d = G.stats.defense;
  for(const slot of GEAR_SLOTS){
    if(G.gear[slot]) d += G.gear[slot].defense || 0;
  }
  const cls = CLASSES[G.class];
  d += cls.defense * G.level;
  // Survival skill: +2 def per level
  d += Math.floor(G.skillLevels[14] * 2);
  return Math.floor(d);
}

function getCombatSpeed(){
  let s = G.stats.speed;
  const cls = CLASSES[G.class];
  s += cls.speed * Math.floor(G.level/2);
  // Stealth adds speed
  s += Math.floor(G.skillLevels[3] * 0.8);
  return Math.floor(s);
}

function getLuck(){
  let l = G.stats.luck;
  const cls = CLASSES[G.class];
  l += cls.luck * Math.floor(G.level/3);
  const shrineLv = getAllBuildingLevel('shrine');
  l += shrineLv * 2;
  // Scavenging boosts luck
  l += Math.floor(G.skillLevels[5] * 0.5);
  // Stealth boosts crit/luck
  l += Math.floor(G.skillLevels[3] * 0.5);
  return Math.floor(l);
}

function getGoldPerMin(){
  const fLv = getAllBuildingLevel('foundry');
  let base = fLv * 2;
  // Foundry workers across all cities
  const workers = G.followers.filter(f => f.assigned === 'foundry' && f.happiness > 20);
  workers.forEach(f => { base += Math.floor(f.level * 0.5) + 1; });
  // Mining specialty bonus
  G.cities.forEach(c => {
    if(c.specialty === 'mining') base = Math.floor(base * (1 + SPECIALTIES.mining.bonus.gold));
  });
  // Master Miner 99: passive gold income
  if(G.skillLevels[4] >= 99) base += 5;
  // Scavenger Lord 99: passive gold income
  if(G.skillLevels[5] >= 99) base += 8;
  return base;
}

function addXp(amount){
  amount = Math.floor(amount * getXpBoost());
  G.xp += amount;
  let needed = xpForLevel(G.level);
  while(G.xp >= needed && G.level < 100){
    G.xp -= needed;
    G.level++;
    G.statPoints += 3;
    toast('LEVEL UP! You are now level ' + G.level, '#0ff');
    checkAchievements();
    needed = xpForLevel(G.level);
  }
  if(G.level >= 100) G.xp = Math.min(G.xp, needed);
}

function addSkillXp(skillIdx, amount){
  amount = Math.floor(amount * getXpBoost());
  G.skills[skillIdx] += amount;
  let needed = xpForSkillLevel(G.skillLevels[skillIdx]);
  while(G.skills[skillIdx] >= needed && G.skillLevels[skillIdx] < 99){
    G.skills[skillIdx] -= needed;
    G.skillLevels[skillIdx]++;
    toast(SKILL_NAMES[skillIdx] + ' level ' + G.skillLevels[skillIdx] + '!', '#b026ff');
    needed = xpForSkillLevel(G.skillLevels[skillIdx]);
  }
}

function generateGear(missionLevel, isBoss){
  const luck = getLuck();
  let rarityRoll = Math.random() * 10000;
  let luckBonus = luck * 3; // luck shifts the roll
  rarityRoll = Math.max(0, rarityRoll - luckBonus);
  let rarity = 0;
  if(rarityRoll < 0.1) rarity = 5;         // 0.001% Mythic
  else if(rarityRoll < 10) rarity = 4;     // 0.1% Legendary
  else if(rarityRoll < 400) rarity = 3;    // 4% Epic
  else if(rarityRoll < 1500) rarity = 2;   // 11% Rare
  else if(rarityRoll < 4000) rarity = 1;   // 25% Uncommon
  // else ~60% Common
  if(isBoss && rarity < 2) rarity = 2; // boss guarantees rare+

  const slot = GEAR_SLOTS[Math.floor(Math.random()*GEAR_SLOTS.length)];
  const names = GEAR_NAMES[slot];
  const name = names[rarity] || names[names.length-1];
  const mult = RARITY_MULT[rarity];
  const basePower = Math.floor((3 + missionLevel * 1.5) * mult);

  // Skill requirement based on rarity and slot
  let reqSkill = -1, reqLevel = 0;
  if(rarity >= 2){ // Rare+ gear has skill requirements
    if(slot === 'weapon'){
      reqSkill = [0,1,2,3][Math.floor(Math.random()*4)]; // combat skill
      reqLevel = Math.floor(5 + rarity * 8 + missionLevel * 0.3);
    } else if(slot === 'armor' || slot === 'shield'){
      reqSkill = 14; // Survival
      reqLevel = Math.floor(3 + rarity * 6 + missionLevel * 0.2);
    } else if(slot === 'implant'){
      reqSkill = [8,11,12][Math.floor(Math.random()*3)]; // Crafting/Enchanting/Hacking
      reqLevel = Math.floor(5 + rarity * 7 + missionLevel * 0.25);
    }
    reqLevel = Math.min(99, reqLevel);
  }

  return {
    id: Date.now() + Math.random(),
    name: name,
    slot: slot,
    rarity: rarity,
    power: slot === 'weapon' ? basePower : Math.floor(basePower * 0.3),
    defense: slot === 'armor' || slot === 'shield' ? basePower : Math.floor(basePower * 0.2),
    level: Math.max(1, Math.floor(missionLevel * mult * 0.5)),
    reqSkill: reqSkill,
    reqLevel: reqLevel
  };
}

// ==================== COMBAT ====================
function runCombat(mission, zoneIdx){
  if(G.energy < mission.energy){
    toast('Not enough energy! Need ' + mission.energy, '#f44');
    return;
  }
  G.energy -= mission.energy;

  let playerPower = getCombatPower();
  let playerDef = getCombatDefense();
  const playerSpeed = getCombatSpeed();
  let playerMaxHp = 50 + G.level * 10 + G.stats.defense * 3;
  // Survival skill HP bonuses
  if(G.skillLevels[14] >= 10) playerMaxHp += 30;
  if(G.skillLevels[14] >= 50) playerMaxHp += 60;
  if(G.skillLevels[14] >= 99) playerMaxHp += 100;
  // Synergy: Power Grid
  if(hasSynergy('energy')) playerMaxHp += 10;
  // Potion buffs
  if(G.activeBuff && G.activeBuff.type === 'power') playerPower = Math.floor(playerPower * 1.2);
  if(G.activeBuff && G.activeBuff.type === 'defense') playerDef = Math.floor(playerDef * 1.2);
  // Hunting boss damage bonus
  const huntingBossBonus = (mission.boss && G.skillLevels[7] >= 99) ? 1.25 : (mission.boss && G.skillLevels[7] >= 75) ? 1.15 : 1;
  playerPower = Math.floor(playerPower * huntingBossBonus);
  let playerHp = playerMaxHp;

  let enemyHp = Math.floor(mission.enemyHp * (1 + zoneIdx * 0.15));
  const enemyMaxHp = enemyHp;
  const enemyAtk = Math.floor(mission.enemyAtk * (1 + zoneIdx * 0.1));

  let log = [];
  let turn = 0;
  let won = false;


  log.push('--- ' + mission.name + ' ---');
  log.push('Your HP: ' + playerHp + ' | Enemy HP: ' + enemyHp);

  while(playerHp > 0 && enemyHp > 0 && turn < 50){
    turn++;
    // Player attacks
    let dmg = Math.max(1, playerPower - Math.floor(enemyAtk * 0.2) + Math.floor(Math.random()*5));
    // Class passives
    if(G.class === 'striker' && enemyHp < enemyMaxHp * 0.5) dmg = Math.floor(dmg * 1.15);
    if(G.class === 'berserker') dmg = Math.floor(dmg * (1 + (1 - playerHp/playerMaxHp) * 0.01 * 100)); // +1% per 1% HP missing
    if(G.class === 'necromancer'){ playerHp = Math.min(playerMaxHp, playerHp + Math.floor(dmg * 0.08)); } // Soul Siphon
    if(G.class === 'ranger' && turn === 1) dmg = Math.floor(dmg * 2); // Quick Draw: double first turn
    // XP potion buff
    // (handled at XP reward, not here)
    // Combat skill modifiers
    const primary = getPrimaryCombatSkill();
    // Melee bonuses
    if(G.skillLevels[0] >= 10) dmg = Math.floor(dmg * 1.05);
    if(G.skillLevels[0] >= 25) dmg = Math.floor(dmg * 1.08);
    if(G.skillLevels[0] >= 75) dmg = Math.floor(dmg * 1.12);
    if(G.skillLevels[0] >= 99 && playerHp < playerMaxHp * 0.4) dmg = Math.floor(dmg * 1.3); // Berserker
    // Ranged bonuses
    if(G.skillLevels[1] >= 25) dmg += Math.floor(enemyAtk * 0.08); // Pierce
    if(G.skillLevels[1] >= 50) dmg = Math.floor(dmg * 1.1);
    if(G.skillLevels[1] >= 99) dmg = Math.floor(dmg * 1.2); // Deadeye
    // Corruption bonuses
    if(G.skillLevels[2] >= 10) dmg = Math.floor(dmg * 1.05);
    if(G.skillLevels[2] >= 50) dmg = Math.floor(dmg * 1.12);
    // VOID LORD: 12% chance for 2x burst
    if(G.skillLevels[2] >= 99 && Math.random() < 0.12){
      dmg = Math.floor(dmg * 2);
      log.push('  VOID BURST! x2 damage!');
    }
    let corruptionDoT = 0;
    if(G.skillLevels[2] >= 25) corruptionDoT = Math.floor(dmg * 0.08); // Poison DoT
    // Crit chance (stealth)
    // Luck potion
    let critRate = getLuck();
    if(G.activeBuff && G.activeBuff.type === 'luck') critRate = Math.floor(critRate * 1.3);
    if(G.skillLevels[3] >= 10) critRate += 3;
    if(G.skillLevels[3] >= 25) critRate += 5;
    if(G.skillLevels[3] >= 99) critRate += 15;
    // Synergy: War Blessing
    if(hasSynergy('crit')) critRate += 10;
    let critMult = 2;
    if(G.skillLevels[3] >= 50) critMult = 2.5;
    // Assassination: only on enemies below 20% HP
    if(G.skillLevels[3] >= 75 && enemyHp < enemyMaxHp * 0.2 && Math.random() < 0.02){ enemyHp = 0; log.push('Turn ' + turn + ': ASSASSINATE! Finished them off!'); }
    if(Math.random()*100 < critRate && enemyHp > 0){
      dmg = Math.floor(dmg * critMult);
      log.push('Turn ' + turn + ': You CRIT for ' + dmg + ' damage!');
    } else if(enemyHp > 0){
      log.push('Turn ' + turn + ': You deal ' + dmg + ' damage.');
    }
    // Corruption DoT
    if(corruptionDoT > 0 && enemyHp > 0){ enemyHp -= corruptionDoT; }
    // Corruption life drain (5% of dmg)
    if(G.skillLevels[2] >= 75){ playerHp = Math.min(playerMaxHp, playerHp + Math.floor(dmg * 0.05)); }
    // Melee cleave
    if(G.skillLevels[0] >= 50 && Math.random() < 0.25){
      const cleave = Math.floor(dmg * 0.5);
      enemyHp -= cleave;
      log.push('  CLEAVE! +' + cleave + ' bonus damage!');
    }
    // Ranged double tap
    if(G.skillLevels[1] >= 75 && Math.random() < 0.2){
      const dt = Math.floor(dmg * 0.6);
      enemyHp -= dt;
      log.push('  DOUBLE TAP! +' + dt + ' bonus damage!');
    }
    enemyHp -= dmg;
    if(enemyHp <= 0){ won = true; break; }

    // Enemy attacks
    let eDmg = Math.max(1, enemyAtk - Math.floor(playerDef * 0.3) + Math.floor(Math.random()*3));
    // Class passives (defense)
    let dodgeRate = Math.min(35, playerSpeed * 0.5);
    if(G.class === 'phantom' && turn <= 2) dodgeRate += 25;
    if(G.class === 'ranger') dodgeRate += 8; // Rangers naturally dodgy
    if(G.skillLevels[3] >= 99) dodgeRate += 10;
    if(G.class === 'tank' && playerHp > playerMaxHp * 0.7) eDmg = Math.floor(eDmg * 0.8);
    // Paladin: Divine Shield blocks first hit
    if(G.class === 'paladin' && turn === 1){ eDmg = 0; log.push('Turn 1: DIVINE SHIELD blocks the attack!'); }
    if(Math.random()*100 < dodgeRate && eDmg > 0){
      log.push('Turn ' + turn + ': Enemy attacks but you DODGE!');
    } else {
      playerHp -= eDmg;
      log.push('Turn ' + turn + ': Enemy deals ' + eDmg + ' damage. (HP: ' + Math.max(0,playerHp) + ')');
    }
    // HP potion auto-use at low HP
    if(playerHp > 0 && playerHp < playerMaxHp * 0.25 && G.potions.hp > 0){
      G.potions.hp--;
      const heal = Math.floor(playerMaxHp * 0.3);
      playerHp = Math.min(playerMaxHp, playerHp + heal);
      log.push('  Auto-used HP Potion! Healed ' + heal + ' HP');
    }
  }

  let rewards = { gold:0, xp:0, gear:null, skillXp:{} };

  if(won){
    log.push('=== VICTORY! ===');
    G.total_kills++;
    G.missions_completed++;
    if(mission.boss){
      G.bosses_killed++; updateBountyProgress('boss', 1);
      if(Math.random() < 0.04){ G.tickets1x = (G.tickets1x||0) + 1; toast('+1 Summon Ticket!','#0ff'); }
    }
    updateBountyProgress('kill', 1);

    rewards.gold = Math.floor(mission.gold * (1 + Math.random()*0.3));
    rewards.xp = mission.xp;
    rewards.skillXp = mission.skillXp || {};

    // Loot drop chance
    let dropChance = mission.boss ? 50 : 15 + getLuck() * 0.3;
    // Scavenging skill boosts drop rate
    if(G.skillLevels[5] >= 10) dropChance += 5;
    if(G.skillLevels[5] >= 25) dropChance += 5;
    if(G.skillLevels[5] >= 50) dropChance += 3; // Better rarity handled elsewhere
    if(Math.random()*100 < dropChance){
      rewards.gear = generateGear(G.level, mission.boss);
    }

    // XP potion & synergy bonuses
    let xpMult = 1;
    if(G.activeBuff && G.activeBuff.type === 'xp') xpMult += 0.25;
    if(hasSynergy('skillxp')) xpMult += 0.08;

    G.gold += rewards.gold;
    G.total_gold_earned += rewards.gold;
    addXp(Math.floor(rewards.xp * xpMult));
    for(const sk in rewards.skillXp){
      addSkillXp(parseInt(sk), Math.floor(rewards.skillXp[sk] * xpMult));
    }
    if(rewards.gear){
      G.inventory.push(rewards.gear);
      log.push('LOOT: ' + rewards.gear.name + ' [' + RARITY_NAMES[rewards.gear.rarity] + ']');
    }
    log.push('+' + rewards.gold + ' gold, +' + Math.floor(rewards.xp * xpMult) + ' XP');
  } else {
    log.push('=== DEFEAT ===');
    log.push('You were overwhelmed...');
  }

  // Decrement potion buff
  if(G.activeBuff){
    G.activeBuff.turnsLeft--;
    if(G.activeBuff.turnsLeft <= 0){ G.activeBuff = null; }
  }

  G.combatLog = log;
  checkAchievements();
  save();
  showCombatResult(log, won, rewards);
}

function showCombatResult(log, won, rewards){
  let html = '<h2>' + (won ? 'Victory!' : 'Defeat') + '</h2>';
  html += '<div class="log">';
  log.forEach(line => {
    let cls = '';
    if(line.includes('You deal') || line.includes('CRIT')) cls = 'dmg-enemy';
    else if(line.includes('Enemy deals')) cls = 'dmg-player';
    else if(line.includes('DODGE')) cls = 'heal';
    else if(line.includes('VICTORY')) cls = 'heal';
    else if(line.includes('DEFEAT')) cls = 'dmg-player';
    else if(line.includes('LOOT')) cls = 'legendary';
    html += '<div class="log-line ' + cls + '">' + line + '</div>';
  });
  html += '</div>';
  if(won && rewards.gear){
    html += '<div class="card mt"><span class="' + RARITIES[rewards.gear.rarity] + '">' + rewards.gear.name + '</span>';
    html += ' | PWR:' + rewards.gear.power + ' DEF:' + rewards.gear.defense + '</div>';
  }
  html += '<div class="mt"><button class="btn btn-cyan" onclick="showTab(\'missions\')">Continue</button></div>';
  document.getElementById('content').innerHTML = html;
}

function runDungeon(dungeonIdx){
  const dg = DUNGEONS[dungeonIdx];
  if(G.level < dg.minLv){ toast('Need level ' + dg.minLv,'#f44'); return; }
  if(G.energy < dg.energy){ toast('Need ' + dg.energy + ' energy','#f44'); return; }
  G.energy -= dg.energy;

  const playerPower = getCombatPower();
  const playerDef = getCombatDefense();
  const playerSpeed = getCombatSpeed();
  let playerMaxHp = 50 + G.level * 10 + G.stats.defense * 3;
  if(G.skillLevels[14] >= 10) playerMaxHp += 50;
  if(G.skillLevels[14] >= 50) playerMaxHp += 100;
  let playerHp = playerMaxHp;

  let log = [];
  let totalGold = 0, totalXp = 0;
  let lootDrops = [];
  let wavesCleared = 0;

  log.push('=== DUNGEON: ' + dg.name + ' ===');

  for(let wave = 1; wave <= dg.waves; wave++){
    const isFinalWave = wave === dg.waves;
    const waveScale = 1 + (wave - 1) * 0.3;
    let enemyHp = Math.floor(dg.baseHp * waveScale * (isFinalWave ? 2.5 : 1));
    let enemyAtk = Math.floor(dg.baseAtk * waveScale * (isFinalWave ? 1.8 : 1));
    const huntingBossBonus = (isFinalWave && G.skillLevels[7] >= 99) ? 1.25 : (isFinalWave && G.skillLevels[7] >= 75) ? 1.15 : 1;
    let wavePower = Math.floor(playerPower * huntingBossBonus);

    log.push('--- Wave ' + wave + '/' + dg.waves + (isFinalWave ? ' [BOSS]' : '') + ' ---');
    log.push('Enemy HP: ' + enemyHp + ' | Your HP: ' + playerHp);

    let turn = 0;
    while(playerHp > 0 && enemyHp > 0 && turn < 40){
      turn++;
      let dmg = Math.max(1, wavePower - Math.floor(enemyAtk * 0.15) + Math.floor(Math.random()*5));
      // Skill bonuses (simplified for dungeon speed)
      if(G.skillLevels[0] >= 50 && Math.random() < 0.25) dmg = Math.floor(dmg * 1.5);
      if(G.skillLevels[2] >= 25) enemyHp -= Math.floor(dmg * 0.1); // DoT
      if(G.skillLevels[2] >= 75) playerHp = Math.min(playerMaxHp, playerHp + Math.floor(dmg * 0.08));
      let critRate = getLuck();
      if(G.skillLevels[3] >= 10) critRate += 5;
      if(G.skillLevels[3] >= 25) critRate += 5;
      let critMult = G.skillLevels[3] >= 50 ? 3 : 2;
      if(Math.random()*100 < critRate){ dmg = Math.floor(dmg * critMult); log.push('W'+wave+' T'+turn+': CRIT ' + dmg + '!'); }
      else { log.push('W'+wave+' T'+turn+': Hit ' + dmg); }
      if(G.skillLevels[3] >= 75 && Math.random() < 0.02){ enemyHp = 0; log.push('ASSASSINATE!'); }
      if(G.skillLevels[1] >= 75 && Math.random() < 0.2){ const dt = Math.floor(dmg*0.5); enemyHp -= dt; log.push('  Double tap +'+dt); }
      enemyHp -= dmg;
      if(enemyHp <= 0) break;

      let eDmg = Math.max(1, enemyAtk - Math.floor(playerDef * 0.3) + Math.floor(Math.random()*3));
      if(Math.random()*100 < Math.min(30, playerSpeed * 0.5)){
        log.push('W'+wave+' T'+turn+': DODGE!');
      } else {
        playerHp -= eDmg;
        log.push('W'+wave+' T'+turn+': Took ' + eDmg + ' (HP:' + Math.max(0,playerHp) + ')');
      }
    }

    if(enemyHp <= 0){
      wavesCleared++;
      G.total_kills++;
      let waveGold = Math.floor(dg.goldMult * wave * (10 + G.level) * (isFinalWave ? 3 : 1));
      let waveXp = Math.floor(dg.xpMult * wave * (5 + G.level) * (isFinalWave ? 3 : 1));
      totalGold += waveGold; totalXp += waveXp;
      log.push('Wave ' + wave + ' cleared! +' + waveGold + 'g +' + waveXp + 'xp');

      // Loot per wave (higher chance on later waves)
      let dropChance = 10 + wave * 8 + getLuck() * 0.3;
      if(G.skillLevels[5] >= 10) dropChance += 5;
      if(G.skillLevels[5] >= 25) dropChance += 5;
      if(isFinalWave) dropChance += 30;
      if(Math.random()*100 < dropChance){
        const gear = generateGear(G.level + wave * 2, isFinalWave);
        G.inventory.push(gear);
        lootDrops.push(gear);
        log.push('LOOT: ' + gear.name + ' [' + RARITY_NAMES[gear.rarity] + ']');
      }
      // Heal between waves
      playerHp = Math.min(playerMaxHp, playerHp + Math.floor(playerMaxHp * 0.15));
    } else {
      log.push('=== WIPED on Wave ' + wave + '! ===');
      break;
    }
  }

  if(wavesCleared === dg.waves){
    log.push('=== DUNGEON COMPLETE! ===');
    G.bosses_killed++;
    G.dungeons_cleared++;
    updateBountyProgress('dungeon', wavesCleared);
    // Bonus completion reward
    totalGold = Math.floor(totalGold * 1.5);
    totalXp = Math.floor(totalXp * 1.5);
    // Gem reward for dungeon clear
    const gemReward = Math.floor(dg.waves * 0.5);
    G.gems += gemReward;
    log.push('Completion bonus! +' + gemReward + ' gems!');
    // Ticket drop from dungeon
    if(Math.random() < 0.06){
      G.tickets1x = (G.tickets1x||0) + 1;
      log.push('+1 Summon Ticket!');
    }
    if(dg.waves >= 8 && Math.random() < 0.03){
      G.tickets10x = (G.tickets10x||0) + 1;
      log.push('+1 10x Summon Ticket!!');
    }
  } else {
    log.push('Cleared ' + wavesCleared + '/' + dg.waves + ' waves.');
  }

  G.gold += totalGold;
  G.total_gold_earned += totalGold;
  addXp(totalXp);
  G.missions_completed += wavesCleared;
  log.push('Total: +' + totalGold + 'g +' + totalXp + 'xp, ' + lootDrops.length + ' items');

  checkAchievements();
  save();
  showDungeonResult(log, wavesCleared, dg.waves, lootDrops);
}

function showDungeonResult(log, cleared, total, loot){
  let html = '<h2>Dungeon ' + (cleared === total ? 'COMPLETE!' : 'Result') + '</h2>';
  html += '<div class="text-sm">Waves: ' + cleared + '/' + total + '</div>';
  html += '<div class="log" style="max-height:300px">';
  log.forEach(line => {
    let cls = '';
    if(line.includes('CRIT') || line.includes('Hit ') || line.includes('Double tap')) cls = 'dmg-enemy';
    else if(line.includes('Took ')) cls = 'dmg-player';
    else if(line.includes('DODGE') || line.includes('REVIVE') || line.includes('COMPLETE')) cls = 'heal';
    else if(line.includes('LOOT')) cls = 'legendary';
    else if(line.includes('ASSASSINATE')) cls = 'epic';
    html += '<div class="log-line ' + cls + '">' + line + '</div>';
  });
  html += '</div>';
  if(loot.length > 0){
    html += '<h3>Loot</h3>';
    loot.forEach(g => {
      html += '<div class="card"><span class="' + RARITIES[g.rarity] + '">' + g.name + '</span> PWR:' + g.power + ' DEF:' + g.defense + '</div>';
    });
  }
  html += '<div class="mt"><button class="btn btn-cyan" onclick="showTab(\'missions\')">Continue</button></div>';
  document.getElementById('content').innerHTML = html;
}

// ==================== BOUNTY BOARD ====================
function generateBounties(){
  const bounties = [];
  const types = [
    {name:'Kill Contract',desc:'Eliminate targets',type:'kill',target:5+G.level,gold:50+G.level*8,xp:30+G.level*5,gems:1},
    {name:'Gather Intel',desc:'Hack data nodes',type:'hack',target:3+Math.floor(G.level/3),gold:40+G.level*6,xp:25+G.level*4,gems:1},
    {name:'Ore Requisition',desc:'Mine raw materials',type:'mine',target:4+Math.floor(G.level/2),gold:35+G.level*5,xp:20+G.level*3,gems:0},
    {name:'Scavenge Run',desc:'Find salvage',type:'scavenge',target:4+Math.floor(G.level/2),gold:30+G.level*5,xp:25+G.level*4,gems:1},
    {name:'Boss Bounty',desc:'Slay a boss',type:'boss',target:1,gold:100+G.level*15,xp:80+G.level*10,gems:2},
    {name:'Dungeon Dive',desc:'Clear dungeon waves',type:'dungeon',target:3,gold:80+G.level*12,xp:60+G.level*8,gems:2},
    {name:'Training Regimen',desc:'Train any skill',type:'train',target:5+Math.floor(G.level/3),gold:25+G.level*4,xp:20+G.level*3,gems:0},
  ];
  // Pick 3-4 random bounties
  const count = 3 + (G.skillLevels[12] >= 50 ? 1 : 0);
  const shuffled = types.sort(() => Math.random() - 0.5);
  for(let i = 0; i < Math.min(count, shuffled.length); i++){
    bounties.push({...shuffled[i], progress:0, completed:false, claimed:false});
  }
  return bounties;
}

function refreshBounties(){
  G.bounties = generateBounties();
  G.bountyRefreshTime = Date.now();
  save();
}

function claimBounty(idx){
  const b = G.bounties[idx];
  if(!b || !b.completed || b.claimed) return;
  b.claimed = true;
  G.gold += b.gold;
  G.total_gold_earned += b.gold;
  addXp(b.xp);
  if(b.gems > 0) G.gems += b.gems;
  toast('Bounty claimed! +' + b.gold + 'g +' + b.xp + 'xp' + (b.gems > 0 ? ' +' + b.gems + ' gems' : ''), '#ffd700');
  checkAchievements();
  save();
  showTab('missions');
}

// Track bounty progress (called after relevant actions)
function updateBountyProgress(type, amount){
  if(!G.bounties) return;
  G.bounties.forEach(b => {
    if(b.completed || b.claimed) return;
    if(b.type === type){
      b.progress = Math.min(b.target, b.progress + amount);
      if(b.progress >= b.target){
        b.completed = true;
        toast('Bounty complete: ' + b.name + '!', '#ffd700');
      }
    }
  });
}

// ==================== ENCHANTING SYSTEM ====================
function getEnchantCost(item){
  return Math.floor(50 * (item.rarity + 1) * (item.level + 1) * 0.5);
}

function enchantReroll(invIdx){
  if(G.skillLevels[11] < 10){ toast('Need Enchanting Lv.10','#f44'); return; }
  const item = G.inventory[invIdx];
  if(!item) return;
  const cost = getEnchantCost(item);
  if(G.gold < cost){ toast('Need ' + cost + ' gold','#f44'); return; }
  G.gold -= cost;

  // Reroll one stat randomly
  const variance = G.skillLevels[11] >= 99 ? 0.1 : (G.skillLevels[11] >= 75 ? 0.15 : 0.3);
  const basePower = Math.floor((3 + item.level * 1.5) * RARITY_MULT[item.rarity]);
  if(Math.random() < 0.5){
    item.power = Math.floor(basePower * (item.slot === 'weapon' ? 1 : 0.3) * (1 + (Math.random() * 0.4 - variance)));
  } else {
    item.defense = Math.floor(basePower * (item.slot === 'armor' || item.slot === 'shield' ? 1 : 0.2) * (1 + (Math.random() * 0.4 - variance)));
  }
  toast('Rerolled ' + item.name + ' stats!', '#b026ff');
  save();
  showTab('gear');
}

function enchantBoost(invIdx){
  if(G.skillLevels[11] < 25){ toast('Need Enchanting Lv.25','#f44'); return; }
  const item = G.inventory[invIdx];
  if(!item) return;
  const cost = getEnchantCost(item) * 2;
  if(G.gold < cost){ toast('Need ' + cost + ' gold','#f44'); return; }
  G.gold -= cost;

  const boost = G.skillLevels[11] >= 99 ? 0.15 : (G.skillLevels[11] >= 75 ? 0.12 : 0.1);
  item.power = Math.floor(item.power * (1 + boost));
  item.defense = Math.floor(item.defense * (1 + boost));
  item.level += 1;
  toast(item.name + ' boosted! +' + Math.floor(boost*100) + '% stats!', '#ffd700');
  save();
  showTab('gear');
}

function enchantUpgradeRarity(invIdx){
  if(G.skillLevels[11] < 50){ toast('Need Enchanting Lv.50','#f44'); return; }
  const item = G.inventory[invIdx];
  if(!item || item.rarity >= 5) return;
  const cost = getEnchantCost(item) * 5;
  if(G.gold < cost){ toast('Need ' + cost + ' gold','#f44'); return; }
  G.gold -= cost;

  let chance = 12 + (G.skillLevels[11] >= 99 ? 18 : G.skillLevels[11] >= 75 ? 8 : 0);
  if(Math.random() * 100 < chance){
    item.rarity++;
    const names = GEAR_NAMES[item.slot];
    item.name = names[item.rarity] || names[names.length-1];
    item.power = Math.floor(item.power * RARITY_MULT[item.rarity] / RARITY_MULT[item.rarity-1]);
    item.defense = Math.floor(item.defense * RARITY_MULT[item.rarity] / RARITY_MULT[item.rarity-1]);
    toast('SUCCESS! ' + item.name + ' upgraded to ' + RARITY_NAMES[item.rarity] + '!', '#ffd700');
  } else {
    toast('Upgrade failed... item preserved.', '#f44');
  }
  save();
  showTab('gear');
}

// ==================== CRAFTING SYSTEM ====================
function craftGear(slot){
  // Determine max craftable rarity from Crafting skill
  let maxRarity = 0;
  if(G.skillLevels[8] >= 99) maxRarity = 5; // Mythic
  else if(G.skillLevels[8] >= 75) maxRarity = 4;
  else if(G.skillLevels[8] >= 50) maxRarity = 3;
  else if(G.skillLevels[8] >= 25) maxRarity = 2;
  else if(G.skillLevels[8] >= 10) maxRarity = 1;
  else { toast('Need Crafting Lv.10','#f44'); return; }

  const cost = Math.floor(100 * Math.pow(2.5, maxRarity));
  if(G.gold < cost){ toast('Need ' + cost + ' gold','#f44'); return; }
  G.gold -= cost;

  const gear = generateGear(G.level, false);
  gear.slot = slot;
  gear.rarity = maxRarity;
  const names = GEAR_NAMES[slot];
  gear.name = names[gear.rarity] || names[names.length-1];
  const mult = RARITY_MULT[gear.rarity];
  const basePower = Math.floor((3 + G.level * 1.5) * mult);
  gear.power = slot === 'weapon' ? basePower : Math.floor(basePower * 0.3);
  gear.defense = (slot === 'armor' || slot === 'shield') ? basePower : Math.floor(basePower * 0.2);
  gear.level = Math.max(1, Math.floor(G.level * mult * 0.5));
  // Artisan: crafted mythics get small bonus stats
  if(G.skillLevels[8] >= 99 && gear.rarity >= 5){
    gear.power = Math.floor(gear.power * 1.15);
    gear.defense = Math.floor(gear.defense * 1.15);
  }

  G.inventory.push(gear);
  addSkillXp(8, 20 + maxRarity * 10);
  toast('Crafted ' + gear.name + ' [' + RARITY_NAMES[gear.rarity] + ']!', '#ffd700');
  save();
  showTab('gear');
}

// ==================== GACHA SYSTEM ====================
function generateFollower(guaranteed_rarity){
  let rarity = 0;
  if(guaranteed_rarity !== undefined){
    rarity = guaranteed_rarity;
  } else {
    const roll = Math.random() * 10000;
    if(roll < 1) rarity = 5;         // 0.01% mythic
    else if(roll < 11) rarity = 4;   // 0.1% legendary
    else if(roll < 411) rarity = 3;  // 4% epic
    else if(roll < 1411) rarity = 2; // 10% rare
    else if(roll < 4411) rarity = 1; // 30% uncommon
    // else ~56% common
  }

  const name = FOLLOWER_NAMES[Math.floor(Math.random()*FOLLOWER_NAMES.length)];
  // Banner and wish list affect class selection
  let cls;
  const banner = getCurrentBanner();
  const wishClasses = G.wishList || [];
  if(banner.featured && Math.random() < 0.3){
    cls = banner.featured; // 30% chance to get featured class on banner
  } else if(wishClasses.length > 0 && Math.random() < 0.15){
    cls = wishClasses[Math.floor(Math.random() * wishClasses.length)]; // 15% wish list
  } else {
    cls = FOLLOWER_CLASSES[Math.floor(Math.random()*FOLLOWER_CLASSES.length)];
  }
  const basePower = (rarity + 1) * 3 + Math.floor(Math.random()*5);
  const stars = getStartingStars(rarity);
  const starMult = getStarMult(stars);
  // Get ability based on class + rarity
  const abilities = FOLLOWER_ABILITIES[cls] || FOLLOWER_ABILITIES['Fighter'];
  const abilityIdx = Math.min(rarity, abilities.length - 1);

  G.followerIdCounter++;
  return {
    id: G.followerIdCounter,
    name: name,
    class: cls,
    rarity: rarity,
    level: 1,
    xp: 0,
    power: Math.floor(basePower * starMult),
    defense: Math.floor(basePower * 0.7 * starMult),
    happiness: 80,
    loyalty: 50,
    stars: stars,
    maxStars: 5,
    ability: abilities[abilityIdx],
    assigned: 'idle',
    cityIdx: G.currentCity
  };
}

function doPull(count, useTicket){
  if(useTicket){
    if(count === 1 && (G.tickets1x||0) <= 0){ toast('No 1x tickets!','#f44'); return; }
    if(count === 10 && (G.tickets10x||0) <= 0){ toast('No 10x tickets!','#f44'); return; }
    if(count === 1) G.tickets1x--;
    else G.tickets10x--;
  } else {
    const cost = count === 1 ? 3 : 25;
    if(G.gems < cost){ toast('Not enough gems! Need ' + cost, '#f44'); return; }
    G.gems -= cost;
  }
  G.total_gacha_pulls += count;

  let pulled = [];
  let hasUncommonPlus = false;
  for(let i = 0; i < count; i++){
    let f;
    if(G.total_gacha_pulls % 2000 === 0){
      f = generateFollower(5);
    } else if(G.total_gacha_pulls % 500 === 0){
      f = generateFollower(4);
    } else if(G.total_gacha_pulls % 100 === 0){
      f = generateFollower(Math.max(2, Math.floor(Math.random()*3)+2));
    } else {
      f = generateFollower();
    }
    if(f.rarity >= 1) hasUncommonPlus = true;
    G.followers.push(f);
    pulled.push(f);
  }
  // 10-pull guarantee: if no uncommon+, upgrade last to uncommon
  if(count >= 10 && !hasUncommonPlus){
    const last = pulled[pulled.length-1];
    last.rarity = 1;
    last.stars = getStartingStars(1);
    last.power = Math.floor(last.power * 1.5);
    last.defense = Math.floor(last.defense * 1.5);
  }
  // Dupe shard check: if you pull same name+class as existing, get shards instead of dupe
  pulled.forEach(f => {
    const dupe = G.followers.find(x => x.id !== f.id && x.name === f.name && x.class === f.class);
    if(dupe){
      const shardGain = (f.rarity + 1) * 3;
      G.shards = (G.shards||0) + shardGain;
      f._dupeShards = shardGain; // mark for display
    }
  });
  save();
  showPullResults(pulled);
}

function useTicket1x(){ doPull(1, true); }
function useTicket10x(){ doPull(10, true); }

function upgradeFollowerStar(fId){
  const f = G.followers.find(x => x.id === fId);
  if(!f) return;
  if(f.stars >= 5){ toast('Max stars!','#f44'); return; }
  const goldCost = getStarUpgradeCost(f.stars, f.rarity);
  const shardCost = getStarUpgradeShards(f.stars);
  if(G.gold < goldCost){ toast('Need ' + goldCost + ' gold','#f44'); return; }
  if((G.shards||0) < shardCost){ toast('Need ' + shardCost + ' shards','#f44'); return; }
  G.gold -= goldCost;
  G.shards -= shardCost;
  f.stars++;
  const mult = getStarMult(f.stars) / getStarMult(f.stars - 1);
  f.power = Math.floor(f.power * mult);
  f.defense = Math.floor(f.defense * mult);
  toast(f.name + ' upgraded to ' + f.stars + ' stars!', '#ffd700');
  save();
  showTab('followers_detail', f.id);
}

function setWishList(cls){
  if(!G.wishList) G.wishList = [];
  if(G.wishList.includes(cls)){
    G.wishList = G.wishList.filter(c => c !== cls);
    toast(cls + ' removed from wish list', '#0ff');
  } else if(G.wishList.length >= 3){
    toast('Wish list full (3 max)!', '#f44');
    return;
  } else {
    G.wishList.push(cls);
    toast(cls + ' added to wish list! (+15% chance)', '#0ff');
  }
  save();
  showTab('gacha');
}

function showPullResults(pulled){
  let html = '<h2>Summon Results</h2>';
  html += '<div class="text-sm text-dim mb">Banner: ' + getCurrentBanner().name + '</div>';
  pulled.forEach(f => {
    html += '<div class="card follower-card" style="border-color:' + (f.rarity >= 3 ? RARITIES[f.rarity] === 'mythic' ? '#ff2060' : '#b026ff' : '#333') + '">';
    html += '<span class="name ' + RARITIES[f.rarity] + '">' + f.name + '</span>';
    html += ' <span class="text-sm">[' + RARITY_NAMES[f.rarity] + ' ' + f.class + ']</span>';
    html += ' <span style="color:#ffd700">' + '★'.repeat(f.stars) + '☆'.repeat(5 - f.stars) + '</span><br>';
    html += '<span class="text-sm">PWR:' + f.power + ' DEF:' + f.defense + ' | ' + f.ability + '</span>';
    if(f._dupeShards) html += '<br><span class="text-sm" style="color:#0ff">DUPE! +' + f._dupeShards + ' shards</span>';
    html += '</div>';
  });
  html += '<div class="mt"><button class="btn btn-cyan" onclick="showTab(\'gacha\')">Back</button></div>';
  document.getElementById('content').innerHTML = html;
}

}

function trainFollower(id){
  const f = G.followers.find(x => x.id === id);
  if(!f) return;
  const cost = 20 + f.level * 15;
  if(G.gold < cost){ toast('Need ' + cost + ' gold','#f44'); return; }
  G.gold -= cost;
  f.xp += 30 + f.level * 5;
  const needed = f.level * 50;
  if(f.xp >= needed && f.level < 50){
    f.xp -= needed;
    f.level++;
    f.power += (f.rarity + 1);
    f.defense += Math.floor((f.rarity + 1) * 0.7);
    toast(f.name + ' leveled up to ' + f.level + '!', '#b026ff');
  } else {
    toast(f.name + ' gained training XP.', '#0ff');
  }
  save();
  showTab('followers_detail', f.id);
}

function assignFollower(id, role){
  const f = G.followers.find(x => x.id === id);
  if(!f) return;
  const ci = f.cityIdx || 0;
  // Check slot capacity for building assignments
  const buildingIds = BUILDINGS.map(b => b.id);
  if(buildingIds.includes(role)){
    const slots = getBuildingSlots(role, ci);
    const current = getFollowersInSlot(role, ci).length;
    if(current >= slots){ toast('No slots! ' + role + ' has ' + current + '/' + slots + ' workers', '#f44'); return; }
  }
  if(role === 'garrison'){
    const slots = getGarrisonSlots(ci);
    const current = getWallGarrison(ci).length;
    if(current >= slots){ toast('Garrison full! ' + current + '/' + slots, '#f44'); return; }
  }
  f.assigned = role;
  const label = BUILDINGS.find(b => b.id === role)?.name || role;
  toast(f.name + ' assigned to ' + label, '#0ff');
  if(role === 'garrison') updateCityDefense(ci);
  save();
  showTab('followers_detail', f.id);
}

function dismissFollower(id){
  const idx = G.followers.findIndex(x => x.id === id);
  if(idx === -1) return;
  const name = G.followers[idx].name;
  G.followers.splice(idx, 1);
  toast(name + ' dismissed.', '#f44');
  save();
  showTab('town');
}

// ==================== SKILL TRAINING ====================
function trainSkill(idx){
  let cost = 3 + Math.floor(G.skillLevels[idx] * 0.5);
  // Survival reduces energy cost
  if(G.skillLevels[14] >= 99) cost = Math.floor(cost * 0.8);
  else if(G.skillLevels[14] >= 75) cost = Math.floor(cost * 0.85);
  else if(G.skillLevels[14] >= 25) cost = Math.floor(cost * 0.92);
  cost = Math.max(1, cost);
  if(G.energy < cost){
    toast('Need ' + cost + ' energy', '#f44');
    return;
  }
  G.energy -= cost;
  const xpGain = 15 + G.skillLevels[idx] * 2;
  addSkillXp(idx, xpGain);
  updateBountyProgress('train', 1);
  if(idx === 12) updateBountyProgress('hack', 1);
  if(idx === 4) updateBountyProgress('mine', 1);
  if(idx === 5) updateBountyProgress('scavenge', 1);

  // Resource rewards
  const goldGain = Math.floor(2 + G.skillLevels[idx] * 0.5);
  G.gold += goldGain;

  // Skill-specific bonuses
  // Hacking: gem chance
  if(idx === 12){
    let gemChance = 0.03;
    if(G.skillLevels[12] >= 10) gemChance += 0.02;
    if(G.skillLevels[12] >= 25) gemChance += 0.03;
    if(G.skillLevels[12] >= 99) gemChance += 0.04; // HACKER LORD: +50% total
    if(Math.random() < gemChance){
      G.gems += 1;
      toast('+1 Gem from hacking!', '#b026ff');
    }
  }
  // Mining: ore/gold bonus
  if(idx === 4){
    let bonus = Math.floor(G.skillLevels[4] * 0.3);
    if(G.skillLevels[4] >= 10) bonus = Math.floor(bonus * 1.1);
    if(G.skillLevels[4] >= 50 && Math.random() < 0.2) bonus *= 2; // Double ore
    if(G.skillLevels[4] >= 75 && Math.random() < 0.05){ G.gems += 1; toast('+1 Gem from mining!', '#b026ff'); }
    G.gold += bonus;
  }
  // Scavenging: extra gold
  if(idx === 5){
    G.gold += Math.floor(G.skillLevels[5] * 0.5);
  }

  save();
  showTab('skills');
}

// ==================== BUILDINGS ====================
function getBuildingCost(bId, cityIdx){
  const b = BUILDINGS.find(x => x.id === bId);
  const ci = cityIdx !== undefined ? cityIdx : G.currentCity;
  const lv = G.cities[ci].buildings[bId] || 0;
  let cost = Math.floor(b.baseCost * Math.pow(b.costMult, lv));
  // Engineering skill reduces building cost
  if(G.skillLevels[9] >= 99) cost = Math.floor(cost * 0.7);
  else if(G.skillLevels[9] >= 75) cost = Math.floor(cost * 0.8);
  else if(G.skillLevels[9] >= 50) cost = Math.floor(cost * 0.85);
  else if(G.skillLevels[9] >= 25) cost = Math.floor(cost * 0.9);
  else if(G.skillLevels[9] >= 10) cost = Math.floor(cost * 0.95);
  // Trade specialty
  const city = G.cities[ci];
  if(city.specialty === 'trade') cost = Math.floor(cost * (1 + SPECIALTIES.trade.bonus.buildCost));
  return cost;
}

function upgradeBuilding(bId){
  const cost = getBuildingCost(bId);
  const city = getCity();
  if(G.gold < cost){ toast('Need ' + cost + ' gold', '#f44'); return; }
  G.gold -= cost;
  city.buildings[bId] = (city.buildings[bId] || 0) + 1;
  G.maxEnergy = getMaxEnergy();
  const b = BUILDINGS.find(x => x.id === bId);
  toast(b.name + ' in ' + city.name + ' upgraded to Lv.' + city.buildings[bId] + '!', '#0ff');
  // Update city defense
  updateCityDefense(G.currentCity);
  checkAchievements();
  save();
  showTab('town');
}

// ==================== CITY MANAGEMENT ====================
function getCityDefense(cityIdx){
  const city = G.cities[cityIdx];
  let def = city.wallLevel * 10;
  // Barracks adds defense
  def += (city.buildings.barracks || 0) * 5;
  // Barracks workers add combat defense
  const barracksSoldiers = G.followers.filter(f => f.cityIdx === cityIdx && f.assigned === 'barracks' && f.happiness > 20);
  barracksSoldiers.forEach(f => { def += Math.floor(f.level * (f.rarity + 1) * 0.5); });
  // Wall garrison - main defenders
  const garrison = G.followers.filter(f => f.cityIdx === cityIdx && f.assigned === 'garrison' && f.happiness > 20);
  garrison.forEach(f => { def += Math.floor(f.level * (f.rarity + 1) * 1.2); });
  // Vault guards protect gold (counted as defense too)
  const vaultGuards = G.followers.filter(f => f.cityIdx === cityIdx && f.assigned === 'vault' && f.happiness > 20);
  vaultGuards.forEach(f => { def += Math.floor(f.level * (f.rarity + 1) * 0.3); });
  // Fortress specialty
  if(city.specialty === 'fortress') def = Math.floor(def * (1 + SPECIALTIES.fortress.bonus.defense));
  return def;
}

function updateCityDefense(cityIdx){
  G.cities[cityIdx].defense = getCityDefense(cityIdx);
}

function getCityPopulation(cityIdx){
  return G.followers.filter(f => f.cityIdx === cityIdx).length;
}

function getCityMaxPop(cityIdx){
  const city = G.cities[cityIdx];
  let maxPop = 5;
  maxPop += (city.buildings.barracks || 0) * 1;
  maxPop += (city.buildings.tavern || 0) * 2;
  maxPop += getResearchBonus('maxPop');
  return maxPop;
}

function foundCity(name){
  const idx = G.cities.length;
  if(idx >= 5){ toast('Max 5 cities!','#f44'); return; }
  if(G.level < CITY_LEVEL_REQ[idx]){ toast('Need level ' + CITY_LEVEL_REQ[idx],'#f44'); return; }
  const cost = CITY_COSTS[idx];
  if(G.gold < cost){ toast('Need ' + cost + ' gold','#f44'); return; }
  G.gold -= cost;
  G.cities.push(newCity(name));
  toast('Founded ' + name + '!', '#0ff');
  checkAchievements();
  save();
  showTab('town');
}

function switchCity(idx){
  if(idx < 0 || idx >= G.cities.length) return;
  G.currentCity = idx;
  toast('Viewing: ' + G.cities[idx].name, '#0ff');
  showTab('town');
}

function setCitySpecialty(spec){
  const city = getCity();
  city.specialty = spec;
  toast(city.name + ' specialized as ' + SPECIALTIES[spec].name, '#0ff');
  save();
  showTab('town');
}

function upgradeWall(){
  const city = getCity();
  if(city.wallLevel >= 20){ toast('Wall maxed!','#f44'); return; }
  const cost = Math.floor(80 * Math.pow(1.9, city.wallLevel));
  if(G.gold < cost){ toast('Need ' + cost + ' gold','#f44'); return; }
  G.gold -= cost;
  city.wallLevel++;
  updateCityDefense(G.currentCity);
  toast(city.name + ' wall upgraded to Lv.' + city.wallLevel, '#0ff');
  save();
  showTab('town');
}

function moveFollowerToCity(fId, cityIdx){
  const f = G.followers.find(x => x.id === fId);
  if(!f) return;
  const pop = getCityPopulation(cityIdx);
  const maxPop = getCityMaxPop(cityIdx);
  if(pop >= maxPop){ toast('City is full! (' + pop + '/' + maxPop + ')','#f44'); return; }
  f.cityIdx = cityIdx;
  toast(f.name + ' moved to ' + G.cities[cityIdx].name, '#0ff');
  updateCityDefense(cityIdx);
  save();
}

// ==================== RAID EVENTS ====================
// ==================== ENEMY FACTIONS & RAID ARMIES ====================
const ENEMY_FACTIONS = [
  {name:'Rust Bandits',units:['Scavenger','Raider','Brute','Warleader'],color:'#a63'},
  {name:'Neon Syndicate',units:['Thug','Enforcer','Hacker','Syndicate Boss'],color:'#f0f'},
  {name:'Void Cult',units:['Acolyte','Corrupted','Priest','Void Herald'],color:'#b026ff'},
  {name:'Iron Legion',units:['Trooper','Gunner','Mech Walker','Commander'],color:'#888'},
  {name:'Abyssal Horde',units:['Crawler','Stalker','Behemoth','Abyssal Lord'],color:'#f44'}
];

function generateRaidArmy(level){
  const faction = ENEMY_FACTIONS[Math.floor(Math.random() * ENEMY_FACTIONS.length)];
  const waveCount = 2 + Math.floor(level / 20);
  const waves = [];
  for(let w = 0; w < Math.min(waveCount, 5); w++){
    const isBoss = w === waveCount - 1;
    const unitIdx = isBoss ? 3 : Math.min(w, 2);
    const count = isBoss ? 1 : 2 + Math.floor(Math.random() * 3);
    const unitHp = Math.floor((30 + level * 4) * (isBoss ? 3 : 1) * (1 + w * 0.3));
    const unitAtk = Math.floor((5 + level * 1.5) * (isBoss ? 2 : 1) * (1 + w * 0.2));
    waves.push({
      unitName: faction.units[unitIdx],
      count: count,
      hp: unitHp,
      atk: unitAtk,
      isBoss: isBoss
    });
  }
  return { faction, waves };
}

function triggerRaid(cityIdx){
  const city = G.cities[cityIdx];
  const defense = getCityDefense(cityIdx);
  const army = generateRaidArmy(G.level);
  let log = [];

  log.push('=== RAID on ' + city.name + '! ===');
  log.push('Attackers: ' + army.faction.name);
  log.push('City Defense: ' + defense);
  log.push('');

  let cityHp = defense * 3 + 50; // City "HP" based on defense
  const cityMaxHp = cityHp;
  let wavesRepelled = 0;
  let totalEnemiesKilled = 0;

  // Garrison and barracks soldiers fight
  const defenders = G.followers.filter(f =>
    f.cityIdx === cityIdx && (f.assigned === 'garrison' || f.assigned === 'barracks') && f.happiness > 20
  );
  let defenderPower = defense;
  defenders.forEach(f => { defenderPower += Math.floor(f.level * f.power * (f.rarity + 1) * 0.3); });

  for(let w = 0; w < army.waves.length; w++){
    const wave = army.waves[w];
    log.push('--- Wave ' + (w+1) + ': ' + wave.count + 'x ' + wave.unitName + (wave.isBoss ? ' [BOSS]' : '') + ' ---');

    let waveHp = wave.hp * wave.count;
    const waveAtk = wave.atk * Math.ceil(wave.count * 0.7);
    log.push('Enemy HP: ' + waveHp + ' | ATK: ' + waveAtk);

    let turn = 0;
    while(cityHp > 0 && waveHp > 0 && turn < 20){
      turn++;
      // Defenders attack
      let dDmg = Math.floor(defenderPower * (0.7 + Math.random() * 0.6));
      waveHp -= dDmg;
      log.push('T' + turn + ': Defenders deal ' + dDmg + ' damage');

      if(waveHp <= 0){
        log.push('Wave ' + (w+1) + ' repelled!');
        break;
      }

      // Enemies attack city
      let eDmg = Math.floor(waveAtk * (0.6 + Math.random() * 0.5));
      // Vault guards reduce damage
      const vaultGuards = G.followers.filter(f => f.cityIdx === cityIdx && f.assigned === 'vault' && f.happiness > 20);
      if(vaultGuards.length > 0) eDmg = Math.floor(eDmg * 0.85);
      cityHp -= eDmg;
      log.push('T' + turn + ': Enemies deal ' + eDmg + ' to city (HP: ' + Math.max(0, cityHp) + '/' + cityMaxHp + ')');
    }

    if(waveHp <= 0){
      wavesRepelled++;
      totalEnemiesKilled += wave.count;
      G.total_kills += wave.count;
    }
    if(cityHp <= 0) break;
  }

  const won = cityHp > 0;
  log.push('');

  if(won){
    log.push('=== CITY DEFENDED! ===');
    city.raidWins++;
    G.total_raids_won++;
    const goldReward = Math.floor(40 + G.level * 6 + totalEnemiesKilled * 5);
    G.gold += goldReward;
    G.total_gold_earned += goldReward;
    log.push('+' + goldReward + ' gold from spoils (' + totalEnemiesKilled + ' enemies slain)');
    // Defenders gain XP
    defenders.forEach(f => {
      f.xp += 10 + totalEnemiesKilled * 2;
      const needed = f.level * 50;
      if(f.xp >= needed && f.level < 50){
        f.xp -= needed; f.level++; f.power += (f.rarity+1); f.defense += Math.floor((f.rarity+1)*0.7);
        log.push(f.name + ' leveled up to ' + f.level + '!');
      }
    });
    if(Math.random() < 0.2){
      G.gems += 1;
      log.push('+1 gem found in the wreckage!');
    }
    // Gear drop from boss wave
    if(wavesRepelled === army.waves.length && Math.random() < 0.3){
      const gear = generateGear(G.level, true);
      G.inventory.push(gear);
      log.push('LOOT: ' + gear.name + ' [' + RARITY_NAMES[gear.rarity] + '] from the ' + army.faction.name + '!');
    }
  } else {
    log.push('=== CITY BREACHED! ===');
    city.raidLosses++;
    log.push(wavesRepelled + '/' + army.waves.length + ' waves repelled before falling.');
    const goldLost = Math.floor(Math.min(G.gold * 0.1, 60 + G.level * 4));
    G.gold = Math.max(0, G.gold - goldLost);
    log.push('-' + goldLost + ' gold plundered!');
    // Building damage
    const bKeys = Object.keys(city.buildings).filter(k => city.buildings[k] > 0);
    if(bKeys.length > 0 && Math.random() < 0.35){
      const dmgKey = bKeys[Math.floor(Math.random() * bKeys.length)];
      city.buildings[dmgKey] = Math.max(0, city.buildings[dmgKey] - 1);
      const bName = BUILDINGS.find(b => b.id === dmgKey)?.name || dmgKey;
      log.push(bName + ' damaged! (-1 level)');
    }
    // Follower injuries
    defenders.forEach(f => {
      if(Math.random() < 0.3){
        f.happiness = Math.max(0, f.happiness - 15);
        log.push(f.name + ' was wounded! (-15 happiness)');
      }
    });
  }

  city.lastRaid = Date.now();
  checkAchievements();
  save();
  return { won, log, faction: army.faction };
}

function showRaidResult(result){
  let html = '<h2 style="color:' + result.faction.color + '">Raid: ' + result.faction.name + '</h2>';
  html += '<h3>' + (result.won ? 'City Defended!' : 'City Breached!') + '</h3>';
  html += '<div class="log" style="max-height:300px">';
  result.log.forEach(line => {
    let cls = '';
    if(line.includes('Defenders deal')) cls = 'dmg-enemy';
    else if(line.includes('Enemies deal') || line.includes('wounded')) cls = 'dmg-player';
    else if(line.includes('DEFENDED') || line.includes('repelled') || line.includes('+') || line.includes('LOOT')) cls = 'heal';
    else if(line.includes('BREACHED') || line.includes('plundered') || line.includes('damaged')) cls = 'dmg-player';
    else if(line.includes('leveled up')) cls = 'epic';
    html += '<div class="log-line ' + cls + '">' + line + '</div>';
  });
  html += '</div>';
  html += '<div class="mt"><button class="btn btn-cyan" onclick="showTab(\'town\')">Continue</button></div>';
  document.getElementById('content').innerHTML = html;
}

// ==================== ROAMING ENEMIES ====================
const ROAMER_TYPES = [
  {name:'Lost Scavenger',hpMult:0.5,atkMult:0.4,goldMult:0.8,minLv:1},
  {name:'Rogue Drifter',hpMult:0.7,atkMult:0.6,goldMult:1,minLv:3},
  {name:'Void Stalker',hpMult:1,atkMult:0.8,goldMult:1.2,minLv:10},
  {name:'Corrupted Scout',hpMult:1.2,atkMult:1,goldMult:1.5,minLv:20},
  {name:'Iron Marauder',hpMult:1.5,atkMult:1.3,goldMult:2,minLv:35},
  {name:'Abyssal Wraith',hpMult:2,atkMult:1.5,goldMult:2.5,minLv:50},
  {name:'Nexus Phantom',hpMult:2.5,atkMult:2,goldMult:3,minLv:70},
  {name:'Void Reaver',hpMult:3,atkMult:2.5,goldMult:4,minLv:85}
];

function spawnRoamingEnemies(){
  if(!G.roamingEnemies) G.roamingEnemies = [];
  // Remove expired
  G.roamingEnemies = G.roamingEnemies.filter(e => Date.now() - e.spawnTime < 300000); // 5 min lifespan
  // Spawn new ones up to max
  const maxRoamers = 3 + Math.floor(G.level / 15);
  while(G.roamingEnemies.length < maxRoamers){
    // Pick a type based on level
    const available = ROAMER_TYPES.filter(r => G.level >= r.minLv);
    const type = available[Math.floor(Math.random() * available.length)];
    const hp = Math.floor((40 + G.level * 5) * type.hpMult);
    const atk = Math.floor((5 + G.level * 2) * type.atkMult);
    const gold = Math.floor((15 + G.level * 3) * type.goldMult);
    const xp = Math.floor((10 + G.level * 2) * type.goldMult);
    // Pick a random zone they're roaming near
    const unlockedZones = ZONES.filter(z => G.level >= z.minLv);
    const zone = unlockedZones[Math.floor(Math.random() * unlockedZones.length)];
    G.roamingEnemies.push({
      id: Date.now() + Math.random(),
      name: type.name,
      hp: hp, maxHp: hp,
      atk: atk,
      gold: gold, xp: xp,
      zone: zone.name,
      spawnTime: Date.now(),
      // Some roamers target cities
      targetCity: Math.random() < 0.3 ? Math.floor(Math.random() * G.cities.length) : -1
    });
  }
}

function fightRoamer(roamerId){
  const idx = G.roamingEnemies.findIndex(e => e.id === roamerId);
  if(idx === -1){ toast('Enemy fled!','#f44'); showTab('missions'); return; }
  const enemy = G.roamingEnemies[idx];

  if(G.energy < 5){ toast('Need 5 energy','#f44'); return; }
  G.energy -= 5;

  const power = getCombatPower();
  const def = getCombatDefense();
  const maxHp = 50 + G.level * 10 + G.stats.defense * 3;
  let playerHp = maxHp;
  let enemyHp = enemy.hp;
  let log = [];

  log.push('--- Roaming: ' + enemy.name + ' ---');
  log.push('Your HP: ' + playerHp + ' | Enemy HP: ' + enemyHp);

  let turn = 0;
  while(playerHp > 0 && enemyHp > 0 && turn < 30){
    turn++;
    let dmg = Math.max(1, power - Math.floor(enemy.atk * 0.15) + Math.floor(Math.random()*5));
    if(G.class === 'striker' && enemyHp < enemy.maxHp * 0.5) dmg = Math.floor(dmg * 1.15);
    if(Math.random()*100 < getLuck()){ dmg = Math.floor(dmg * 2); log.push('T'+turn+': CRIT '+dmg+'!'); }
    else { log.push('T'+turn+': Hit '+dmg); }
    enemyHp -= dmg;
    if(enemyHp <= 0) break;

    let eDmg = Math.max(1, enemy.atk - Math.floor(def * 0.3) + Math.floor(Math.random()*3));
    if(G.class === 'tank' && playerHp > maxHp * 0.7) eDmg = Math.floor(eDmg * 0.8);
    let dodgeRate = Math.min(30, getCombatSpeed() * 0.5);
    if(G.class === 'phantom' && turn <= 2) dodgeRate += 25;
    if(Math.random()*100 < dodgeRate){
      log.push('T'+turn+': DODGE!');
    } else {
      playerHp -= eDmg;
      log.push('T'+turn+': Took '+eDmg+' (HP:'+Math.max(0,playerHp)+')');
    }
    if(playerHp <= 0 && G.potions.hp > 0){
      G.potions.hp--;
      playerHp = Math.floor(maxHp * 0.3);
      log.push('  Used HP Potion! HP: ' + playerHp);
    }
  }

  if(enemyHp <= 0){
    log.push('=== ' + enemy.name + ' SLAIN! ===');
    G.total_kills++;
    G.missions_completed++;
    G.gold += enemy.gold;
    G.total_gold_earned += enemy.gold;
    addXp(enemy.xp);
    log.push('+' + enemy.gold + 'g +' + enemy.xp + 'xp');
    // Loot chance
    if(Math.random() < 0.2){
      const gear = generateGear(G.level, false);
      G.inventory.push(gear);
      log.push('LOOT: ' + gear.name + ' [' + RARITY_NAMES[gear.rarity] + ']');
    }
    // Remove roamer
    G.roamingEnemies.splice(idx, 1);
    updateBountyProgress('kill', 1);
  } else {
    log.push('=== DEFEATED ===');
    log.push('The ' + enemy.name + ' escapes...');
    // Enemy keeps remaining HP
    enemy.hp = enemyHp;
  }

  checkAchievements();
  save();
  // Show result
  let html = '<h2>' + (enemyHp <= 0 ? 'Victory!' : 'Defeat') + '</h2>';
  html += '<div class="log">';
  log.forEach(line => {
    let cls = '';
    if(line.includes('CRIT') || line.includes('Hit ')) cls = 'dmg-enemy';
    else if(line.includes('Took ')) cls = 'dmg-player';
    else if(line.includes('DODGE') || line.includes('SLAIN') || line.includes('LOOT')) cls = 'heal';
    html += '<div class="log-line ' + cls + '">' + line + '</div>';
  });
  html += '</div>';
  html += '<div class="mt"><button class="btn btn-cyan" onclick="showTab(\'missions\')">Continue</button></div>';
  document.getElementById('content').innerHTML = html;
}

// Roaming enemies that target cities deal passive damage
function processRoamerCityAttacks(){
  if(!G.roamingEnemies) return;
  G.roamingEnemies.forEach(e => {
    if(e.targetCity >= 0 && e.targetCity < G.cities.length){
      const city = G.cities[e.targetCity];
      const defense = getCityDefense(e.targetCity);
      // Enemy chips at city if defense is low
      if(e.atk > defense * 0.5){
        const dmg = Math.floor(e.atk * 0.1);
        // Steal small gold
        const stolen = Math.min(G.gold, Math.floor(3 + G.level * 0.5));
        G.gold = Math.max(0, G.gold - stolen);
      }
    }
  });
}

function getSetBonus(){
  const equipped = GEAR_SLOTS.map(s => G.gear[s]).filter(g => g !== null);
  if(equipped.length < 2) return [];
  const bonuses = [];
  // Count by rarity
  const rarityCounts = {};
  equipped.forEach(g => { rarityCounts[g.rarity] = (rarityCounts[g.rarity]||0) + 1; });
  for(const r in rarityCounts){
    const count = rarityCounts[r];
    const ri = parseInt(r);
    if(count >= 2) bonuses.push({name:RARITY_NAMES[ri]+' Duo',desc:'+5% power',power:0.05,count:2,rarity:ri});
    if(count >= 3) bonuses.push({name:RARITY_NAMES[ri]+' Trio',desc:'+8% defense',defense:0.08,count:3,rarity:ri});
    if(count >= 4) bonuses.push({name:RARITY_NAMES[ri]+' Full Set',desc:'+12% all stats',all:0.12,count:4,rarity:ri});
  }
  return bonuses;
}

function getSetPowerMult(){
  let mult = 1;
  getSetBonus().forEach(b => { if(b.power) mult += b.power; if(b.all) mult += b.all; });
  return mult;
}
function getSetDefMult(){
  let mult = 1;
  getSetBonus().forEach(b => { if(b.defense) mult += b.defense; if(b.all) mult += b.all; });
  return mult;
}

function startExpedition(typeIdx, followerIds){
  const type = EXPEDITION_TYPES[typeIdx];
  if(G.expeditions.length >= 3){ toast('Max 3 expeditions!','#f44'); return; }
  if(G.energy < type.energy){ toast('Need '+type.energy+' energy','#f44'); return; }
  const followers = followerIds.map(id => G.followers.find(f=>f.id===id)).filter(f=>f);
  if(followers.length === 0){ toast('Select followers!','#f44'); return; }
  G.energy -= type.energy;
  G.expeditions.push({
    type: typeIdx,
    followerIds: followerIds,
    startTime: Date.now(),
    endTime: Date.now() + type.duration * 1000,
    collected: false
  });
  followers.forEach(f => { f.assigned = 'expedition'; });
  toast('Expedition started: ' + type.name, '#0ff');
  save();
}

function collectExpedition(idx){
  const exp = G.expeditions[idx];
  if(!exp || exp.collected) return;
  if(Date.now() < exp.endTime){ toast('Not ready yet!','#f44'); return; }
  const type = EXPEDITION_TYPES[exp.type];
  const followers = exp.followerIds.map(id => G.followers.find(f=>f.id===id)).filter(f=>f);
  const powerMult = 1 + followers.reduce((s,f) => s + f.level * (f.rarity+1) * 0.01, 0);

  const gold = Math.floor((type.goldMin + Math.random() * (type.goldMax - type.goldMin)) * powerMult);
  const xp = Math.floor((type.xpMin + Math.random() * (type.xpMax - type.xpMin)) * powerMult);
  G.gold += gold; G.total_gold_earned += gold; addXp(xp);
  let msg = 'Expedition complete! +' + gold + 'g +' + xp + 'xp';
  if(Math.random() < type.gearChance){
    const gear = generateGear(G.level, Math.random() < 0.3);
    G.inventory.push(gear);
    msg += ' + ' + gear.name;
  }
  if(Math.random() < type.gemChance){
    const gems = 1 + Math.floor(Math.random() * 3);
    G.gems += gems; msg += ' +' + gems + ' gems';
  }
  // Follower XP
  followers.forEach(f => { f.assigned = 'idle'; f.xp += 20 + type.duration / 100; });
  G.expeditions.splice(idx, 1);
  toast(msg, '#ffd700');
  checkAchievements(); save();
}

// ==================== MAP / EXPLORATION ====================
const MAP_TILES = [];
function generateMap(){
  if(MAP_TILES.length > 0) return;
  const tileTypes = ['empty','enemy','cache','resource','ruins','boss','shrine','trap'];
  for(let i = 0; i < 50; i++){
    const roll = Math.random();
    let type = 'empty';
    if(roll < 0.25) type = 'enemy';
    else if(roll < 0.40) type = 'cache';
    else if(roll < 0.50) type = 'resource';
    else if(roll < 0.58) type = 'ruins';
    else if(roll < 0.62) type = 'shrine';
    else if(roll < 0.67) type = 'trap';
    else if(i > 0 && i % 10 === 0) type = 'boss';
    MAP_TILES.push({
      id: i, type: type,
      name: type === 'enemy' ? ROAMER_TYPES[Math.min(Math.floor(i/7), ROAMER_TYPES.length-1)].name :
            type === 'boss' ? 'Map Guardian Lv.' + (i*2) :
            type === 'cache' ? 'Supply Cache' :
            type === 'resource' ? 'Resource Node' :
            type === 'ruins' ? 'Ancient Ruins' :
            type === 'shrine' ? 'Power Shrine' :
            type === 'trap' ? 'Trap!' : 'Empty Wasteland'
    });
  }
}

function exploreTile(tileIdx){
  generateMap();
  if(tileIdx > (G.mapPosition||0) + 1){ toast('Explore tiles in order!','#f44'); return; }
  if(G.exploredTiles && G.exploredTiles.includes(tileIdx)){ toast('Already explored!','#f44'); return; }
  if(G.energy < 8){ toast('Need 8 energy','#f44'); return; }
  G.energy -= 8;

  const tile = MAP_TILES[tileIdx];
  if(!G.exploredTiles) G.exploredTiles = [];
  G.exploredTiles.push(tileIdx);
  G.mapPosition = Math.max(G.mapPosition||0, tileIdx);

  let msg = '';
  switch(tile.type){
    case 'empty': msg = 'Nothing here but dust.'; break;
    case 'cache':
      const cGold = 30 + G.level * 5 + tileIdx * 10;
      G.gold += cGold; G.total_gold_earned += cGold;
      msg = 'Found a supply cache! +' + cGold + ' gold';
      if(Math.random() < 0.3){ G.gems += 1; msg += ' +1 gem'; }
      break;
    case 'resource':
      const skIdx = [4,5,6,7][Math.floor(Math.random()*4)]; // gathering skills
      addSkillXp(skIdx, 30 + tileIdx * 5);
      msg = 'Resource node! +' + SKILL_NAMES[skIdx] + ' XP';
      break;
    case 'ruins':
      const rGold = 50 + tileIdx * 15;
      G.gold += rGold; addXp(20 + tileIdx * 5);
      msg = 'Ancient ruins! +' + rGold + 'g +XP';
      if(Math.random() < 0.4){
        const gear = generateGear(G.level, false);
        G.inventory.push(gear);
        msg += ' + ' + gear.name;
      }
      break;
    case 'shrine':
      G.energy = Math.min(getMaxEnergy(), G.energy + 20);
      const statBoost = ['power','defense','speed','luck'][Math.floor(Math.random()*4)];
      G.stats[statBoost] += 1;
      msg = 'Power Shrine! +20 energy, +1 ' + statBoost;
      break;
    case 'trap':
      const trapDmg = 20 + tileIdx * 3;
      G.energy = Math.max(0, G.energy - 10);
      msg = 'Trap! Lost 10 energy. Be careful...';
      break;
    case 'enemy':
      const eGold = 20 + tileIdx * 8;
      const eXp = 15 + tileIdx * 5;
      G.gold += eGold; addXp(eXp); G.total_kills++;
      msg = 'Defeated ' + tile.name + '! +' + eGold + 'g +' + eXp + 'xp';
      break;
    case 'boss':
      const bGold = 100 + tileIdx * 20;
      const bXp = 80 + tileIdx * 15;
      G.gold += bGold; addXp(bXp); G.bosses_killed++; G.total_kills++;
      msg = 'Map Guardian defeated! +' + bGold + 'g +' + bXp + 'xp';
      if(Math.random() < 0.6){
        const gear = generateGear(G.level + 5, true);
        G.inventory.push(gear);
        msg += ' + ' + gear.name + '!';
      }
      G.gems += 2; msg += ' +2 gems';
      break;
  }
  toast(msg, '#0ff');
  checkAchievements(); save();
}

function checkDailyLogin(){
  const today = new Date().toISOString().split('T')[0];
  if(G.lastLoginDay === today) return; // already claimed
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if(G.lastLoginDay === yesterday){
    G.loginStreak++;
  } else if(G.lastLoginDay){
    G.loginStreak = 1; // streak broken
  } else {
    G.loginStreak = 1; // first login
  }
  G.lastLoginDay = today;
  // Find best matching reward
  let reward = DAILY_REWARDS[0];
  for(let i = DAILY_REWARDS.length - 1; i >= 0; i--){
    if(G.loginStreak >= DAILY_REWARDS[i].day){ reward = DAILY_REWARDS[i]; break; }
  }
  G.gold += reward.gold;
  G.total_gold_earned += reward.gold;
  G.gems += reward.gems;
  let msg = 'Daily Login! Day ' + G.loginStreak + ': ' + reward.desc;
  // Day 30 bonus: free rare+ follower
  if(G.loginStreak >= 30 && G.loginStreak % 30 === 0){
    const f = generateFollower(Math.max(2, Math.floor(Math.random()*3)+2));
    G.followers.push(f);
    msg += ' + ' + f.name + ' [' + RARITY_NAMES[f.rarity] + ']!';
  }
  toast(msg, '#ffd700');
  save();
}

const POTIONS = {
  hp: {name:'HP Potion',desc:'Heal 30% HP in combat',reqAlch:10,reqHarv:1,cost:30,color:'#f44'},
  power: {name:'Power Elixir',desc:'+20% power for 5 turns',reqAlch:25,reqHarv:15,cost:60,color:'#f80'},
  defense: {name:'Iron Tonic',desc:'+20% defense for 5 turns',reqAlch:25,reqHarv:15,cost:60,color:'#4af'},
  luck: {name:'Fortune Brew',desc:'+30% luck for 5 turns',reqAlch:50,reqHarv:30,cost:100,color:'#ffd700'},
  xp: {name:'Insight Serum',desc:'+25% XP for 10 turns',reqAlch:75,reqHarv:50,cost:150,color:'#0ff'}
};

function brewPotion(type){
  const p = POTIONS[type];
  if(!p) return;
  if(G.skillLevels[10] < p.reqAlch){ toast('Need Alchemy Lv.' + p.reqAlch, '#f44'); return; }
  if(G.skillLevels[6] < p.reqHarv){ toast('Need Harvesting Lv.' + p.reqHarv, '#f44'); return; }
  let cost = p.cost;
  if(G.skillLevels[10] >= 99) cost = Math.floor(cost * 0.5); // ALCHEMIST: 50% cheaper
  if(G.gold < cost){ toast('Need ' + cost + ' gold', '#f44'); return; }
  G.gold -= cost;
  G.potions[type] = (G.potions[type] || 0) + 1;
  addSkillXp(10, 10 + G.skillLevels[10]);
  addSkillXp(6, 5 + G.skillLevels[6]);
  toast('Brewed ' + p.name + '! (x' + G.potions[type] + ')', p.color);
  save();
}

function usePotion(type){
  if(!G.potions[type] || G.potions[type] <= 0){ toast('No ' + POTIONS[type].name + '!', '#f44'); return; }
  G.potions[type]--;
  let duration = 5;
  if(type === 'xp') duration = 10;
  if(G.skillLevels[10] >= 99) duration = Math.floor(duration * 1.5); // ALCHEMIST: 50% longer
  G.activeBuff = { type: type, turnsLeft: duration };
  toast('Used ' + POTIONS[type].name + '! (' + duration + ' turns)', POTIONS[type].color);
  save();
}

// ==================== BUILDING SYNERGIES ====================
function getBuildingSynergies(cityIdx){
  const city = G.cities[cityIdx !== undefined ? cityIdx : G.currentCity];
  const b = city.buildings;
  const synergies = [];
  // Foundry + Workshop = +15% crafting output
  if((b.foundry||0) >= 5 && (b.workshop||0) >= 5)
    synergies.push({name:'Industrial Complex',desc:'Foundry+Workshop: +15% crafting quality',bonus:'craft'});
  // Barracks + Shrine = +10% combat luck
  if((b.barracks||0) >= 5 && (b.shrine||0) >= 5)
    synergies.push({name:'War Blessing',desc:'Barracks+Shrine: +10% crit in combat',bonus:'crit'});
  // Lab + Shrine = +8% skill XP
  if((b.lab||0) >= 5 && (b.shrine||0) >= 5)
    synergies.push({name:'Enlightenment',desc:'Lab+Shrine: +8% skill XP',bonus:'skillxp'});
  // Generator + Vault = +10 max energy
  if((b.generator||0) >= 5 && (b.vault||0) >= 5)
    synergies.push({name:'Power Grid',desc:'Generator+Vault: +10 max energy',bonus:'energy'});
  // Tavern + Barracks = followers in barracks get +20% power
  if((b.tavern||0) >= 5 && (b.barracks||0) >= 5)
    synergies.push({name:'Battle Feast',desc:'Tavern+Barracks: barracks soldiers +20% power',bonus:'soldier'});
  // All buildings >= 10 = mega synergy
  if(BUILDINGS.every(bd => (b[bd.id]||0) >= 10))
    synergies.push({name:'Metropolis',desc:'All buildings Lv.10+: +5% to everything',bonus:'all'});
  return synergies;
}

function hasSynergy(bonus){
  for(let i = 0; i < G.cities.length; i++){
    if(getBuildingSynergies(i).some(s => s.bonus === bonus)) return true;
  }
  return false;
}

// ==================== WORLD BOSS ====================
function getWorldBoss(){
  const tier = (G.worldBossKills || 0);
  const hp = 50000 * Math.pow(1.5, tier);
  const name = ['Void Colossus','Abyssal Leviathan','Nexus Titan','Corruption Incarnate','The Eternal'][Math.min(tier, 4)];
  const atk = 50 + tier * 30;
  return { name, maxHp: Math.floor(hp), atk, tier };
}

function attackWorldBoss(){
  if(G.energy < 15){ toast('Need 15 energy', '#f44'); return; }
  G.energy -= 15;

  const boss = getWorldBoss();
  if(!G.worldBossHp || G.worldBossHp <= 0) G.worldBossHp = boss.maxHp;

  const power = getCombatPower();
  let dmg = Math.floor(power * (0.8 + Math.random() * 0.4));
  // Class passive & potions apply
  if(G.activeBuff && G.activeBuff.type === 'power') dmg = Math.floor(dmg * 1.2);
  // Crits
  if(Math.random() * 100 < getLuck()) dmg = Math.floor(dmg * 2);

  G.worldBossHp -= dmg;
  G.worldBossDmgDealt = (G.worldBossDmgDealt || 0) + dmg;

  let msg = 'Hit ' + boss.name + ' for ' + dmg + '! (HP: ' + Math.max(0, G.worldBossHp) + '/' + boss.maxHp + ')';

  if(G.worldBossHp <= 0){
    // Boss killed!
    G.worldBossKills = (G.worldBossKills || 0) + 1;
    const goldReward = 500 + G.worldBossKills * 200;
    const gemReward = 3 + G.worldBossKills;
    const xpReward = 300 + G.worldBossKills * 100;
    G.gold += goldReward;
    G.total_gold_earned += goldReward;
    G.gems += gemReward;
    addXp(xpReward);
    G.worldBossHp = 0;
    G.worldBossDmgDealt = 0;
    msg = boss.name + ' DEFEATED! +' + goldReward + 'g +' + gemReward + ' gems +' + xpReward + 'xp! Next boss is stronger...';
    toast(msg, '#ffd700');
    // Drop gear
    const gear = generateGear(G.level + 10, true);
    G.inventory.push(gear);
    toast('Boss dropped: ' + gear.name + ' [' + RARITY_NAMES[gear.rarity] + ']', '#ffd700');
    // Rare ticket drop from world boss
    if(Math.random() < 0.08){
      G.tickets1x = (G.tickets1x||0) + 1;
      toast('+1 Summon Ticket!', '#0ff');
    }
    if(G.worldBossKills > 3 && Math.random() < 0.03){
      G.tickets10x = (G.tickets10x||0) + 1;
      toast('+1 10x Summon Ticket!!', '#ffd700');
    }
  } else {
    toast(msg, '#0ff');
  }

  // Decrement buff
  if(G.activeBuff){
    G.activeBuff.turnsLeft--;
    if(G.activeBuff.turnsLeft <= 0) G.activeBuff = null;
  }

  checkAchievements();
  save();
  showTab('missions');
}

// ==================== AUTO-BATTLE ====================
function startAutoBattle(zoneIdx, missionIdx){
  const zone = ZONES[zoneIdx];
  if(!zone || G.level < zone.minLv) return;
  const mission = zone.missions[missionIdx];
  if(!mission) return;
  // Need at least 1 combat follower
  const combatFollowers = G.followers.filter(f => f.assigned === 'combat' && f.happiness > 20);
  if(combatFollowers.length === 0){ toast('Need followers assigned to combat!', '#f44'); return; }
  G.autoBattle = { zoneIdx, missionIdx, missionName: mission.name, zoneName: zone.name };
  G.autoBattleEarnings = { gold:0, xp:0, kills:0, items:0 };
  toast('Auto-battle started: ' + mission.name, '#0ff');
  save();
  showTab('missions');
}

function stopAutoBattle(){
  if(!G.autoBattle) return;
  toast('Auto-battle stopped. Earned: ' + G.autoBattleEarnings.gold + 'g, ' + G.autoBattleEarnings.kills + ' kills', '#0ff');
  G.autoBattle = null;
  save();
  showTab('missions');
}

function processAutoBattle(){
  if(!G.autoBattle) return;
  const zone = ZONES[G.autoBattle.zoneIdx];
  if(!zone) { G.autoBattle = null; return; }
  const mission = zone.missions[G.autoBattle.missionIdx];
  if(!mission) { G.autoBattle = null; return; }

  // Followers fight on their own - uses their combined power
  const combatFollowers = G.followers.filter(f => f.assigned === 'combat' && f.happiness > 20);
  if(combatFollowers.length === 0){ stopAutoBattle(); return; }

  let followerPower = 0;
  combatFollowers.forEach(f => { followerPower += f.level * f.power * (f.rarity + 1) * 0.3; });

  const enemyPower = mission.enemyHp * 0.3 + mission.enemyAtk * 2;

  // Win chance based on power ratio
  const ratio = followerPower / Math.max(1, enemyPower);
  const winChance = Math.min(0.85, ratio * 0.5); // cap at 85%

  if(Math.random() < winChance){
    // Won
    const goldEarned = Math.floor(mission.gold * 0.6); // 60% of normal (they're followers)
    const xpEarned = Math.floor(mission.xp * 0.4); // 40% XP
    G.gold += goldEarned;
    G.total_gold_earned += goldEarned;
    addXp(xpEarned);
    G.autoBattleEarnings.gold += goldEarned;
    G.autoBattleEarnings.xp += xpEarned;
    G.autoBattleEarnings.kills++;
    G.total_kills++;
    G.missions_completed++;

    // Small gear drop chance
    if(Math.random() < 0.08){
      const gear = generateGear(G.level, false);
      G.inventory.push(gear);
      G.autoBattleEarnings.items++;
    }

    // Follower XP
    combatFollowers.forEach(f => {
      f.xp += 5;
      const needed = f.level * 50;
      if(f.xp >= needed && f.level < 50){
        f.xp -= needed;
        f.level++;
        f.power += (f.rarity + 1);
        f.defense += Math.floor((f.rarity + 1) * 0.7);
      }
    });
  }

  // Happiness drain from fighting
  combatFollowers.forEach(f => {
    if(Math.random() < 0.05) f.happiness = Math.max(0, f.happiness - 1);
  });
}
