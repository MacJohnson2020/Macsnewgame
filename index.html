  c.innerHTML = html;
}

function bulkFeed(cityIdx){
  const followers = G.followers.filter(f => (f.cityIdx || 0) === cityIdx && f.happiness < 100);
  if(followers.length === 0){ toast('All followers are happy!', '#0f0'); return; }
  let totalCost = 0;
  followers.forEach(f => { totalCost += 10 + f.level * 5; });
  if(G.gold < totalCost){ toast('Need ' + totalCost + ' gold to feed all', '#f44'); return; }
  G.gold -= totalCost;
  let fed = 0;
  followers.forEach(f => {
    f.happiness = Math.min(100, f.happiness + 20);
    f.loyalty = Math.min(100, f.loyalty + 5);
    fed++;
  });
  toast('Fed ' + fed + ' followers for ' + totalCost + ' gold!', '#0f0');
  save();
  showTab('town');
}

function bulkTrain(cityIdx){
  const followers = G.followers.filter(f => (f.cityIdx || 0) === cityIdx && f.level < 50);
  if(followers.length === 0){ toast('All followers maxed!', '#0f0'); return; }
  let totalCost = 0;
  followers.forEach(f => { totalCost += 20 + f.level * 15; });
  if(G.gold < totalCost){ toast('Need ' + totalCost + ' gold to train all', '#f44'); return; }
  G.gold -= totalCost;
  let leveled = 0;
  followers.forEach(f => {
    const oldLevel = f.level;
    f.xp += 30 + f.level * 5;
    const needed = f.level * 50;
    if(f.xp >= needed && f.level < 50){
      f.xp -= needed;
      f.level++;
      f.power += (f.rarity + 1);
      f.defense += Math.floor((f.rarity + 1) * 0.7);
      leveled++;
      // Title announcements on milestone levels
      if(oldLevel < 25 && f.level >= 25) toast(f.name + ' earned a title: ' + getFollowerDisplayName(f) + '!', '#ffd700');
      if(oldLevel < 50 && f.level >= 50) toast(f.name + ' has become LEGENDARY: ' + getFollowerDisplayName(f) + '!', '#ff2060');
    }
  });
  toast('Trained ' + followers.length + ' followers! ' + leveled + ' leveled up!', '#b026ff');
  save();
  showTab('town');
}

// Follower Auto-Assign (#7)
function autoAssignFollowers(){
  const ci = G.currentCity;
  const idleFollowers = G.followers.filter(f => (f.cityIdx||0) === ci && f.assigned === 'idle');
  if(idleFollowers.length === 0){ toast('No idle followers to assign!','#f44'); return; }
  let assigned = 0;
  idleFollowers.forEach(f => {
    const classInfo = FOLLOWER_CLASS_BONUSES[f.class];
    if(!classInfo) return;
    const bestBldg = classInfo.bestBuilding;
    const bLv = G.cities[ci].buildings[bestBldg] || 0;
    if(bLv <= 0) return;
    const slots = getBuildingSlots(bestBldg, ci);
    const current = getFollowersInSlot(bestBldg, ci).length;
    if(current < slots){
      f.assigned = bestBldg;
      assigned++;
    }
  });
  // Assign remaining idle to combat
  const stillIdle = G.followers.filter(f => (f.cityIdx||0) === ci && f.assigned === 'idle');
  stillIdle.forEach(f => { f.assigned = 'combat'; assigned++; });
  toast('Auto-assigned ' + assigned + ' followers!', '#0ff');
  save(); showTab('town');
}

// City Rename (#14)
function renameCity(cityIdx){
  const newName = prompt('Enter new city name:');
  if(!newName || newName.trim() === '') return;
  if(G.gold < 100){ toast('Need 100 gold to rename','#f44'); return; }
  G.gold -= 100;
  G.cities[cityIdx].name = newName.trim().substring(0, 20);
  toast('City renamed to ' + G.cities[cityIdx].name + '!', '#0ff');
  save(); showTab('town');
}

// Follower Gift System (#11)
function giveFollowerGift(fId, giftType){
  const f = G.followers.find(x => x.id === fId);
  if(!f) return;
  if(G.gold < 50){ toast('Need 50 gold','#f44'); return; }
  G.gold -= 50;
  if(giftType === 'food'){
    f.happiness = Math.min(100, f.happiness + 20);
    toast(f.name + ' loved the food! +20 happiness', '#0f0');
  } else if(giftType === 'manual'){
    f.xp += 50 + f.level * 10;
    const needed = f.level * 50;
    if(f.xp >= needed && f.level < 50){ f.xp -= needed; f.level++; f.power += (f.rarity+1); f.defense += Math.floor((f.rarity+1)*0.7); toast(f.name + ' leveled up!','#b026ff'); }
    else { toast(f.name + ' gained training XP from manual!', '#0ff'); }
  } else if(giftType === 'token'){
    f.loyalty = Math.min(100, f.loyalty + 15);
    toast(f.name + ' feels more loyal! +15 loyalty', '#ffd700');
  }
  save(); showTab('followers_detail', fId);
}

  html += '<h3>Achievements (' + G.achievements.length + '/' + ACHIEVEMENT_DEFS.length + ')</h3>';
  html += '<div class="card">';

    const color = done ? (a.secret ? '#ff2060' : '#ffd700') : '#444';
    html += '<div style="color:' + color + '">';
    html += (done ? '* ' : '  ') + (a.secret && done ? '[SECRET] ' : '') + a.name + ' - ' + a.desc;

    html += '<div style="color:#444">  ...and ' + (secretCount - secretUnlocked) + ' hidden achievement(s) to discover</div>';

  if(G.level >= 100){

    html += '<button class="btn btn-gold" onclick="if(confirm(\'Prestige? You will reset to Lv1 but gain permanent +10% XP bonus and 20 gems.\'))doPrestige()">PRESTIGE (Reset + Bonus)</button>';
    html += '</div>';
  }

  // Save/Load
  html += '<div class="card mt">';
  html += '<button class="btn" onclick="save();toast(\'Saved!\',\'#0f0\')">Manual Save</button> ';
  html += '<button class="btn btn-red" onclick="if(confirm(\'Delete ALL save data?\')){ localStorage.removeItem(\'voidraiders_save\'); location.reload(); }">Reset Game</button>';
  html += '</div>';

  c.innerHTML = html;
}

function allocStat(stat){
  if(G.statPoints <= 0) return;
  G.statPoints--;
  G.stats[stat]++;
  save();
  showTab('profile');
}

function renderExplore(c){

function renderExpeditions(c){
  let html = '<h2>Expeditions</h2>';
  html += '<div class="text-sm text-dim mb">Send followers on timed missions. Max 3 active.</div>';
  // Active expeditions
  if(G.expeditions && G.expeditions.length > 0){
    html += '<h3>Active (' + G.expeditions.length + '/3)</h3>';
    G.expeditions.forEach((exp, i) => {
      const type = EXPEDITION_TYPES[exp.type];
      const timeLeft = Math.max(0, Math.floor((exp.endTime - Date.now()) / 1000));
      const ready = timeLeft <= 0;
      const fNames = exp.followerIds.map(id => { const f = G.followers.find(x=>x.id===id); return f ? f.name : '?'; }).join(', ');
      html += '<div class="card" style="border-color:'+(ready?'#ffd700':'#333')+'">';
      html += '<b>' + type.name + '</b> - ' + fNames + '<br>';
      if(ready){ html += '<button class="btn btn-gold" onclick="collectExpedition('+i+');showTab(\'expeditions\')">COLLECT!</button>'; }
      else { html += 'Time left: ' + Math.floor(timeLeft/60) + 'm ' + (timeLeft%60) + 's'; }
      html += '</div>';
    });
  }
  // Start new
  if(!G.expeditions || G.expeditions.length < 3){
    html += '<h3>Start Expedition</h3>';
    const idleFollowers = G.followers.filter(f => f.assigned === 'idle' || f.assigned === 'combat');
    if(idleFollowers.length === 0){
      html += '<div class="text-dim">No idle followers available.</div>';
    } else {
      EXPEDITION_TYPES.forEach((type, ti) => {
        html += '<div class="card">';
        html += '<b>' + type.name + '</b> (' + type.desc + ') - EN:' + type.energy + '<br>';
        html += '<span class="text-sm">Gold: ' + type.goldMin + '-' + type.goldMax + ' | XP: ' + type.xpMin + '-' + type.xpMax + ' | Gear: ' + Math.floor(type.gearChance*100) + '%</span><br>';

        const first = idleFollowers[0];
        html += '<button class="btn btn-cyan" onclick="startExpedition('+ti+',['+first.id+']);showTab(\'expeditions\')">Send ' + first.name + '</button>';
        if(idleFollowers.length > 1){
          const ids = idleFollowers.slice(0,3).map(f=>f.id);
          html += ' <button class="btn btn-green" onclick="startExpedition('+ti+','+JSON.stringify(ids)+');showTab(\'expeditions\')">Send '+Math.min(3,idleFollowers.length)+' followers</button>';
        }
        html += '</div>';
      });
    }
  }
  // Expedition Log (#4)
  if(G.expeditionLog && G.expeditionLog.length > 0){
    html += '<h3>Expedition Log</h3>';
    G.expeditionLog.forEach(entry => {
      const ago = Math.floor((Date.now() - entry.time) / 60000);
      html += '<div class="card text-sm">';
      html += '<span style="color:#ffd700">' + (entry.type||'Expedition') + '</span> (' + ago + 'm ago)<br>';
      html += entry.msg;
      html += '</div>';
    });
  }
  html += '<div class="mt"><button class="btn" onclick="showTab(\'more\')">Back</button></div>';
  c.innerHTML = html;
}

function renderBestiary(c){
  let html = '<h2>Bestiary</h2>';
  const entries = Object.keys(G.bestiary || {});
  html += '<div class="text-sm text-dim mb">Enemies catalogued: ' + entries.length + ' | Kill 25/50/100 for damage bonuses.</div>';
  if(entries.length === 0){
    html += '<div class="text-dim">No entries yet. Go fight something!</div>';
  }
  entries.sort((a,b) => G.bestiary[b].kills - G.bestiary[a].kills);
  entries.forEach(name => {
    const entry = G.bestiary[name];
    const bonus = getBestiaryBonus(name);
    const bonusStr = bonus > 1 ? ' <span style="color:#0f0">+' + Math.floor((bonus-1)*100) + '% dmg</span>' : '';
    html += '<div class="card">';

// ==================== GAME LOOP ====================
let energyTimer = 0;
let saveTimer = 0;
let goldTimer = 0;
let followerTimer = 0;

function gameLoop(){
  if(!G) return;

  // Energy regen
  energyTimer++;
  const regenRate = getEnergyRegenRate();
  const regenTicks = Math.floor(regenRate); // ticks per energy (1 tick = 1 second)
  if(energyTimer >= regenTicks){
    energyTimer = 0;
    if(G.energy < getMaxEnergy()){
      G.energy++;
    }
  }

  // Passive gold
  goldTimer++;
  if(goldTimer >= 60){ // every 60 seconds
    goldTimer = 0;
    const gpm = getGoldPerMin();
    if(gpm > 0){
      G.gold += gpm;
    }
  }

  // Auto-battle (every 10 seconds)
  if(G.autoBattle && energyTimer % 10 === 0){
    processAutoBattle();
  }

  // Idle Skill Training (#1) - 1 XP per tick to highest combat skill
  if(G.skillLevels){
    const primarySkill = getPrimaryCombatSkill();
    addSkillXp(primarySkill, 1);
  }

  // Follower passive effects
  followerTimer++;
  if(followerTimer >= 120){ // every 2 min
    followerTimer = 0;
    G.followers.forEach(f => {
      if(f.happiness <= 20) { /* unhappy workers do nothing */ }
      else if(f.assigned === 'foundry'){
        // Foundry workers already handled by getGoldPerMin()
      } else if(f.assigned === 'lab'){
        // Lab workers: small passive XP
        addXp(Math.floor(f.level * 0.5));
      } else if(f.assigned === 'workshop'){
        // Workshop workers give crafting XP (Crafting = index 8)
        addSkillXp(8, Math.floor(f.level * 2));
      } else if(f.assigned === 'shrine'){
        // Shrine workers: small gem chance
        if(Math.random() < 0.01 * (f.rarity + 1)){
          G.gems += 1;
          toast(f.name + ' channeled a gem at the shrine!', '#b026ff');
        }
      } else if(f.assigned === 'generator'){
        // Generator workers: chance for bonus energy
        if(Math.random() < 0.3 && G.energy < getMaxEnergy()){
          G.energy = Math.min(getMaxEnergy(), G.energy + 1);
        }
      } else if(f.assigned === 'garrison'){
        // Garrison: small gold from repelling scouts
        if(Math.random() < 0.15){
          G.gold += Math.floor(f.level * (f.rarity+1));
        }
      }
      // Tavern workers slow happiness decay for all followers in same city
      // (handled below)
      // Slow happiness decay
      if(Math.random() < 0.1){
        // Tavern workers in same city reduce decay
        const ci = f.cityIdx || 0;
        const tavernWorkers = G.followers.filter(tw => tw.cityIdx === ci && tw.assigned === 'tavern' && tw.happiness > 20);
        const decayReduction = Math.min(0.08, tavernWorkers.length * 0.02); // up to 80% reduction
        if(Math.random() >= decayReduction){
          f.happiness = Math.max(0, f.happiness - 1);
        }
      }
      // Morale events: rebellion when happiness is very low
      if(f.happiness < 30 && Math.random() < 0.05){
        toast(getFollowerDisplayName(f) + ' has REBELLED and left your service!', '#f44');
        G.followers = G.followers.filter(x => x.id !== f.id);
        // Remove from council if applicable
        G.clanCouncil = G.clanCouncil.filter(id => id !== f.id);
      }
      // Happy followers sometimes find gifts
      if(f.happiness > 90 && Math.random() < 0.03){
        if(Math.random() < 0.5){
          const giftGold = 10 + Math.floor(f.level * (f.rarity+1) * 2);
          G.gold += giftGold; G.total_gold_earned += giftGold;
          toast(getFollowerDisplayName(f) + ' found a gift: +' + giftGold + ' gold!', '#ffd700');
        } else {
          const res = ['ore','scrap','data','bio'];
          const r = res[Math.floor(Math.random()*res.length)];
          const amt = 1 + Math.floor(f.rarity * 2);
          G.resources[r] = (G.resources[r]||0) + amt;
          toast(getFollowerDisplayName(f) + ' found a gift: +' + amt + ' ' + r + '!', '#0f0');
        }
      }
    });
  }

  // Update weather
  updateWeather();

  // Tribute gold from captured cities
  if(goldTimer === 0 && G.tributeGold > 0){
    G.gold += G.tributeGold;
  }

  // Process bounty contracts
  if(energyTimer % 60 === 0) processContracts();

  // Update corruption zones every 10 min
  if(energyTimer % 600 === 0) updateCorruptionZones();

  // Wanted board refresh (every 2 hours)
  if(!G.wantedTargets || G.wantedTargets.length === 0 || Date.now() - (G.wantedRefreshTime||0) > 7200000) refreshWanted();

  // Void rift spawn check (every ~5 min, 3% chance)
  if(energyTimer % 300 === 0 && Math.random() < 0.03) spawnRift();

  // Follower jobs processing (every 2 min tick with followers)
  if(followerTimer === 0){
    G.followers.forEach(f => {
      if(f.assigned === 'shopkeeper' || f.job === 'shopkeeper'){
        const income = Math.floor(3 + G.level * 0.2);
        G.gold += income;
      }
      if(f.assigned === 'trainer' || f.job === 'trainer'){
        const sk = Math.floor(Math.random()*15);
        addSkillXp(sk, Math.floor(5 + G.level * 0.5));
      }
      if((f.assigned === 'recruiter' || f.job === 'recruiter') && Math.random() < 0.005){
        const nf = generateFollower();
        G.followers.push(nf);
        addNotification(f.name + ' recruited ' + nf.name + '!');
        toast(f.name + ' recruited ' + nf.name + '!', '#ffd700');
      }
      if((f.assigned === 'alchemist' || f.job === 'alchemist') && Math.random() < 0.02){
        const potTypes = Object.keys(POTIONS);
        const pt = potTypes[Math.floor(Math.random()*potTypes.length)];
        G.potions[pt] = (G.potions[pt]||0) + 1;
        addNotification(f.name + ' brewed a ' + POTIONS[pt].name);
      }
    });
    checkTitles();
  }

  // Check events every 5 min
  if(energyTimer % 300 === 0) checkEvent();

  // Check expeditions (notify when done)
  if(G.expeditions && energyTimer % 10 === 0){
    G.expeditions.forEach((exp, i) => {
      if(!exp.collected && Date.now() >= exp.endTime){
        toast('Expedition ready to collect!', '#ffd700');
      }
    });
  }

  // Spawn roaming enemies every 30 seconds
  if(energyTimer % 30 === 0) spawnRoamingEnemies();

  // Roaming enemies attack cities every 60 seconds
  if(energyTimer % 60 === 0) processRoamerCityAttacks();

  // Raid events (random, ~every 8 min per city)
  G.cities.forEach((city, ci) => {
    const timeSinceRaid = Date.now() - (city.lastRaid || 0);
    if(timeSinceRaid > 480000 && Math.random() < 0.008){
      const result = triggerRaid(ci);
      showRaidResult(result);
    }
  });

  // Auto-save
  saveTimer++;
  if(saveTimer >= 30){
    saveTimer = 0;
    save();
  }

  // Update HUD
  updateHUD();
}

// ==================== INIT ====================
function migrateOldSave(){
  // Migrate old single-buildings saves to multi-city
  if(!G.cities){
    const oldBuildings = G.buildings || {};
    G.cities = [newCity('Outpost Alpha')];
    G.cities[0].buildings = oldBuildings;
    G.currentCity = 0;
    delete G.buildings;
  }
  if(G.total_raids_won === undefined) G.total_raids_won = 0;
  if(G.dungeons_cleared === undefined) G.dungeons_cleared = 0;
  if(!G.roamingEnemies) G.roamingEnemies = [];
  if(!G.potions) G.potions = { hp:0, power:0, defense:0, luck:0, xp:0 };
  if(G.worldBossKills === undefined) G.worldBossKills = 0;
  if(G.loginStreak === undefined) G.loginStreak = 0;
  // Assign followers to city 0 if they don't have a city, migrate old roles
  if(!G.tickets1x) G.tickets1x = 0;
  if(!G.tickets10x) G.tickets10x = 0;
  if(!G.shards) G.shards = 0;
  if(!G.wishList) G.wishList = [];
  if(!G.dungeonKeys) G.dungeonKeys = {basic:0,advanced:0,nightmare:0};
  if(!G.records) G.records = {};
  if(!G.relics) G.relics = [];
  if(!G.equippedRelics) G.equippedRelics = [];
  if(!G.bestiary) G.bestiary = {};
  if(!G.challenges) G.challenges = [];
  if(!G.marketStock) G.marketStock = [];
  if(!G.resources) G.resources = {ore:0,scrap:0,data:0,bio:0};
  if(!G.arenaFloor) G.arenaFloor = 1;
  G.followers.forEach(f => {
    if(!f.gear) f.gear = {};
    if(f.cityIdx === undefined) f.cityIdx = 0;
    if(f.assigned === 'patrol') f.assigned = 'garrison';
    if(f.assigned === 'mining') f.assigned = 'foundry';
    // Add stars and abilities to old followers
    if(f.stars === undefined) f.stars = getStartingStars(f.rarity);
    if(!f.ability){
      const abilities = FOLLOWER_ABILITIES[f.class] || FOLLOWER_ABILITIES['Fighter'];
      f.ability = abilities[Math.min(f.rarity, abilities.length-1)];
    }
  });
  // Migrate new features
  if(!G.weather) G.weather = 'clear';
  if(!G.weatherChangeTime) G.weatherChangeTime = 0;
  if(!G.secretAchievements) G.secretAchievements = [];
  if(!G.legendaryPullCount) G.legendaryPullCount = 0;
  // New features migration
  if(G.autoSellRarity === undefined) G.autoSellRarity = -1;
  if(!G.expeditionLog) G.expeditionLog = [];
  if(!G.bossKillCounts) G.bossKillCounts = {};
  if(!G.fastestKills) G.fastestKills = {};
  // Update defense for all cities
  G.cities.forEach((c, i) => updateCityDefense(i));
}

function init(){
  if(load()){
    migrateOldSave();
    calcOfflineProgress();
    checkDailyLogin();
    generateChallenges();
    // Init market if needed
    if(!G.marketStock || G.marketStock.length === 0 || Date.now() - (G.marketRefreshTime||0) > 86400000) refreshMarket();
    // Init world boss if needed
    if(!G.worldBossHp || G.worldBossHp <= 0){ G.worldBossHp = getWorldBoss().maxHp; }
    document.getElementById('top-bar').style.display = '';
    document.getElementById('nav').style.display = 'flex';
    save();
    showTab('missions');
  } else {
    showCharacterCreation();
  }
  // Game loop runs every second
  setInterval(gameLoop, 1000);
}

// Start
init();
</script>
