<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Voidborn</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/ui.css">
  <link rel="stylesheet" href="css/raid.css">
</head>
<body>
  <div id="app">
    <header id="hud"></header>
    <main id="content"></main>
    <nav id="nav">
      <button class="nav-btn active" data-tab="raid">Raid</button>
      <button class="nav-btn" data-tab="party">Party</button>
      <button class="nav-btn" data-tab="stash">Stash</button>
      <button class="nav-btn" data-tab="town">Town</button>
      <button class="nav-btn" data-tab="bounties">Bounties</button>
    </nav>
  </div>

  <!-- Character Creation Modal -->
  <div id="char-create-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h2>Create Your Hero</h2>
      <div id="char-create"></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
